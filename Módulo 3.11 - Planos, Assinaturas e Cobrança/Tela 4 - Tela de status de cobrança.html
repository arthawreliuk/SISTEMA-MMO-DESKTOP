<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        trustBlue: '#0016dc',
                        deepNavy: '#1A1A24',
                        offWhite: '#F8F9FA',
                    },
                    boxShadow: {
                        'soft': '0 20px 40px -15px rgba(0,0,0,0.05)',
                        'floating': '0 30px 60px -20px rgba(0, 22, 220, 0.15)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F8F9FA;
            overflow-x: hidden;
        }
        .bg-celebration {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.4;
        }
        .shape-1 { width: 300px; height: 300px; background: #0016dc; top: -100px; left: -100px; }
        .shape-2 { width: 400px; height: 400px; background: #6366F1; bottom: -150px; right: -100px; }
        .shape-3 { width: 200px; height: 200px; background: #38BDF8; top: 40%; left: 10%; }
        .shape-4 { width: 250px; height: 250px; background: #A855F7; top: 20%; right: 15%; }
        
        .floating-pill {
            position: absolute;
            border-radius: 9999px;
            background: linear-gradient(135deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.4) 100%);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
    </style>
</head>
<body class="text-deepNavy antialiased min-h-screen flex flex-col relative">

    <!-- Celebration Background Layer -->
    <div id="celebration-bg" class="bg-celebration">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        
        <!-- Floating Elements -->
        <div class="floating-pill w-16 h-16 top-[15%] left-[20%] flex items-center justify-center text-trustBlue text-xl" style="animation-delay: 0s;"><i class="fa-solid fa-star"></i></div>
        <div class="floating-pill w-12 h-12 top-[60%] left-[10%] flex items-center justify-center text-[#10B981] text-lg" style="animation-delay: 1s;"><i class="fa-solid fa-check"></i></div>
        <div class="floating-pill w-20 h-20 top-[25%] right-[15%] flex items-center justify-center text-[#F97316] text-2xl" style="animation-delay: 2s;"><i class="fa-solid fa-bolt"></i></div>
        <div class="floating-pill w-14 h-14 bottom-[20%] right-[25%] flex items-center justify-center text-[#A855F7] text-xl" style="animation-delay: 1.5s;"><i class="fa-solid fa-gem"></i></div>
    </div>

    <!-- Top Navigation -->
    <nav id="header" class="relative z-10 w-full bg-white/80 backdrop-blur-md border-b border-gray-100 px-8 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-trustBlue flex items-center justify-center text-white shadow-lg shadow-trustBlue/30">
                <i class="fa-solid fa-cube text-xl"></i>
            </div>
            <span class="font-bold text-xl tracking-tight">MMO<span class="text-trustBlue">Platform</span></span>
        </div>
        
        <div class="flex items-center gap-6">
            <button class="text-gray-400 hover:text-deepNavy transition-colors">
                <i class="fa-regular fa-bell text-xl"></i>
            </button>
            <div class="flex items-center gap-3 pl-6 border-l border-gray-200 cursor-pointer">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-semibold">Alexandre Silva</p>
                    <p class="text-xs text-gray-500">Plano Premium</p>
                </div>
                <div class="relative">
                    <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-4.jpg" alt="Profile" class="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover">
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="main-content" class="relative z-10 flex-1 flex items-center justify-center p-6 w-full max-w-[1200px] mx-auto">
        
        <!-- Confirmation Container -->
        <div id="success-card" class="w-full max-w-[800px] bg-white/90 backdrop-blur-xl rounded-[24px] shadow-soft border border-white/60 overflow-hidden flex flex-col md:flex-row relative">
            
            <!-- Left Side: Illustration -->
            <div id="illustration-zone" class="w-full md:w-2/5 bg-gradient-to-br from-[#f0f4ff] to-[#e6edff] p-10 flex flex-col items-center justify-center relative overflow-hidden border-r border-gray-100">
                <!-- Decorative background elements inside left panel -->
                <div class="absolute top-0 right-0 w-32 h-32 bg-trustBlue/5 rounded-full blur-2xl transform translate-x-1/2 -translate-y-1/2"></div>
                <div class="absolute bottom-0 left-0 w-40 h-40 bg-trustBlue/10 rounded-full blur-3xl transform -translate-x-1/2 translate-y-1/2"></div>
                
                <div class="relative z-10 w-48 h-48 flex items-center justify-center">
                    <!-- Custom AI Illustration for Security/Growth -->
                    <img class="w-full h-full object-contain" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/f39658e657-7ac91f98f10215bc24e1.png" alt="3d sleek vector illustration of a premium unlocked padlock with subtle growth arrows, colored in deep blue (#0016dc) and soft white highlights, hyper-modern, clean design, transparent background" />
                </div>
                
                <div class="mt-8 text-center relative z-10">
                    <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/80 backdrop-blur-sm text-trustBlue text-sm font-semibold shadow-sm">
                        <i class="fa-solid fa-shield-check"></i>
                        <span>Transação Segura</span>
                    </div>
                </div>
            </div>

            <!-- Right Side: Content & Actions -->
            <div id="content-zone" class="w-full md:w-3/5 p-10 md:p-12 flex flex-col justify-center bg-white">
                
                <div class="mb-8">
                    <div class="w-12 h-12 rounded-full bg-green-100 text-green-600 flex items-center justify-center mb-6 text-2xl shadow-sm">
                        <i class="fa-solid fa-check"></i>
                    </div>
                    <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight mb-4 text-deepNavy">Tudo Certo, Mestre!</h1>
                    <p class="text-gray-500 text-base leading-relaxed">
                        Seu pagamento de <span class="font-bold text-deepNavy">R$ 49,90</span> foi processado com sucesso. Os recursos premium já estão liberados na sua conta e prontos para uso.
                    </p>
                </div>

                <!-- Receipt ID Block -->
                <div id="receipt-block" class="mb-10 bg-gray-50 rounded-full py-3 px-5 flex items-center justify-between border border-gray-100">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-file-invoice text-gray-400"></i>
                        <span class="text-sm font-medium text-gray-600">Nº do Recibo: <span class="text-deepNavy font-bold">#883719</span></span>
                    </div>
                    <button class="w-8 h-8 rounded-full hover:bg-gray-200 flex items-center justify-center text-gray-500 transition-colors tooltip" title="Copiar">
                        <i class="fa-regular fa-copy text-sm"></i>
                    </button>
                </div>

                <!-- Action Buttons -->
                <div id="action-area" class="flex flex-col sm:flex-row gap-4">
                    <button onclick="window.location.href='../Módulo 3.9 - Pipeline Simples do Profissional/Tela 1 - Tela do pipeline simples.html'" class="flex-1 bg-trustBlue text-white font-semibold py-4 px-6 rounded-full shadow-floating hover:bg-blue-800 transition-all transform hover:-translate-y-1 flex items-center justify-center gap-2">
                        <span>Acessar Painel de Negócios</span>
                        <i class="fa-solid fa-arrow-right text-sm"></i>
                    </button>
                    
                    <button onclick="window.location.href='Tela 5 - Tela de upgrade _ destaque premium.html'" class="sm:w-auto w-full bg-transparent border-2 border-gray-200 text-deepNavy font-semibold py-4 px-6 rounded-full hover:bg-gray-50 hover:border-gray-300 transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-print"></i>
                        <span>Imprimir Recibo</span>
                    </button>
                </div>
                
            </div>
        </div>
    </main>

    <script src="../_nav-helper.js"></script>
</body>
</html>
