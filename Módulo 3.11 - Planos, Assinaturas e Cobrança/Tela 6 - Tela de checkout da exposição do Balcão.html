<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Modal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        'trust-blue': '#0016dc',
                        'deep-navy': '#1A1A24',
                        'off-white': '#F8F9FA',
                    },
                    boxShadow: {
                        'ambient': '0 20px 40px -10px rgba(0, 0, 0, 0.1), 0 10px 20px -5px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; }
        ::-webkit-scrollbar { display: none; }
        .backdrop-blur-md { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-[#1A1A24] font-sans antialiased text-deep-navy h-screen w-full overflow-hidden flex items-center justify-center relative m-0 p-0">

    <!-- Simulated App Background underneath the modal (Blurred out) -->
    <div class="absolute inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80" alt="App Background" class="w-full h-full object-cover opacity-20" />
        <div class="absolute inset-0 bg-[#1A1A24]/70 backdrop-blur-md"></div>
    </div>

    <!-- Centered Modal Container -->
    <main id="checkout-modal" class="relative z-10 w-full max-w-[700px] bg-white rounded-[24px] shadow-ambient mx-4 md:mx-auto flex flex-col overflow-hidden">
        
        <!-- Header -->
        <header id="checkout_modal_header" class="flex items-center justify-between px-8 py-6 border-b border-gray-100 bg-white">
            <h2 class="text-[20px] font-bold text-deep-navy leading-tight tracking-tight">Desbloquear Oportunidade Exclusiva</h2>
            <button class="w-10 h-10 rounded-full bg-off-white hover:bg-gray-200 flex items-center justify-center transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-trust-blue focus:ring-offset-2">
                <i class="fa-solid fa-xmark text-gray-500 text-lg"></i>
            </button>
        </header>

        <!-- Content Flow (Split Pane) -->
        <div class="flex flex-col md:flex-row w-full flex-grow">
            
            <!-- Left Side: Lead Summary -->
            <section id="lead_summary_pane" class="w-full md:w-[45%] bg-off-white p-8 flex flex-col border-r border-gray-100">
                <div class="mb-6 flex items-center justify-center w-14 h-14 rounded-full bg-white shadow-sm">
                    <i class="fa-solid fa-lock text-trust-blue text-xl"></i>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Detalhes do Lead</p>
                        <h3 class="text-lg font-bold text-deep-navy leading-snug">Reforma Comercial em Itajaí</h3>
                    </div>
                    
                    <div class="flex items-center space-x-2 bg-white px-3 py-2 rounded-[12px] shadow-sm border border-gray-100 w-fit">
                        <i class="fa-solid fa-bolt text-yellow-500 text-sm"></i>
                        <span class="text-sm font-semibold text-deep-navy">Valor alto potencial</span>
                    </div>

                    <div class="pt-4 mt-4 border-t border-gray-200 space-y-3">
                        <div class="flex items-center space-x-3 text-sm text-gray-600">
                            <i class="fa-solid fa-location-dot text-gray-400 w-4 text-center"></i>
                            <span>Itajaí, SC</span>
                        </div>
                        <div class="flex items-center space-x-3 text-sm text-gray-600">
                            <i class="fa-solid fa-building text-gray-400 w-4 text-center"></i>
                            <span>Comercial / Loja</span>
                        </div>
                        <div class="flex items-center space-x-3 text-sm text-gray-600">
                            <i class="fa-solid fa-ruler-combined text-gray-400 w-4 text-center"></i>
                            <span>150m² - 300m²</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Right Side: Payment Action -->
            <section id="payment_action_area" class="w-full md:w-[55%] bg-white p-8 flex flex-col justify-between">
                <div class="space-y-6">
                    <!-- Price Display -->
                    <div class="text-center md:text-left">
                        <p class="text-sm font-medium text-gray-500 mb-1">Investimento para desbloqueio</p>
                        <div class="flex items-baseline justify-center md:justify-start space-x-1">
                            <span class="text-xl font-bold text-deep-navy">R$</span>
                            <span class="text-[40px] font-extrabold text-deep-navy tracking-tight leading-none">19,90</span>
                        </div>
                    </div>

                    <!-- Payment Selector -->
                    <div class="space-y-3">
                        <p class="text-sm font-semibold text-deep-navy">Método de Pagamento</p>
                        
                        <!-- Saved Card (1-Click Buy Concept) -->
                        <div class="relative group cursor-pointer">
                            <input type="radio" name="payment" id="card-1234" class="peer sr-only" checked>
                            <label for="card-1234" class="flex items-center justify-between w-full p-4 border-2 border-trust-blue rounded-[16px] bg-trust-blue/[0.02] transition-all duration-200 cursor-pointer">
                                <div class="flex items-center space-x-4">
                                    <div class="w-10 h-6 bg-gray-100 rounded flex items-center justify-center border border-gray-200">
                                        <i class="fa-brands fa-cc-visa text-blue-800 text-lg"></i>
                                    </div>
                                    <div class="flex flex-col">
                                        <span class="text-sm font-bold text-deep-navy">Pagar com Cartão</span>
                                        <span class="text-xs text-gray-500">Final 1234</span>
                                    </div>
                                </div>
                                <div class="w-5 h-5 rounded-full border-2 border-trust-blue flex items-center justify-center bg-trust-blue">
                                    <i class="fa-solid fa-check text-white text-[10px]"></i>
                                </div>
                            </label>
                        </div>

                        <!-- Add New Method -->
                        <div class="relative group cursor-pointer">
                            <input type="radio" name="payment" id="new-method" class="peer sr-only">
                            <label for="new-method" class="flex items-center space-x-4 w-full p-4 border border-gray-200 rounded-[16px] hover:bg-off-white transition-all duration-200 cursor-pointer peer-checked:border-trust-blue peer-checked:bg-trust-blue/[0.02]">
                                <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-500">
                                    <i class="fa-solid fa-plus text-sm"></i>
                                </div>
                                <span class="text-sm font-medium text-deep-navy">Adicionar novo cartão ou PIX</span>
                            </label>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Footer Action -->
        <footer id="modal_action_footer" class="bg-white p-8 pt-4 border-t border-gray-100 flex flex-col items-center">
            <button onclick="window.location.href='Tela 3 - Tela de resumo da assinatura.html'" class="w-full bg-trust-blue hover:bg-blue-800 text-white font-bold text-[16px] py-4 px-6 rounded-full shadow-lg shadow-trust-blue/30 transition-all duration-300 transform hover:-translate-y-0.5 focus:outline-none focus:ring-4 focus:ring-trust-blue/50 flex items-center justify-center space-x-2">
                <span>Pagar R$ 19,90 e Acessar Cliente</span>
                <i class="fa-solid fa-arrow-right text-sm"></i>
            </button>
            <div class="mt-4 flex items-center space-x-2 text-xs font-medium text-gray-500">
                <i class="fa-solid fa-shield-halved text-green-500"></i>
                <span>Compra segura. Liberação instantânea.</span>
            </div>
        </footer>

    </main>

    <script src="../_nav-helper.js"></script>
</body>
</html>
