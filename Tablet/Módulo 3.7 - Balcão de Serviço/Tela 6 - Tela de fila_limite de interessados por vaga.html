<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de fila_limite de interessados por vaga - MMO Tablet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#0016dc',
                            light: '#F8F9FA',
                            text: '#1A1A24',
                            muted: '#6B7280'
                        }
                    },
                    boxShadow: {
                        'ambient': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'nav': '0 4px 20px -2px rgba(0,0,0,0.05)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F8F9FA;
            color: #1A1A24;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen w-full flex items-center justify-center relative bg-[#F8F9FA]">


    <!-- Main Content Workspace -->
    <main id="main-workspace" class="w-full h-full min-h-screen flex items-center justify-center pr-8 py-12">
        
        <!-- Center Feedback Card -->
        <div id="feedback-card" class="w-full max-w-[700px] bg-white rounded-[24px] shadow-ambient p-12 flex flex-col items-center text-center relative ">
            
            <!-- Decorative Background Element -->
            <div class="absolute top-0 right-0 w-64 h-64 bg-blue-50/30 rounded-bl-full -z-10 blur-3xl"></div>

            <!-- Icon Header -->
            <div class="w-20 h-20 rounded-2xl bg-blue-50 flex items-center justify-center mb-8 relative">
                <i class="fa-solid fa-lock text-3xl text-brand-blue"></i>
                <div class="absolute -bottom-2 -right-2 w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center border border-gray-100">
                    <i class="fa-solid fa-hourglass-half text-xs text-brand-text"></i>
                </div>
            </div>

            <!-- Typography -->
            <h1 class="text-3xl font-bold tracking-tight mb-4 text-brand-text">
                Limite de 5/5 propostas atingido.
            </h1>
            
            <p class="text-brand-muted text-lg leading-relaxed max-w-lg mb-10">
                Nós limitamos a quantidade de propostas para garantir que o cliente não fique sobrecarregado e que você tenha uma chance real de fechar negócio quando enviar.
            </p>

            <!-- Waitlist Widget -->
            <div id="waitlist-widget" class="w-full bg-blue-50/50 border border-blue-100 rounded-[20px] p-6 mb-10 flex items-center gap-5">
                <div class="w-12 h-12 rounded-full bg-white shadow-sm flex items-center justify-center flex-shrink-0">
                    <i class="fa-solid fa-users text-brand-blue"></i>
                </div>
                <div class="text-left">
                    <div class="text-sm font-semibold text-brand-blue uppercase tracking-wider mb-1">Fila de Espera</div>
                    <div class="text-brand-text font-medium">Você será o <span class="font-bold">1º da fila</span> se alguém desistir.</div>
                </div>
            </div>

            <!-- Action Footer -->
            <div id="action-footer" class="w-full flex items-center gap-4 mt-2">
                <button class="flex-1 h-14 rounded-[16px] border-2 border-gray-100 text-brand-text font-semibold hover:bg-gray-50 hover:border-gray-200 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-arrow-left text-sm"></i>
                    Voltar ao Balcão
                </button>
                <button class="flex-1 h-14 rounded-[16px] bg-brand-blue text-white font-semibold hover:bg-blue-700 shadow-lg shadow-blue-500/20 transition-all flex items-center justify-center gap-2">
                    <i class="fa-regular fa-bell text-sm"></i>
                    Ativar Alertas de Serviço
                </button>
            </div>

        </div>
    </main>

    <script src="../../_tablet-nav.js"></script>
</body>
</html>
