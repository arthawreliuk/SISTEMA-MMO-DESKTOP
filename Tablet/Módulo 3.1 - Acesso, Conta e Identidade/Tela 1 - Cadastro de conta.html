<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de conta - MMO Tablet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        background: '#F8F9FA',
                        primary: '#0016dc',
                        'primary-hover': '#0012b3',
                        text: '#0F172A',
                        'text-muted': '#64748B',
                        border: '#E2E8F0',
                    },
                    boxShadow: {
                        'card': '0 20px 40px -10px rgba(0, 0, 0, 0.05)',
                        'input': '0 1px 2px 0 rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-gradient {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
        }
        .pattern-overlay {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <!-- Main Container -->
    <main id="auth-container" class="w-full max-w-[900px] bg-white rounded-[24px] shadow-card flex flex-col md:flex-row min-h-[600px]">
        
        <!-- Left Side: Brand & Trust (40%) -->
        <section id="brand_trust_panel" class="w-full md:w-[40%] bg-primary p-10 flex flex-col justify-between relative ">
            <!-- Decorative Elements -->
            <div class="absolute inset-0 pattern-overlay opacity-30"></div>
            <div class="absolute -top-24 -left-24 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -right-24 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>

            <!-- Content -->
            <div class="relative z-10 flex flex-col h-full justify-between">
                <!-- Logo -->
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-cube text-primary text-lg"></i>
                    </div>
                    <span class="text-white font-bold text-xl tracking-tight">MMO</span>
                </div>

                <!-- Abstract 3D Shape Placeholder -->
                <div class="flex-1 flex items-center justify-center py-8 relative">
                   <div class="w-48 h-48 relative">
                        <div class="absolute inset-0 bg-white/20 rounded-[32px] rotate-12 backdrop-blur-sm border border-white/30 transition-transform hover:rotate-6 duration-500"></div>
                        <div class="absolute inset-0 bg-white/30 rounded-[32px] -rotate-6 backdrop-blur-md border border-white/40 glass-gradient flex items-center justify-center transition-transform hover:rotate-0 duration-500">
                             <i class="fa-solid fa-layer-group text-white text-5xl drop-shadow-lg"></i>
                        </div>
                   </div>
                </div>

                <!-- Quote -->
                <div>
                    <p class="text-white text-2xl font-semibold leading-tight mb-4">
"Transforme a maneira como você contrata e trabalha."
                    </p>
                    <div class="flex items-center gap-3">
                        <div class="flex -space-x-2">
                            <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-1.jpg" alt="User" class="w-8 h-8 rounded-full border-2 border-primary object-cover">
                            <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-2.jpg" alt="User" class="w-8 h-8 rounded-full border-2 border-primary object-cover">
                            <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-3.jpg" alt="User" class="w-8 h-8 rounded-full border-2 border-primary object-cover">
                        </div>
                        <span class="text-white/80 text-sm font-medium">+2k usuários ativos</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Right Side: The Form (60%) -->
        <section id="credentials_form" class="w-full md:w-[60%] bg-white p-8 md:p-12 flex flex-col justify-center">
            <div class="max-w-[400px] w-full mx-auto">
                
                <!-- Header -->
                <div id="form_header" class="mb-8 text-center md:text-left">
                    <h1 class="text-3xl font-bold text-text mb-2">Acesse a plataforma</h1>
                    <p class="text-text-muted text-sm">Insira seus dados para continuar.</p>
                </div>

                <!-- Social Login -->
                <div id="social_auth_group" class="grid grid-cols-2 gap-4 mb-8">
                    <button class="flex items-center justify-center gap-2 w-full py-3 px-4 border border-border rounded-full hover:bg-gray-50 transition-colors text-text font-medium text-sm">
                        <i class="fa-brands fa-google text-[#DB4437]"></i>
                        Google
                    </button>
                    <button class="flex items-center justify-center gap-2 w-full py-3 px-4 border border-border rounded-full hover:bg-gray-50 transition-colors text-text font-medium text-sm">
                        <i class="fa-brands fa-apple text-text"></i>
                        Apple
                    </button>
                </div>

                <!-- Divider -->
                <div class="flex items-center gap-4 mb-8">
                    <div class="flex-1 h-px bg-border"></div>
                    <span class="text-text-muted text-xs font-medium uppercase tracking-wider">Ou continue com</span>
                    <div class="flex-1 h-px bg-border"></div>
                </div>

                <!-- Form -->
                <form class="space-y-5">
                    
                    <!-- Name Input (Optional for Login, shown for completeness based on prompt) -->
                    <div class="space-y-1.5 hidden" id="name_field">
                        <label class="text-sm font-medium text-text block">Nome Completo</label>
                        <input type="text" placeholder="João Silva" class="w-full px-4 py-3 rounded-xl border border-border focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all shadow-input text-text placeholder:text-gray-400">
                    </div>

                    <!-- Email Input -->
                    <div class="space-y-1.5">
                        <label class="text-sm font-medium text-text block">Email</label>
                        <input type="email" placeholder="nome@empresa.com" class="w-full px-4 py-3 rounded-xl border border-border focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all shadow-input text-text placeholder:text-gray-400">
                    </div>

                    <!-- Password Input -->
                    <div class="space-y-1.5">
                        <div class="flex items-center justify-between">
                            <label class="text-sm font-medium text-text block">Senha</label>
                            <a href="#" class="text-primary text-xs font-medium hover:underline">Esqueceu a senha?</a>
                        </div>
                        <div class="relative">
                            <input type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-border focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all shadow-input text-text placeholder:text-gray-400">
                            <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-text-muted hover:text-text transition-colors">
                                <i class="fa-regular fa-eye-slash"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Remember Me -->
                    <div class="flex items-center gap-2 pt-1">
                        <input type="checkbox" id="remember" class="w-4 h-4 rounded border-border text-primary focus:ring-primary/20 accent-primary">
                        <label for="remember" class="text-sm text-text-muted cursor-pointer">Lembrar de mim</label>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="w-full bg-primary hover:bg-primary-hover text-white font-semibold py-3.5 px-4 rounded-full shadow-[0_4px_14px_0_rgba(0,22,220,0.39)] transition-all transform hover:-translate-y-0.5 mt-6">
                        Entrar na Conta
                    </button>
                </form>

                <!-- Footer Toggle -->
                <div id="auth_toggle_footer" class="mt-8 text-center">
                    <p class="text-sm text-text-muted">
                        Ainda não tem uma conta? 
                        <a href="#" class="text-primary font-semibold hover:underline ml-1" onclick="document.getElementById('name_field').classList.toggle('hidden'); document.querySelector('h1').innerText = document.getElementById('name_field').classList.contains('hidden') ? 'Acesse a plataforma' : 'Crie sua conta'; document.querySelector('button[type=submit]').innerText = document.getElementById('name_field').classList.contains('hidden') ? 'Entrar na Conta' : 'Criar Conta'; return false;">
                            Cadastre-se
                        </a>
                    </p>
                </div>

            </div>
        </section>
    </main>

    <script src="../../_tablet-nav.js"></script>
</body>
</html>
