<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de análise documental - MMO Tablet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#F8F9FA',
                        primary: '#0016dc',
                        textDark: '#1A1A24',
                        cardWhite: '#FFFFFF',
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    boxShadow: {
                        'ambient': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'floating': '0 20px 40px -10px rgba(0,0,0,0.12)',
                        'subtle': '0 4px 12px -2px rgba(0,0,0,0.05)',
                    },
                    borderRadius: {
                        '4xl': '24px',
                        'pill': '9999px',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8F9FA; color: #1A1A24; }
        ::-webkit-scrollbar { display: none; }
        /* Custom Checkbox */
        .custom-checkbox input:checked + div {
            background-color: #0016dc;
            border-color: #0016dc;
        }
        .custom-checkbox input:checked + div svg {
            display: block;
        }
    </style>
</head>
<body class="bg-background text-textDark h-screen w-full flex">


    <!-- Main Content Workspace -->
    <main id="main_workspace" class="flex-1 h-full flex flex-col pt-8 pr-8 pb-8 gap-6">
        
        <!-- Header Area -->
        <header id="identity_header_progress" class="flex justify-between items-end w-full shrink-0 px-2">
            <div>
                <p class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-1">Processo KYC #892-BR</p>
                <h1 class="text-3xl lg:text-4xl font-bold tracking-tight text-textDark">Validação de Identidade: Roberto Alves</h1>
            </div>
            
            <div class="flex items-center gap-4 bg-cardWhite px-6 py-3 rounded-full shadow-subtle">
                <div class="flex items-center gap-2">
                    <div class="w-6 h-6 rounded-full bg-green-100 text-green-600 flex items-center justify-center text-xs">
                        <i class="fa-solid fa-check"></i>
                    </div>
                    <div class="w-8 h-[2px] bg-gray-200"></div>
                    <div class="w-6 h-6 rounded-full bg-primary text-white flex items-center justify-center text-xs font-bold">2</div>
                </div>
                <span class="text-sm font-semibold text-textDark">Passo 2 de 2: Documentos</span>
            </div>
        </header>

        <!-- Split Layout (Asymmetrical 2-Columns) -->
        <div class="flex flex-col lg:flex-row gap-6 flex-1 min-h-0">
            
            <!-- Left Column (Document Viewer - 60%) -->
            <section id="document_viewer_canvas" class="w-full lg:w-[60%] bg-cardWhite rounded-4xl shadow-ambient p-3 flex flex-col relative ">
                <!-- Viewer Header -->
                <div class="flex justify-between items-center px-4 py-3 shrink-0">
                    <div class="flex items-center gap-3">
                        <span class="bg-blue-50 text-primary px-4 py-1.5 rounded-full text-sm font-semibold">RG Frente e Verso</span>
                        <span class="text-gray-400 text-sm">Enviado hoje às 14:23</span>
                    </div>
                    <div class="flex gap-2">
                        <button class="w-10 h-10 rounded-full bg-gray-50 hover:bg-gray-100 flex items-center justify-center text-gray-600 transition-colors">
                            <i class="fa-solid fa-download"></i>
                        </button>
                        <button class="w-10 h-10 rounded-full bg-gray-50 hover:bg-gray-100 flex items-center justify-center text-gray-600 transition-colors">
                            <i class="fa-solid fa-expand"></i>
                        </button>
                    </div>
                </div>

                <!-- Canvas Area -->
                <div class="flex-1 bg-[#1A1A24] rounded-3xl relative group">
                    <!-- High-res Document Mock (AI Image) -->
                    <div class="w-full h-full flex items-center justify-center p-8">
                         <img class="w-full max-w-2xl h-auto object-contain rounded-xl shadow-2xl opacity-90 group-hover:opacity-100 transition-opacity duration-300" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/5481469839-5c6ec7b3544b1127f991.png" alt="high resolution scan of a realistic brazilian identity card RG front and back overlaid on a dark canvas, sharp details, top down view" />
                    </div>

                    <!-- Floating Controls -->
                    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-white/10 backdrop-blur-md border border-white/20 p-2 rounded-full flex items-center gap-2 shadow-floating">
                        <button class="w-10 h-10 rounded-full hover:bg-white/20 flex items-center justify-center text-white transition-colors">
                            <i class="fa-solid fa-minus"></i>
                        </button>
                        <span class="text-white text-sm font-medium px-2 w-12 text-center">125%</span>
                        <button class="w-10 h-10 rounded-full hover:bg-white/20 flex items-center justify-center text-white transition-colors">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                        <div class="w-[1px] h-6 bg-white/20 mx-1"></div>
                        <button class="w-10 h-10 rounded-full hover:bg-white/20 flex items-center justify-center text-white transition-colors">
                            <i class="fa-solid fa-rotate-right"></i>
                        </button>
                    </div>

                    <!-- AI Analysis Overlay (Subtle) -->
                    <div class="absolute top-6 left-6 bg-black/40 backdrop-blur-sm border border-white/10 rounded-2xl p-4 flex flex-col gap-2">
                        <div class="flex items-center gap-2 text-green-400 text-xs font-bold tracking-wider uppercase">
                            <i class="fa-solid fa-microchip"></i> AI Scan Complete
                        </div>
                        <div class="text-white/80 text-sm">Hologram detected: <span class="text-white font-semibold">98% Match</span></div>
                        <div class="text-white/80 text-sm">Text clarity: <span class="text-white font-semibold">High</span></div>
                    </div>
                </div>
            </section>

            <!-- Right Column (Audit Checklist - 40%) -->
            <section id="biometric_audit_sidebar" class="w-full lg:w-[40%] bg-cardWhite rounded-4xl shadow-ambient flex flex-col ">
                
                <div class="p-8 flex-1 overflow-y-auto flex flex-col gap-8">
                    <!-- Biometric Match Section -->
                    <div class="flex flex-col gap-4">
                        <h3 class="text-lg font-bold text-textDark flex items-center gap-2">
                            <i class="fa-solid fa-face-viewfinder text-primary"></i> Biometria Facial
                        </h3>
                        
                        <div class="bg-gray-50 rounded-3xl p-4 flex items-center justify-between gap-4 border border-gray-100">
                            <!-- Selfie -->
                            <div class="w-[45%] aspect-square rounded-2xl relative shadow-sm">
                                <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/f287531abf-b4eb27fe0638e153ce5c.png" alt="close up selfie of a middle aged hispanic man looking directly at camera, natural lighting, neutral background" />
                                <div class="absolute bottom-2 left-2 bg-black/50 backdrop-blur-sm text-white text-xs px-2 py-1 rounded-md font-medium">Selfie KYC</div>
                            </div>
                            
                            <!-- Match Indicator -->
                            <div class="flex flex-col items-center justify-center gap-2 shrink-0">
                                <div class="w-12 h-12 rounded-full bg-green-100 text-green-600 flex items-center justify-center relative shadow-sm">
                                    <i class="fa-solid fa-link text-xl"></i>
                                    <svg class="absolute inset-0 w-full h-full text-green-500" viewBox="0 0 100 100">
                                        <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="4" stroke-dasharray="301.59" stroke-dashoffset="15" stroke-linecap="round"/>
                                    </svg>
                                </div>
                                <span class="text-green-600 font-bold text-sm">95% Match</span>
                            </div>

                            <!-- ID Photo -->
                            <div class="w-[45%] aspect-square rounded-2xl relative shadow-sm">
                                <img class="w-full h-full object-cover grayscale opacity-90" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/49aebb45ae-2a31d596aea58f3b3c6d.png" alt="passport style id photo of a middle aged hispanic man, formal, slightly lower quality to mimic id scan" />
                                <div class="absolute bottom-2 right-2 bg-black/50 backdrop-blur-sm text-white text-xs px-2 py-1 rounded-md font-medium">Foto Doc</div>
                            </div>
                        </div>
                    </div>

                    <!-- Checklist Section -->
                    <div class="flex flex-col gap-4">
                        <h3 class="text-lg font-bold text-textDark flex items-center gap-2">
                            <i class="fa-solid fa-list-check text-primary"></i> Checklist Manual
                        </h3>
                        
                        <div class="bg-gray-50 rounded-3xl p-2 border border-gray-100 flex flex-col gap-2">
                            <!-- Item 1 -->
                            <label class="custom-checkbox flex items-center gap-4 p-4 rounded-2xl hover:bg-white cursor-pointer transition-colors group">
                                <input type="checkbox" class="hidden" checked>
                                <div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center transition-colors">
                                    <svg class="w-3 h-3 text-white hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <div class="flex-1">
                                    <p class="font-semibold text-textDark group-hover:text-primary transition-colors">Documento Legível</p>
                                    <p class="text-sm text-gray-500">Sem reflexos ou cortes nas bordas</p>
                                </div>
                            </label>

                            <!-- Item 2 -->
                            <label class="custom-checkbox flex items-center gap-4 p-4 rounded-2xl hover:bg-white cursor-pointer transition-colors group">
                                <input type="checkbox" class="hidden" checked>
                                <div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center transition-colors">
                                    <svg class="w-3 h-3 text-white hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <div class="flex-1">
                                    <p class="font-semibold text-textDark group-hover:text-primary transition-colors">Selfie Confere</p>
                                    <p class="text-sm text-gray-500">Pessoa é a mesma da foto do documento</p>
                                </div>
                            </label>

                            <!-- Item 3 -->
                            <label class="custom-checkbox flex items-center gap-4 p-4 rounded-2xl hover:bg-white cursor-pointer transition-colors group">
                                <input type="checkbox" class="hidden">
                                <div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center transition-colors">
                                    <svg class="w-3 h-3 text-white hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <div class="flex-1">
                                    <p class="font-semibold text-textDark group-hover:text-primary transition-colors">Dentro da Validade</p>
                                    <p class="text-sm text-gray-500">Documento emitido há menos de 10 anos</p>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Action Footer -->
                <div id="verification_action_footer" class="p-6 bg-white border-t border-gray-100 flex flex-col gap-3 shrink-0">
                    <button class="w-full py-4 rounded-full bg-primary text-white font-bold text-lg shadow-floating hover:bg-blue-700 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-check-double"></i> Validar KYC
                    </button>
                    <button class="w-full py-4 rounded-full bg-white text-red-500 font-semibold text-md border border-red-100 hover:bg-red-50 transition-colors flex items-center justify-center gap-2">
                        <i class="fa-solid fa-triangle-exclamation"></i> Reportar Fraude
                    </button>
                </div>

            </section>
        </div>
    </main>

    <script src="../../_tablet-nav.js"></script>
</body>
</html>
