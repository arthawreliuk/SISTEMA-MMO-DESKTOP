<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definição de disponibilidade - MMO Tablet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: '#0016dc',
                        navy: '#1A1A24',
                        offwhite: '#F8F9FA',
                        surface: '#FFFFFF',
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0, 22, 220, 0.08)',
                        'inner-soft': 'inset 0 2px 10px rgba(0,0,0,0.03)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; color: #1A1A24; }
        ::-webkit-scrollbar { display: none; }
        
        /* Custom Toggle Switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #0016dc;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #0016dc;
        }
        .toggle-checkbox:checked + .toggle-label:after {
            transform: translateX(100%);
            border-color: white;
        }
    </style>
</head>
<body class="min-h-screen font-sans antialiased flex lg:h-[1366px] lg:w-[1024px] lg:mx-auto lg:my-auto lg:relative">


    <!-- Main Content Workspace -->
    <main class="flex-1 flex flex-col h-full pr-8 py-12 relative z-10 w-full">
        
        <!-- Header Area -->
        <header id="header" class="flex items-center justify-between w-full max-w-[800px] mx-auto mb-12">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-full border-2 border-surface shadow-sm">
                    <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-4.jpg" alt="Arthur" class="w-full h-full object-cover">
                </div>
                <h2 class="text-xl font-bold text-navy">Olá, Arthur</h2>
            </div>
            
            <div class="flex items-center gap-3 bg-surface px-6 py-3 rounded-full shadow-sm">
                <span class="text-sm font-semibold text-navy">Passo 4 de 4</span>
                <div class="flex gap-1.5">
                    <div class="w-2 h-2 rounded-full bg-brand/20"></div>
                    <div class="w-2 h-2 rounded-full bg-brand/20"></div>
                    <div class="w-2 h-2 rounded-full bg-brand/20"></div>
                    <div class="w-6 h-2 rounded-full bg-brand"></div>
                </div>
            </div>
        </header>

        <!-- Centered Focus Area -->
        <div class="flex-1 flex items-center justify-center w-full pb-20">
            
            <!-- Main Schedule Card -->
            <div id="schedule-card" class="w-full max-w-[700px] bg-surface rounded-[24px] shadow-soft p-10 flex flex-col gap-10">
                
                <!-- Card Header -->
                <div class="text-center space-y-3">
                    <h1 class="text-4xl font-extrabold text-navy tracking-tight">Quando você atende?</h1>
                    <p class="text-lg text-navy/60 font-medium max-w-lg mx-auto">Defina seus dias e horários de trabalho para receber pedidos no momento certo.</p>
                </div>

                <!-- Weekly Setup -->
                <div class="space-y-4">
                    <label class="text-sm font-bold text-navy/80 uppercase tracking-wider ml-2">Dias da Semana</label>
                    <div class="flex gap-3 justify-between">
                        <button class="flex-1 py-4 rounded-full font-bold text-navy bg-gray-50 hover:bg-gray-100 transition-colors border border-gray-100">D</button>
                        <button class="flex-1 py-4 rounded-full font-bold text-white bg-brand shadow-md">S</button>
                        <button class="flex-1 py-4 rounded-full font-bold text-white bg-brand shadow-md">T</button>
                        <button class="flex-1 py-4 rounded-full font-bold text-white bg-brand shadow-md">Q</button>
                        <button class="flex-1 py-4 rounded-full font-bold text-white bg-brand shadow-md">Q</button>
                        <button class="flex-1 py-4 rounded-full font-bold text-white bg-brand shadow-md">S</button>
                        <button class="flex-1 py-4 rounded-full font-bold text-navy bg-gray-50 hover:bg-gray-100 transition-colors border border-gray-100">S</button>
                    </div>
                </div>

                <!-- Time Inputs -->
                <div class="flex gap-6">
                    <div class="flex-1 space-y-3">
                        <label class="text-sm font-bold text-navy/80 uppercase tracking-wider ml-2">Início</label>
                        <div class="relative">
                            <i class="fa-regular fa-clock absolute left-5 top-1/2 -translate-y-1/2 text-navy/40 text-lg"></i>
                            <input type="time" value="08:00" class="w-full bg-gray-50 border border-gray-100 rounded-full py-4 pr-6 text-navy font-bold text-lg focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand transition-all shadow-inner-soft">
                        </div>
                    </div>
                    <div class="flex-1 space-y-3">
                        <label class="text-sm font-bold text-navy/80 uppercase tracking-wider ml-2">Fim</label>
                        <div class="relative">
                            <i class="fa-regular fa-clock absolute left-5 top-1/2 -translate-y-1/2 text-navy/40 text-lg"></i>
                            <input type="time" value="18:00" class="w-full bg-gray-50 border border-gray-100 rounded-full py-4 pr-6 text-navy font-bold text-lg focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand transition-all shadow-inner-soft">
                        </div>
                    </div>
                </div>

                <!-- Emergency Toggle -->
                <div class="bg-gray-50 rounded-2xl p-6 border border-gray-100 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-brand/10 flex items-center justify-center">
                            <i class="fa-solid fa-bolt text-brand text-xl"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-navy text-lg">Atendimento de Emergência 24h</h3>
                            <p class="text-sm text-navy/60 font-medium">Aceitar pedidos fora do horário comercial</p>
                        </div>
                    </div>
                    
                    <!-- Toggle Switch -->
                    <div class="relative inline-block w-14 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle" id="emergency-toggle" checked class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer transition-transform duration-200 ease-in-out z-10 top-1 left-1"/>
                        <label for="emergency-toggle" class="toggle-label block h-8 rounded-full bg-gray-300 cursor-pointer transition-colors duration-200 ease-in-out"></label>
                    </div>
                </div>

                <!-- Bottom Action -->
                <div class="pt-4">
                    <button class="w-full bg-brand hover:bg-brand/90 text-white font-bold text-lg py-5 rounded-full shadow-lg shadow-brand/30 transition-all transform hover:-translate-y-1 flex items-center justify-center gap-3">
                        Finalizar Configuração de Agenda
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>

            </div>
        </div>
    </main>

    <script src="../../_tablet-nav.js"></script>
</body>
</html>
