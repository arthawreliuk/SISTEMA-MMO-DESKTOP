<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de retorno de pagamento - MMO Tablet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script> window.FontAwesomeConfig = { autoReplaceSvg: 'nest'};</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#0016dc',
                            navy: '#1A1A24',
                            offwhite: '#F8F9FA',
                        }
                    },
                    boxShadow: {
                        'ambient': '0 20px 40px -15px rgba(0, 0, 0, 0.05), 0 0 20px rgba(0, 0, 0, 0.02)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen w-full flex items-center justify-center bg-brand-offwhite p-4 md:p-8 lg:p-12">

    <!-- Success Modal Container -->
    <main id="success-modal" class="w-full max-w-[1024px] bg-white rounded-[24px] shadow-ambient flex flex-col md:flex-row min-h-[600px]">
        
        <!-- Left Column: Celebration (40%) -->
        <section id="celebration-column" class="w-full md:w-[40%] bg-brand-offwhite p-10 lg:p-14 flex flex-col items-center justify-center text-center border-r border-gray-100">
            <div class="mb-8 relative">
                <!-- 3D Shield Icon Placeholder -->
                <div class="w-32 h-32 bg-white rounded-full shadow-sm flex items-center justify-center relative z-10">
                    <i class="fa-solid fa-shield-check text-5xl text-[#10B981]"></i>
                </div>
                <!-- Decorative background glow -->
                <div class="absolute inset-0 bg-[#10B981] opacity-20 blur-2xl rounded-full transform scale-150 z-0"></div>
            </div>
            
            <h1 class="text-3xl lg:text-4xl font-bold text-brand-navy mb-4 tracking-tight">Tudo Certo!</h1>
            <p class="text-gray-500 text-lg leading-relaxed max-w-[280px]">
                Seu pagamento foi processado com segurança pela MMO.
            </p>
        </section>

        <!-- Right Column: Receipt (60%) -->
        <section id="receipt-column" class="w-full md:w-[60%] bg-white p-10 lg:p-14 flex flex-col justify-between">
            
            <div class="space-y-10">
                <header>
                    <h2 class="text-xl font-semibold text-brand-navy mb-1">Resumo da Transação</h2>
                    <p class="text-sm text-gray-400">Comprovante gerado em 30 de Abril, 2026</p>
                </header>

                <!-- Professional Details -->
                <div class="flex items-center space-x-4 p-5 rounded-2xl bg-gray-50 border border-gray-100">
                    <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-4.jpg" alt="Arthur" class="w-14 h-14 rounded-full object-cover shadow-sm border-2 border-white">
                    <div>
                        <p class="text-sm text-gray-500 font-medium mb-0.5">Destinatário</p>
                        <p class="text-lg font-bold text-brand-navy">Arthur - Camboriú</p>
                    </div>
                </div>

                <!-- Transaction Details -->
                <div class="space-y-6">
                    <div class="flex justify-between items-center py-4 border-b border-gray-100">
                        <span class="text-gray-500 font-medium">Método de Pagamento</span>
                        <div class="flex items-center space-x-2">
                            <i class="fa-brands fa-pix text-[#32BCA0]"></i>
                            <span class="text-brand-navy font-semibold">Pix</span>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center py-4 border-b border-gray-100">
                        <span class="text-gray-500 font-medium">ID da Transação</span>
                        <span class="text-brand-navy font-mono text-sm">#MMO-982374</span>
                    </div>

                    <div class="flex justify-between items-end pt-4">
                        <span class="text-gray-500 font-medium text-lg">Valor Total</span>
                        <span class="text-4xl font-extrabold text-brand-navy tracking-tight">R$ 450,00</span>
                    </div>
                </div>
            </div>

            <!-- Action Footer -->
            <footer id="action-footer" class="mt-12 flex flex-col sm:flex-row justify-end items-center gap-4 pt-8 border-t border-gray-50">
                <button class="w-full sm:w-auto px-8 py-4 rounded-full text-brand-navy font-semibold bg-white border-2 border-gray-200 hover:bg-gray-50 hover:border-gray-300 transition-all duration-200 flex items-center justify-center space-x-2">
                    <i class="fa-regular fa-file-pdf"></i>
                    <span>Baixar PDF</span>
                </button>
                <button class="w-full sm:w-auto px-10 py-4 rounded-full text-white font-semibold bg-brand-blue hover:bg-blue-800 shadow-lg shadow-blue-500/30 transition-all duration-200 flex items-center justify-center space-x-2">
                    <span>Fechar e Voltar</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </footer>

        </section>
    </main>

    <script src="../../_tablet-nav.js"></script>
</body>
</html>
