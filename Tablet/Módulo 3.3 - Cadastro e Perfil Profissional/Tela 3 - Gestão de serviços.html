<html lang="pt-BR">

  <head>
    <script>
      window.FontAwesomeConfig = {
        autoReplaceSvg: 'nest'
      };
    </script>
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de serviços - MMO Tablet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet">
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js"
      crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
      tailwind.config = {
        theme:
        {
          extend:
          {
            fontFamily:
            {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            },
            colors:
            {
              brand:
              {
                blue: '#0016dc',
                navy: '#1A1A24',
                gray: '#4A4A5A',
                bg: '#F8F9FA',
                white: '#FFFFFF',
                border: '#E5E7EB'
              }
            },
            boxShadow:
            {
              'ambient': '0 12px 40px -12px rgba(0, 22, 220, 0.08), 0 4px 12px -4px rgba(26, 26, 36, 0.05)',
              'input': '0 2px 10px rgba(26, 26, 36, 0.03)',
            }
          }
        }
      }
    </script>
    <style>
      body
      {
        margin: 0;
        padding: 0;
        background-color: #F8F9FA;
        -webkit-font-smoothing: antialiased;
      }

      ::-webkit-scrollbar
      {
        display: none;
      }
    </style>
  </head>

  <body class="min-h-screen flex flex-col font-sans text-brand-navy">
    <!-- Focus Mode Navigation -->
    <header id="header"
      class="w-full bg-brand-white border-b border-brand-border h-[80px] flex items-center justify-between px-8 lg:px-12 shrink-0 z-10 sticky top-0">
      <div class="flex items-center gap-3">
        <div
          class="w-10 h-10 bg-brand-blue rounded-xl flex items-center justify-center text-white font-bold text-xl tracking-tighter">
          M
        </div><span
          class="font-bold text-xl tracking-tight text-brand-navy">MMO</span>
      </div><!-- Stepper -->
      <div class="w-20"></div> <!-- Spacer for centering -->
    </header><!-- Main Content Area -->
    <main id="main-content"
      class="flex-1 w-full flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
      <!-- Centered Workspace Card -->
      <div id="workspace-card"
        class="w-full max-w-[1000px] bg-brand-white rounded-[24px] shadow-ambient p-8 md:p-12 lg:p-16 flex flex-col items-center text-center">
        <!-- Hero Section -->
        <div id="onboarding_hero_header" class="max-w-2xl mx-auto mb-10">
          <h1
            class="text-4xl md:text-5xl font-extrabold tracking-tight text-brand-navy mb-4 leading-tight">
            O que você faz de melhor?
          </h1>
          <p class="text-lg text-brand-gray font-medium">
            Defina sua especialidade principal e até 4 serviços complementares.
          </p>
        </div><!-- Search Area -->
        <div id="service_search_selection"
          class="w-full max-w-[600px] relative mb-12">
          <div class="relative w-full shadow-input rounded-full">
            <div
              class="absolute inset-y-0 left-0 flex items-center pointer-events-none">
              <i
                class="fa-solid fa-magnifying-glass text-brand-gray text-lg"></i>
            </div><input type="text"
              placeholder="Buscar serviços ou especialidades..."
              class="w-full h-16 pr-6 bg-brand-white border border-brand-border rounded-full text-brand-navy text-lg placeholder:text-brand-gray/60 focus:outline-none focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue transition-all">
          </div>
        </div><!-- Active Selection Area -->
        <div id="active_selection" class="w-full mb-12">
          <div class="flex justify-between items-end mb-4 px-2">
            <h3
              class="text-sm font-bold text-brand-navy uppercase tracking-wider">
              Serviços Selecionados</h3><span
              class="text-sm font-semibold text-brand-blue bg-brand-blue/10 px-3 py-1 rounded-full">3/5
              selecionados</span>
          </div>
          <div
            class="flex flex-wrap gap-3 p-6 bg-brand-bg/50 rounded-[20px] border border-brand-border border-dashed min-h-[100px] items-center justify-center">
            <!-- Selected Tags -->
            <div
              class="inline-flex items-center gap-2 px-5 py-2.5 bg-brand-blue text-white rounded-full font-semibold text-sm shadow-sm group cursor-pointer hover:bg-brand-blue/90 transition-colors">
              Elétrica Residencial
              <i
                class="fa-solid fa-xmark text-xs opacity-70 group-hover:opacity-100 ml-1"></i>
            </div>
            <div
              class="inline-flex items-center gap-2 px-5 py-2.5 bg-brand-blue text-white rounded-full font-semibold text-sm shadow-sm group cursor-pointer hover:bg-brand-blue/90 transition-colors">
              Instalação de Ar
              <i
                class="fa-solid fa-xmark text-xs opacity-70 group-hover:opacity-100 ml-1"></i>
            </div>
            <div
              class="inline-flex items-center gap-2 px-5 py-2.5 bg-brand-blue text-white rounded-full font-semibold text-sm shadow-sm group cursor-pointer hover:bg-brand-blue/90 transition-colors">
              Manutenção
              <i
                class="fa-solid fa-xmark text-xs opacity-70 group-hover:opacity-100 ml-1"></i>
            </div>
          </div>
        </div><!-- Suggested Categories Grid -->
        <div id="suggested_services_grid" class="w-full mb-16 text-left">
          <h3
            class="text-sm font-bold text-brand-gray uppercase tracking-wider mb-5 px-2">
            Mais buscados em Camboriú e região</h3>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <button
              class="flex items-center justify-between px-5 py-3.5 border-2 border-brand-blue/20 rounded-full text-brand-blue font-semibold hover:bg-brand-blue hover:text-white hover:border-brand-blue transition-all group"><span>Elétrica
                Residencial</span><i
                class="fa-solid fa-plus group-hover:rotate-90 transition-transform"></i></button><button
              class="flex items-center justify-between px-5 py-3.5 border-2 border-brand-blue/20 rounded-full text-brand-blue font-semibold hover:bg-brand-blue hover:text-white hover:border-brand-blue transition-all group"><span>Manutenção
                Preventiva</span><i
                class="fa-solid fa-plus group-hover:rotate-90 transition-transform"></i></button><button
              class="flex items-center justify-between px-5 py-3.5 border-2 border-brand-blue/20 rounded-full text-brand-blue font-semibold hover:bg-brand-blue hover:text-white hover:border-brand-blue transition-all group"><span>Instalação
                de Painéis</span><i
                class="fa-solid fa-plus group-hover:rotate-90 transition-transform"></i></button><button
              class="flex items-center justify-between px-5 py-3.5 border-2 border-brand-blue/20 rounded-full text-brand-blue font-semibold hover:bg-brand-blue hover:text-white hover:border-brand-blue transition-all group"><span>Diagnóstico
                de Falhas</span><i
                class="fa-solid fa-plus group-hover:rotate-90 transition-transform"></i></button><button
              class="flex items-center justify-between px-5 py-3.5 border-2 border-brand-blue/20 rounded-full text-brand-blue font-semibold hover:bg-brand-blue hover:text-white hover:border-brand-blue transition-all group"><span>Projetos
                Luminotécnicos</span><i
                class="fa-solid fa-plus group-hover:rotate-90 transition-transform"></i></button><button
              class="flex items-center justify-between px-5 py-3.5 border-2 border-brand-border rounded-full text-brand-gray font-semibold hover:bg-brand-bg transition-all"><span>Ver
                todos os serviços</span><i
                class="fa-solid fa-arrow-right"></i></button></div>
        </div><!-- Primary Action Footer -->
        <div id="primary_action_footer" class="w-full mt-auto"><button
            class="w-full bg-brand-blue text-white rounded-full py-5 text-lg font-bold shadow-lg shadow-brand-blue/20 hover:bg-brand-blue/90 hover:shadow-xl hover:-translate-y-0.5 transition-all duration-200">
            Avançar para o Próximo Passo
          </button></div>
      </div><!-- Meta Footer -->
      <footer id="footer" class="mt-8 text-center">
        <p
          class="text-sm font-medium text-brand-gray flex items-center justify-center gap-2">
          <i class="fa-solid fa-lock text-brand-blue/60"></i>
          Ambiente seguro. Suas informações estão protegidas.
        </p>
      </footer>
    </main>
      <script src="../../_tablet-nav.js"></script>
</body>

</html>
