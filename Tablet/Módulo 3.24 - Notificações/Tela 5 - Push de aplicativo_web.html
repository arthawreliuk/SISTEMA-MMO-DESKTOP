<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Push de aplicativo_web - MMO Tablet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.plot.ly/plotly-3.1.1.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        navy: '#1A1A24',
                        offwhite: '#F8F9FA',
                        success: '#10B981',
                        action: '#0016dc',
                        surface: '#FFFFFF',
                        border: '#E5E7EB',
                        muted: '#6B7280'
                    },
                    boxShadow: {
                        'toast': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04), 0 0 50px -12px rgba(0, 22, 220, 0.15)',
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; font-family: 'Plus Jakarta Sans', sans-serif; color: #1A1A24; overflow: hidden; }
        ::-webkit-scrollbar { display: none; }
        .blur-overlay { backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
        .toast-enter { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp {
            from { transform: translateY(100%) translateX(-50%); opacity: 0; }
            to { transform: translateY(0) translateX(-50%); opacity: 1; }
        }
    </style>
</head>
<body class="antialiased min-h-screen w-full relative">

    <!-- Dashboard Background Context (Blurred) -->
    <div class="absolute inset-0 z-0 p-8 grid grid-cols-12 gap-6 blur-[3px] opacity-60 pointer-events-none transition-all duration-500" id="dashboard-bg">
        
        <!-- Sidebar Mock -->
        <div class="col-span-2 flex flex-col gap-8">
            <div class="w-32 h-8 bg-gray-200 rounded-md"></div>
            <div class="flex flex-col gap-4 mt-8">
                <div class="w-full h-10 bg-gray-200 rounded-lg"></div>
                <div class="w-full h-10 bg-gray-100 rounded-lg"></div>
                <div class="w-full h-10 bg-gray-100 rounded-lg"></div>
                <div class="w-full h-10 bg-gray-100 rounded-lg"></div>
            </div>
        </div>

        <!-- Main Content Area Mock -->
        <div class="col-span-10 flex flex-col gap-6">
            <!-- Header -->
            <div class="flex justify-between items-center mb-4">
                <div class="w-64 h-10 bg-gray-200 rounded-lg"></div>
                <div class="flex gap-4">
                    <div class="w-10 h-10 bg-gray-200 rounded-full"></div>
                    <div class="w-10 h-10 bg-gray-200 rounded-full"></div>
                </div>
            </div>

            <!-- Top Cards -->
            <div class="grid grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-[24px] shadow-card h-40 border border-gray-100">
                    <div class="w-1/2 h-6 bg-gray-100 rounded mb-4"></div>
                    <div class="w-3/4 h-12 bg-gray-200 rounded"></div>
                </div>
                <div class="bg-white p-6 rounded-[24px] shadow-card h-40 border border-gray-100">
                    <div class="w-1/2 h-6 bg-gray-100 rounded mb-4"></div>
                    <div class="w-3/4 h-12 bg-gray-200 rounded"></div>
                </div>
                <div class="bg-[#1A1A24] p-6 rounded-[24px] shadow-card h-40 relative ">
                    <div class="absolute inset-0 bg-gradient-to-br from-transparent to-[#0016dc] opacity-20"></div>
                    <div class="w-1/2 h-6 bg-gray-700 rounded mb-4"></div>
                    <div class="w-3/4 h-12 bg-gray-600 rounded"></div>
                </div>
            </div>

            <!-- Main Chart Area -->
            <div class="bg-white p-8 rounded-[32px] shadow-card h-[400px] border border-gray-100 flex flex-col">
                <div class="flex justify-between mb-8">
                    <div class="w-48 h-8 bg-gray-200 rounded"></div>
                    <div class="w-24 h-8 bg-gray-100 rounded"></div>
                </div>
                <div class="flex-1 flex items-end gap-4">
                    <div class="w-full bg-gray-100 rounded-t-lg h-[40%]"></div>
                    <div class="w-full bg-gray-200 rounded-t-lg h-[60%] relative"><div class="absolute top-0 left-0 right-0 h-1 bg-red-500 rounded-t-lg"></div></div>
                    <div class="w-full bg-gray-100 rounded-t-lg h-[30%]"></div>
                    <div class="w-full bg-gray-200 rounded-t-lg h-[80%] relative"><div class="absolute top-0 left-0 right-0 h-1 bg-red-500 rounded-t-lg"></div></div>
                    <div class="w-full bg-gray-100 rounded-t-lg h-[50%]"></div>
                    <div class="w-full bg-gray-200 rounded-t-lg h-[70%] relative"><div class="absolute top-0 left-0 right-0 h-1 bg-red-500 rounded-t-lg"></div></div>
                    <div class="w-full bg-gray-100 rounded-t-lg h-[20%]"></div>
                </div>
            </div>
            
            <!-- Bottom Data Table Mock -->
            <div class="bg-white p-8 rounded-[32px] shadow-card h-[300px] border border-gray-100">
                 <div class="w-64 h-8 bg-gray-200 rounded mb-6"></div>
                 <div class="flex flex-col gap-4">
                     <div class="w-full h-12 bg-gray-50 rounded-lg"></div>
                     <div class="w-full h-12 bg-gray-50 rounded-lg"></div>
                     <div class="w-full h-12 bg-gray-50 rounded-lg"></div>
                 </div>
            </div>
        </div>
    </div>

    <!-- Overlay to ensure contrast for toast -->
    <div class="absolute inset-0 z-10 bg-gray-900/5 pointer-events-none"></div>

    <!-- Floating Toast Notification -->
    <div class="absolute bottom-12 left-1/2 -translate-x-1/2 z-50 toast-enter w-[90%] max-w-[600px]" id="toast-container">
        <div class="bg-surface rounded-full py-4 px-6 shadow-toast border border-gray-100 flex items-center justify-between gap-4 backdrop-blur-xl bg-white/95">
            
            <!-- Left: Icon & Message -->
            <div class="flex items-center gap-4 flex-1">
                <div class="w-8 h-8 rounded-full bg-success/10 flex items-center justify-center shrink-0">
                    <i class="fa-solid fa-check text-success text-sm"></i>
                </div>
                <p class="text-navy font-medium text-[15px] tracking-tight truncate">
                    Modelo de contrato salvo nos seus favoritos.
                </p>
            </div>

            <!-- Right: Actions -->
            <div class="flex items-center gap-5 shrink-0 border-l border-gray-100">
                <button class="text-action font-semibold text-[14px] hover:text-blue-800 transition-colors duration-200 focus:outline-none">
                    Desfazer
                </button>
                <button class="text-muted hover:text-navy transition-colors duration-200 focus:outline-none w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-50" aria-label="Close notification">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            
        </div>
    </div>

    <script src="../../_tablet-nav.js"></script>
</body>
</html>
