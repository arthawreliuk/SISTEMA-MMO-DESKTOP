<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Enterprise Account Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script> window.FontAwesomeConfig = { autoReplaceSvg: 'nest'};</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        background: '#F8F9FA',
                        surface: '#FFFFFF',
                        navy: '#1A1A24',
                        blue: {
                            trust: '#0016dc',
                            hover: '#0012b3'
                        },
                        border: '#E2E8F0',
                        muted: '#64748B'
                    },
                    boxShadow: {
                        'ambient': '0 20px 40px -15px rgba(0, 0, 0, 0.05), 0 0 20px rgba(0, 0, 0, 0.02)',
                        'input': '0 2px 4px rgba(0,0,0,0.02)'
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; color: #1A1A24; min-height: 100vh; display: flex; flex-direction: column; }
        ::-webkit-scrollbar { display: none; }
        
        /* Loading dot animation */
        .loading-dots::after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); }
            40% { color: #64748B; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); }
            60% { text-shadow: .25em 0 0 #64748B, .5em 0 0 rgba(0,0,0,0); }
            80%, 100% { text-shadow: .25em 0 0 #64748B, .5em 0 0 #64748B; }
        }
    </style>
</head>
<body class="antialiased bg-background font-sans selection:bg-blue-trust selection:text-white">

    <!-- Global Header -->
    <header id="header" class="w-full py-8 flex justify-center items-center absolute top-0 left-0 right-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-navy rounded-xl flex items-center justify-center shadow-sm">
                <span class="text-white font-bold text-xl tracking-tighter">M</span>
            </div>
            <span class="text-2xl font-extrabold tracking-tight text-navy">MMO</span>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="flex-grow flex items-center justify-center p-6 mt-16 md:mt-0">
        
        <!-- Registration Canvas -->
        <div id="registration-card" class="w-full max-w-[800px] bg-surface rounded-[24px] shadow-ambient p-8 md:p-12 relative overflow-hidden">
            
            <!-- Subtle background pattern (from ref inspiration) -->
            <div class="absolute top-0 right-0 w-64 h-64 bg-blue-trust/5 rounded-full blur-3xl -mr-32 -mt-32 pointer-events-none"></div>

            <!-- Top Progress Bar -->
            <div id="progress-tracker" class="flex items-center justify-center gap-2 md:gap-4 mb-12">
                
                <!-- Step 1 (Active) -->
                <div class="flex items-center gap-2 bg-blue-trust text-white px-4 py-2 rounded-full text-sm font-semibold shadow-md transition-all">
                    <span class="w-5 h-5 rounded-full bg-white/20 flex items-center justify-center text-xs">1</span>
                    <span>Cadastro</span>
                </div>

                <!-- Connector -->
                <div class="w-8 md:w-16 h-[2px] bg-border rounded-full"></div>

                <!-- Step 2 -->
                <div class="flex items-center gap-2 bg-background text-muted border border-border px-4 py-2 rounded-full text-sm font-medium transition-all">
                    <span class="w-5 h-5 rounded-full bg-border/50 flex items-center justify-center text-xs text-navy">2</span>
                    <span class="hidden sm:inline">Documentação</span>
                    <span class="sm:hidden">Docs</span>
                </div>

                <!-- Connector -->
                <div class="w-8 md:w-16 h-[2px] bg-border rounded-full"></div>

                <!-- Step 3 -->
                <div class="flex items-center gap-2 bg-background text-muted border border-border px-4 py-2 rounded-full text-sm font-medium transition-all">
                    <span class="w-5 h-5 rounded-full bg-border/50 flex items-center justify-center text-xs text-navy">3</span>
                    <span class="hidden sm:inline">Planos B2B</span>
                    <span class="sm:hidden">Planos</span>
                </div>

            </div>

            <!-- Header -->
            <div id="form-header" class="text-center mb-10">
                <h1 class="text-3xl md:text-4xl font-bold text-navy tracking-tight mb-3">Abra sua Conta Corporativa</h1>
                <p class="text-muted text-base">Preencha os dados da sua empresa para iniciarmos a análise.</p>
            </div>

            <!-- Form Layout -->
            <form id="registration-form" class="space-y-6 relative z-10" onsubmit="event.preventDefault();">
                
                <!-- Row 1: CNPJ -->
                <div id="form-row-1" class="w-full">
                    <label for="cnpj" class="block text-sm font-semibold text-navy mb-2 ml-2">CNPJ</label>
                    <div class="relative">
                        <input type="text" id="cnpj" placeholder="00.000.000/0000-00" 
                            class="w-full bg-background border border-border rounded-full px-6 py-4 text-navy font-medium placeholder:text-muted/60 focus:outline-none focus:ring-2 focus:ring-blue-trust/20 focus:border-blue-trust transition-all shadow-input">
                        
                        <!-- Automation Micro-interaction -->
                        <div class="absolute right-6 top-1/2 -translate-y-1/2 flex items-center gap-2 text-xs font-medium text-muted bg-background/80 backdrop-blur-sm px-2 py-1 rounded-md">
                            <i class="fa-solid fa-bolt text-blue-trust/80"></i>
                            <span class="loading-dots">Buscando dados na Receita</span>
                        </div>
                    </div>
                </div>

                <!-- Row 2: Razão Social & Nome Fantasia -->
                <div id="form-row-2" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="razao_social" class="block text-sm font-semibold text-navy mb-2 ml-2">Razão Social</label>
                        <input type="text" id="razao_social" placeholder="Sua Empresa LTDA" 
                            class="w-full bg-background border border-border rounded-full px-6 py-4 text-navy font-medium placeholder:text-muted/60 focus:outline-none focus:ring-2 focus:ring-blue-trust/20 focus:border-blue-trust transition-all shadow-input">
                    </div>
                    <div>
                        <label for="nome_fantasia" class="block text-sm font-semibold text-navy mb-2 ml-2">Nome Fantasia</label>
                        <input type="text" id="nome_fantasia" placeholder="Nome Comercial" 
                            class="w-full bg-background border border-border rounded-full px-6 py-4 text-navy font-medium placeholder:text-muted/60 focus:outline-none focus:ring-2 focus:ring-blue-trust/20 focus:border-blue-trust transition-all shadow-input">
                    </div>
                </div>

                <!-- Row 3: E-mail do Gestor & Telefone Comercial -->
                <div id="form-row-3" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="email" class="block text-sm font-semibold text-navy mb-2 ml-2">E-mail do Gestor</label>
                        <div class="relative">
                            <div class="absolute left-6 top-1/2 -translate-y-1/2 text-muted/60">
                                <i class="fa-regular fa-envelope"></i>
                            </div>
                            <input type="email" id="email" placeholder="gestor@empresa.com.br" 
                                class="w-full bg-background border border-border rounded-full pl-12 pr-6 py-4 text-navy font-medium placeholder:text-muted/60 focus:outline-none focus:ring-2 focus:ring-blue-trust/20 focus:border-blue-trust transition-all shadow-input">
                        </div>
                    </div>
                    <div>
                        <label for="telefone" class="block text-sm font-semibold text-navy mb-2 ml-2">Telefone Comercial</label>
                        <div class="relative">
                            <div class="absolute left-6 top-1/2 -translate-y-1/2 text-muted/60">
                                <i class="fa-solid fa-phone"></i>
                            </div>
                            <input type="tel" id="telefone" placeholder="(00) 0000-0000" 
                                class="w-full bg-background border border-border rounded-full pl-12 pr-6 py-4 text-navy font-medium placeholder:text-muted/60 focus:outline-none focus:ring-2 focus:ring-blue-trust/20 focus:border-blue-trust transition-all shadow-input">
                        </div>
                    </div>
                </div>

                <!-- Footer Action Area -->
                <div id="form-footer" class="pt-8 mt-4 border-t border-border flex flex-col-reverse sm:flex-row items-center justify-between gap-4">
                    
                    <button type="button" class="w-full sm:w-auto px-8 py-4 rounded-full text-navy font-semibold hover:bg-background transition-colors flex items-center justify-center gap-2 group">
                        <i class="fa-solid fa-arrow-left text-sm text-muted group-hover:-translate-x-1 transition-transform"></i>
                        Cancelar
                    </button>

                    <button type="submit" onclick="window.location.href='Tela 2- Painel da empresa.html'" class="w-full sm:w-auto bg-blue-trust hover:bg-blue-hover text-white px-10 py-4 rounded-full font-bold shadow-lg shadow-blue-trust/20 transition-all flex items-center justify-center gap-3 group">
                        <i class="fa-solid fa-lock text-sm opacity-80"></i>
                        Continuar Cadastro
                        <i class="fa-solid fa-arrow-right text-sm group-hover:translate-x-1 transition-transform"></i>
                    </button>

                </div>

            </form>
        </div>
    </main>

    <!-- Subtle Footer for balance -->
    <footer id="footer" class="py-6 text-center text-xs text-muted/60 font-medium pb-8">
        <p>&copy; 2026 MMO Enterprise. Ambientes seguros e criptografados.</p>
    </footer>

    <script src="../_nav-helper.js"></script>
</body>
</html>
