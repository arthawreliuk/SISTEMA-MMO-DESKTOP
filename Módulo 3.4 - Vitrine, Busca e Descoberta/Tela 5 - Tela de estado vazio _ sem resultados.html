<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empty State - MMO Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script> window.FontAwesomeConfig = { autoReplaceSvg: 'nest'};</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#0016dc',
                            navy: '#1A1A24',
                            offwhite: '#F8F9FA',
                            gray: '#E5E5E5',
                            lightgray: '#F5F5F5',
                            darkgray: '#777777',
                        }
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.04)',
                        'floating': '0 20px 40px -20px rgba(0, 22, 220, 0.15)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-brand-navy min-h-screen flex flex-col font-sans">

    <!-- Navigation -->
    <header id="header" class="w-full bg-white border-b border-brand-gray/50 sticky top-0 z-50">
        <div class="max-w-[1200px] mx-auto px-6 h-[80px] flex items-center justify-between">
            <!-- Logo -->
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-brand-blue rounded-lg flex items-center justify-center text-white font-bold text-xl leading-none">M</div>
                <span class="font-bold text-xl tracking-tight text-brand-navy">MMO</span>
            </div>

            <!-- Nav Icons -->
            <nav class="flex items-center gap-8">
                <a href="#" class="relative flex flex-col items-center text-brand-navy group">
                    <i class="fa-solid fa-house text-xl mb-1"></i>
                    <span class="absolute -bottom-3 w-1.5 h-1.5 bg-brand-blue rounded-full"></span>
                </a>
                <a href="#" class="flex flex-col items-center text-brand-darkgray hover:text-brand-navy transition-colors">
                    <i class="fa-solid fa-clipboard-list text-xl"></i>
                </a>
                <a href="#" class="flex flex-col items-center text-brand-darkgray hover:text-brand-navy transition-colors">
                    <i class="fa-regular fa-message text-xl"></i>
                </a>
                <a href="#" class="flex flex-col items-center text-brand-darkgray hover:text-brand-navy transition-colors">
                    <i class="fa-regular fa-user text-xl"></i>
                </a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="flex-grow w-full max-w-[1200px] mx-auto px-6 py-12 flex flex-col">
        
        <!-- Premium Search Bar -->
        <section id="search-section" class="w-full mb-16">
            <div class="max-w-3xl mx-auto">
                <div class="relative flex items-center w-full bg-white rounded-full shadow-soft border border-brand-gray/30 px-6 py-4 transition-shadow hover:shadow-md">
                    <i class="fa-solid fa-magnifying-glass text-brand-darkgray text-lg mr-4"></i>
                    <input type="text" value="Encanador industrial 24h" class="w-full text-lg font-medium text-brand-navy bg-transparent outline-none placeholder-brand-darkgray/50" placeholder="O que você precisa?" readonly>
                    <button class="ml-4 w-10 h-10 rounded-full bg-brand-lightgray flex items-center justify-center text-brand-darkgray hover:bg-brand-gray transition-colors">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- Empty State Block -->
        <section id="empty-state-workspace" class="w-full flex-grow flex flex-col items-center justify-center mb-24">
            <div class="w-full max-w-4xl bg-white rounded-[32px] shadow-soft p-16 flex flex-col items-center text-center relative overflow-hidden">
                
                <!-- Decorative Background Elements -->
                <div class="absolute top-0 left-0 w-full h-full pointer-events-none overflow-hidden rounded-[32px]">
                    <div class="absolute -top-20 -right-20 w-64 h-64 bg-brand-blue/5 rounded-full blur-3xl"></div>
                    <div class="absolute -bottom-20 -left-20 w-80 h-80 bg-brand-blue/5 rounded-full blur-3xl"></div>
                </div>

                <!-- Illustration Container -->
                <div class="w-64 h-64 mb-10 relative z-10 flex items-center justify-center">
                    <div class="absolute inset-0 bg-brand-lightgray rounded-full opacity-50"></div>
                    <img class="w-full h-full object-contain relative z-10 drop-shadow-xl" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/17bf60642b-9e48d41671ceaa783b19.png" alt="elegant modern vector illustration of a magnifying glass looking at an empty folder or floating abstract shapes, representing" />
                </div>

                <!-- Typography -->
                <h1 class="text-4xl md:text-5xl font-bold text-brand-navy tracking-tight mb-6 relative z-10 max-w-2xl">
                    Não encontramos o que você procura.
                </h1>
                <p class="text-lg text-brand-darkgray max-w-xl mb-12 leading-relaxed relative z-10">
                    Ajuste os termos ou navegue pelas nossas categorias mais requisitadas abaixo.
                </p>

                <!-- Action Button -->
                <button onclick="window.location.href='Tela 1 - Tela inicial de busca.html'" class="relative z-10 bg-brand-blue hover:bg-[#0012b3] text-white font-semibold text-lg px-10 py-5 rounded-full shadow-floating transition-all transform hover:-translate-y-1 flex items-center gap-3">
                    <i class="fa-solid fa-rotate-right"></i>
                    Recomeçar Busca
                </button>
            </div>
        </section>

        <!-- Suggested Categories Grid -->
        <section id="suggested-categories" class="w-full max-w-4xl mx-auto mb-20 text-center">
            <h3 class="text-sm font-bold tracking-widest text-brand-darkgray uppercase mb-8">Mais procurados na região:</h3>
            
            <div class="flex flex-wrap justify-center gap-4">
                <button onclick="window.location.href='Tela 2 - Tela de listagem de profissionais.html'" class="px-6 py-3 rounded-full border border-brand-blue/20 bg-white text-brand-blue font-semibold hover:bg-brand-blue/5 hover:border-brand-blue/30 transition-all flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-plus text-sm"></i> Elétrica Residencial
                </button>
                <button onclick="window.location.href='Tela 2 - Tela de listagem de profissionais.html'" class="px-6 py-3 rounded-full border border-brand-blue/20 bg-white text-brand-blue font-semibold hover:bg-brand-blue/5 hover:border-brand-blue/30 transition-all flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-plus text-sm"></i> Climatização
                </button>
                <button onclick="window.location.href='Tela 2 - Tela de listagem de profissionais.html'" class="px-6 py-3 rounded-full border border-brand-blue/20 bg-white text-brand-blue font-semibold hover:bg-brand-blue/5 hover:border-brand-blue/30 transition-all flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-plus text-sm"></i> Limpeza Pós-Obra
                </button>
                <button onclick="window.location.href='Tela 2 - Tela de listagem de profissionais.html'" class="px-6 py-3 rounded-full border border-brand-blue/20 bg-white text-brand-blue font-semibold hover:bg-brand-blue/5 hover:border-brand-blue/30 transition-all flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-plus text-sm"></i> Pintura Externa
                </button>
                <button onclick="window.location.href='Tela 2 - Tela de listagem de profissionais.html'" class="px-6 py-3 rounded-full border border-brand-blue/20 bg-white text-brand-blue font-semibold hover:bg-brand-blue/5 hover:border-brand-blue/30 transition-all flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-plus text-sm"></i> Montagem de Móveis
                </button>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer id="footer" class="w-full bg-white border-t border-brand-gray/50 py-12 mt-auto">
        <div class="max-w-[1200px] mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 bg-brand-navy rounded text-white flex items-center justify-center font-bold text-xs">M</div>
                <span class="font-semibold text-brand-navy">MMO Platform &copy; 2026</span>
            </div>
            
            <div class="flex gap-8 text-sm text-brand-darkgray font-medium">
                <a href="#" class="hover:text-brand-blue transition-colors">Termos de Uso</a>
                <a href="#" class="hover:text-brand-blue transition-colors">Privacidade</a>
                <a href="#" class="hover:text-brand-blue transition-colors">Ajuda</a>
            </div>
        </div>
    </footer>

    <script src="../_nav-helper.js"></script>
</body>
</html>
