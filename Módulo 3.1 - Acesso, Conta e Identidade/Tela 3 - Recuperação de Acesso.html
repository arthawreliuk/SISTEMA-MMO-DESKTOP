<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperação de Senha | MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#0016dc',
                            navy: '#111827', // Deep Navy replacing pure black
                            bg: '#F8F9FA',
                            gray: {
                                50: '#F9FAFB',
                                100: '#F3F4F6',
                                200: '#E5E7EB',
                                300: '#D1D5DB',
                                400: '#9CA3AF',
                                500: '#6B7280',
                                600: '#4B5563',
                                700: '#374151',
                                800: '#1F2937',
                                900: '#111827',
                            }
                        }
                    },
                    boxShadow: {
                        'card': '0 20px 40px -15px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0, 0, 0, 0.03)',
                        'input': '0 1px 2px 0 rgba(0, 0, 0, 0.05)',
                        'button': '0 4px 6px -1px rgba(0, 22, 220, 0.2), 0 2px 4px -1px rgba(0, 22, 220, 0.1)'
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; }
        ::-webkit-scrollbar { display: none; }
        
        /* Subtle gradient background inspired by references but adapted to brand */
        .card-gradient {
            background: linear-gradient(180deg, #FFFFFF 0%, #FCFCFD 100%);
        }
        
        /* Refined input focus ring */
        .input-focus-ring:focus-within {
            box-shadow: 0 0 0 3px rgba(0, 22, 220, 0.15);
            border-color: #0016dc;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center font-sans text-brand-navy antialiased selection:bg-brand-blue selection:text-white relative overflow-hidden">

    <!-- Ambient Background Glow (Subtle, inspired by ref modal backgrounds) -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-brand-blue/5 rounded-full blur-[120px] pointer-events-none"></div>

    <main id="recovery-workspace" class="w-full max-w-[450px] px-6 z-10 flex flex-col items-center">
        
        <!-- Branding Header -->
        <header id="logo_header" class="mb-8 flex justify-center w-full">
            <div class="h-12 w-auto flex items-center justify-center">
                <!-- MMO Logo Placeholder - Using text for crispness as per brief, could be SVG -->
                <span class="text-3xl font-extrabold tracking-tighter text-brand-blue">MMO<span class="text-brand-navy">.</span></span>
            </div>
        </header>

        <!-- Main Content Canvas (Pure White Card) -->
        <section id="recovery_card" class="w-full bg-white rounded-3xl shadow-card border border-brand-gray-100 overflow-hidden relative">
            
            <!-- Close button (from references) -->
            <button onclick="window.location.href='Tela 2 - Login.html'" class="absolute top-5 right-5 w-8 h-8 flex items-center justify-center rounded-full hover:bg-brand-gray-50 text-brand-gray-400 hover:text-brand-gray-600 transition-colors border border-transparent hover:border-brand-gray-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>

            <div class="p-8 sm:p-10 card-gradient">
                
                <!-- Typography Section -->
                <div class="text-center mb-8">
                    <h1 class="text-[28px] leading-tight font-bold text-brand-navy mb-3 tracking-tight">Esqueceu sua senha?</h1>
                    <p class="text-brand-gray-500 text-[15px] leading-relaxed font-medium max-w-[320px] mx-auto">
                        Sem problemas. Digite seu e-mail abaixo e nós cuidamos do resto.
                    </p>
                </div>

                <!-- Form Area -->
                <form class="space-y-6" onsubmit="event.preventDefault(); window.location.href='Tela 5 - Seleção_Alternância de Contexto.html';">
                    
                    <div class="space-y-2">
                        <label for="email" class="block text-sm font-semibold text-brand-navy">
                            E-mail da sua conta<span class="text-brand-gray-400 ml-1">*</span>
                        </label>
                        <div class="relative input-focus-ring rounded-xl transition-all duration-200 border border-brand-gray-200 bg-white shadow-input">
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                placeholder="exemplo@empresa.com" 
                                class="w-full px-4 py-3.5 bg-transparent text-brand-navy placeholder-brand-gray-400 text-[15px] outline-none rounded-xl font-medium"
                                required
                            >
                        </div>
                    </div>

                    <!-- Divider (inspired by ref 2 & 3) -->
                    <div class="py-2">
                        <div class="h-px bg-brand-gray-100 w-full"></div>
                    </div>

                    <!-- Action Area -->
                    <div id="action_area" class="pt-2">
                        <button 
                            type="submit" 
                            class="w-full bg-brand-blue hover:bg-[#0012b3] text-white font-semibold py-3.5 px-6 rounded-full shadow-button transition-all duration-200 flex items-center justify-center gap-2 active:scale-[0.98]"
                        >
                            <span>Enviar Instruções de Acesso</span>
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-80"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                        </button>
                    </div>
                    
                </form>
            </div>
            
            <!-- Bottom decorative line (subtle detail from refs) -->
            <div class="h-1 w-full bg-gradient-to-r from-transparent via-brand-gray-100 to-transparent"></div>
        </section>

        <!-- Support Footer -->
        <footer id="support_footer" class="w-full mt-6 flex justify-end px-2">
            <a href="#" class="text-[14px] font-medium text-brand-gray-500 hover:text-brand-blue transition-colors flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
                Precisa de ajuda com seu acesso?
            </a>
        </footer>

    </main>

    <script src="../_nav-helper.js"></script>
</body>
</html>
