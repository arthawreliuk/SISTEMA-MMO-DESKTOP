<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP / Security Validation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            DEFAULT: '#0016dc',
                            light: '#e6e8fc',
                        },
                        surface: {
                            bg: '#F8F9FA',
                            card: '#FFFFFF',
                        },
                        text: {
                            main: '#111827', // Avoid pure black
                            muted: '#646D86',
                        }
                    },
                    boxShadow: {
                        'ambient': '0 12px 32px -8px rgba(0, 0, 0, 0.08), 0 4px 16px -4px rgba(0, 0, 0, 0.04)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; }
        
        /* Input focus transitions */
        .otp-input {
            transition: all 0.2s ease-in-out;
        }
        .otp-input:focus {
            outline: none;
            border-color: #0016dc;
            box-shadow: 0 0 0 4px rgba(0, 22, 220, 0.1);
            background-color: #ffffff;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans text-text-main bg-surface-bg items-center justify-center relative overflow-hidden">

    <!-- Minimalist Navigation -->
    <nav id="minimalist_nav" class="absolute top-0 w-full py-8 flex justify-center z-10">
        <div onclick="window.location.href='Tela 2 - Login.html'" class="flex items-center gap-2 cursor-pointer">
            <div class="w-10 h-10 bg-brand rounded-xl flex items-center justify-center shadow-lg shadow-brand/20">
                <i class="fa-solid fa-shield-halved text-white text-xl"></i>
            </div>
            <span class="text-2xl font-extrabold tracking-tight text-text-main">MMO</span>
        </div>
    </nav>

    <!-- Main Workspace Area -->
    <main class="w-full max-w-full flex justify-center items-center px-4 py-24 z-10">
        
        <!-- The Card -->
        <div id="otp_workspace" class="w-full max-w-[500px] bg-surface-card rounded-[24px] shadow-ambient overflow-hidden relative">
            
            <!-- Progress Indicator Track -->
            <div id="progress_indicator" class="w-full h-1.5 bg-gray-100 flex">
                <div class="w-3/4 bg-gray-200"></div>
                <div class="w-1/4 bg-brand relative">
                    <div class="absolute right-0 top-1/2 -translate-y-1/2 w-3 h-3 bg-brand rounded-full shadow-[0_0_8px_rgba(0,22,220,0.6)]"></div>
                </div>
            </div>

            <div class="p-10 flex flex-col items-center">
                
                <!-- Security Header -->
                <div id="security_header" class="text-center mb-10 w-full relative">
                    <div class="w-16 h-16 mx-auto bg-brand-light rounded-2xl flex items-center justify-center mb-6">
                        <i class="fa-solid fa-mobile-screen-button text-brand text-2xl"></i>
                    </div>
                    <h1 class="text-[28px] leading-tight font-bold text-text-main mb-3">Verificação de Segurança</h1>
                    <p class="text-text-muted text-[15px] leading-relaxed max-w-[320px] mx-auto">
                        Insira o código de 6 dígitos enviado para o seu dispositivo autenticador.
                    </p>
                </div>

                <!-- OTP Inputs -->
                <div class="flex justify-center gap-3 mb-10 w-full">
                    <input type="text" maxlength="1" value="8" class="otp-input w-[60px] h-[72px] rounded-xl border border-brand bg-white text-brand text-3xl font-bold text-center shadow-[0_0_0_4px_rgba(0,22,220,0.1)]" />
                    <input type="text" maxlength="1" value="6" class="otp-input w-[60px] h-[72px] rounded-xl border border-gray-200 bg-gray-50 text-text-main text-3xl font-bold text-center hover:border-gray-300" />
                    <input type="text" maxlength="1" value="0" class="otp-input w-[60px] h-[72px] rounded-xl border border-gray-200 bg-gray-50 text-text-main text-3xl font-bold text-center hover:border-gray-300" />
                    <input type="text" maxlength="1" value="2" class="otp-input w-[60px] h-[72px] rounded-xl border border-gray-200 bg-gray-50 text-text-main text-3xl font-bold text-center hover:border-gray-300" />
                    <input type="text" maxlength="1" value="2" class="otp-input w-[60px] h-[72px] rounded-xl border border-gray-200 bg-gray-50 text-text-main text-3xl font-bold text-center hover:border-gray-300" />
                    <input type="text" maxlength="1" value="5" class="otp-input w-[60px] h-[72px] rounded-xl border border-gray-200 bg-gray-50 text-text-main text-3xl font-bold text-center hover:border-gray-300" />
                </div>

                <!-- Divider OR -->
                <div class="w-full flex items-center gap-4 mb-8">
                    <div class="h-px bg-gray-200 flex-1"></div>
                    <span class="text-xs font-semibold text-text-muted uppercase tracking-wider">OU</span>
                    <div class="h-px bg-gray-200 flex-1"></div>
                </div>

                <!-- Recovery Code Option -->
                <div class="w-full mb-10">
                    <p class="text-sm font-medium text-text-main mb-3 text-center">Cole sua chave de segurança mestre</p>
                    <div class="relative w-full">
                        <input type="password" value="........................" class="w-full h-14 pl-4 pr-12 rounded-xl border border-gray-200 bg-white text-text-muted text-xl tracking-[0.2em] focus:outline-none focus:border-brand focus:ring-2 focus:ring-brand/10 transition-all" readonly />
                        <button class="absolute right-3 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 text-text-muted transition-colors">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>
                </div>

                <!-- Primary Action -->
                <button onclick="window.location.href='Tela 6 - Painel Inicial Pós-Login.html'" class="w-full h-[56px] bg-brand hover:bg-[#0012b3] text-white rounded-full font-semibold text-[16px] shadow-lg shadow-brand/25 transition-all active:scale-[0.98] mb-6 flex items-center justify-center gap-2">
                    Confirmar Verificação
                    <i class="fa-solid fa-arrow-right text-sm"></i>
                </button>

                <!-- Secondary Actions -->
                <div id="secondary_actions" class="w-full flex items-center justify-between mt-2">
                    <button class="flex items-center gap-2 px-4 py-2.5 rounded-lg border border-gray-200 text-text-main font-medium text-sm hover:bg-gray-50 transition-colors">
                        <i class="fa-regular fa-circle-question"></i>
                        Precisa de ajuda?
                    </button>
                    <button class="text-text-muted hover:text-brand font-medium text-sm transition-colors px-2 py-2">
                        Tentar outro método
                    </button>
                </div>

            </div>
        </div>
    </main>

    <!-- Background decorative elements based on reference blur/glow -->
    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[600px] bg-brand/5 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <script>
        // Simple auto-focus simulation for inputs
        document.querySelectorAll('.otp-input').forEach((input, index, inputs) => {
            input.addEventListener('input', function() {
                if(this.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', function(e) {
                if(e.key === 'Backspace' && this.value.length === 0 && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>
    <script src="../_nav-helper.js"></script>
</body>
</html>
