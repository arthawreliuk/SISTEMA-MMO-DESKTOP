<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Request Creation Wizard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0016dc',
                        'primary-light': '#E5E8FA',
                        surface: '#F8F9FA',
                        navy: '#1A1A24',
                        'navy-light': '#4A4A57',
                        border: '#E2E8F0',
                        input: '#F1F5F9'
                    },
                    boxShadow: {
                        'card': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'input': '0 0 0 2px rgba(0, 22, 220, 0.2)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F8F9FA;
            color: #1A1A24;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar {
            display: none;
        }
        .step-line {
            position: absolute;
            top: 14px;
            left: 50%;
            width: 100%;
            height: 2px;
            background-color: #E2E8F0;
            z-index: 0;
        }
        .step-line-active {
            background-color: #0016dc;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Navigation Shell -->
    <header id="header" class="w-full bg-white border-b border-border h-[72px] flex items-center px-8 flex-shrink-0 relative z-10">
        <div class="max-w-[1440px] w-full mx-auto flex justify-between items-center">
            <!-- Logo -->
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
                    <i class="fa-solid fa-bolt text-white text-sm"></i>
                </div>
                <span class="font-bold text-xl tracking-tight text-navy">MMO</span>
            </div>

            <!-- Nav Links -->
            <nav class="hidden md:flex items-center gap-8">
                <a href="#" class="text-navy-light font-medium hover:text-primary transition-colors">Home</a>
                <div class="relative flex flex-col items-center">
                    <a href="#" class="text-primary font-semibold">Orders</a>
                    <div class="absolute -bottom-[26px] w-1.5 h-1.5 bg-primary rounded-full"></div>
                </div>
                <a href="#" class="text-navy-light font-medium hover:text-primary transition-colors">Messages</a>
                <a href="#" class="text-navy-light font-medium hover:text-primary transition-colors">Profile</a>
            </nav>

            <!-- Mobile Menu Toggle -->
            <button class="md:hidden text-navy hover:text-primary">
                <i class="fa-solid fa-bars text-xl"></i>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow flex items-center justify-center p-4 md:p-8">
        
        <!-- Wizard Container -->
        <div id="wizard-card" class="w-full max-w-[800px] bg-white rounded-[24px] shadow-card overflow-hidden">
            
            <!-- Header Stepper -->
            <div class="px-8 pt-8 pb-6 border-b border-border/50">
                <div class="flex justify-between items-center relative w-full max-w-[500px] mx-auto">
                    
                    <!-- Step 1 -->
                    <div class="flex flex-col items-center relative z-10 w-1/4">
                        <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center shadow-sm mb-2">
                            <i class="fa-solid fa-check text-xs"></i>
                        </div>
                        <span class="text-xs font-semibold text-primary">Categoria</span>
                        <div class="step-line step-line-active"></div>
                    </div>

                    <!-- Step 2 (Active) -->
                    <div class="flex flex-col items-center relative z-10 w-1/4">
                        <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center shadow-sm mb-2 ring-4 ring-primary-light">
                            <span class="text-sm font-bold">2</span>
                        </div>
                        <span class="text-xs font-bold text-primary">Detalhes</span>
                        <div class="step-line"></div>
                    </div>

                    <!-- Step 3 -->
                    <div class="flex flex-col items-center relative z-10 w-1/4">
                        <div class="w-8 h-8 rounded-full bg-input text-navy-light flex items-center justify-center mb-2">
                            <span class="text-sm font-medium">3</span>
                        </div>
                        <span class="text-xs font-medium text-navy-light">Local</span>
                        <div class="step-line"></div>
                    </div>

                    <!-- Step 4 -->
                    <div class="flex flex-col items-center relative z-10 w-1/4">
                        <div class="w-8 h-8 rounded-full bg-input text-navy-light flex items-center justify-center mb-2">
                            <span class="text-sm font-medium">4</span>
                        </div>
                        <span class="text-xs font-medium text-navy-light">Revisão</span>
                    </div>
                </div>
            </div>

            <!-- Form Content -->
            <div class="p-8">
                <div class="mb-8">
                    <h1 class="text-2xl font-bold text-navy mb-2">Descreva a sua necessidade</h1>
                    <p class="text-sm text-navy-light">Forneça o máximo de detalhes possível para receber propostas precisas.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    
                    <!-- Left Side: Inputs -->
                    <div class="flex flex-col gap-6">
                        
                        <!-- Description -->
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold text-navy">Descrição do Problema <span class="text-red-500">*</span></label>
                            <textarea 
                                class="w-full bg-input border border-transparent rounded-[12px] p-4 text-sm text-navy placeholder-navy-light/50 focus:bg-white focus:border-primary focus:ring-0 focus:shadow-input transition-all resize-none h-[140px]"
                                placeholder="Ex: A torneira da cozinha está vazando há 3 dias e a pressão da água diminuiu..."
                            ></textarea>
                        </div>

                        <!-- Urgency Dropdown -->
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold text-navy">Urgência <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <select class="w-full bg-input border border-transparent rounded-[12px] p-4 text-sm text-navy appearance-none focus:bg-white focus:border-primary focus:ring-0 focus:shadow-input transition-all cursor-pointer">
                                    <option value="" disabled selected>Selecione a urgência</option>
                                    <option value="hoje">O mais rápido possível (Hoje)</option>
                                    <option value="dias">Para os próximos dias</option>
                                    <option value="semana">Na próxima semana</option>
                                    <option value="flexivel">Data flexível</option>
                                </select>
                                <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-navy-light">
                                    <i class="fa-solid fa-chevron-down text-xs"></i>
                                </div>
                            </div>
                        </div>

                    </div>

                    <!-- Right Side: Upload Zone -->
                    <div class="flex flex-col gap-2 h-full">
                        <label class="text-sm font-semibold text-navy">Fotos (Opcional)</label>
                        <div class="flex-grow border-2 border-dashed border-border rounded-[16px] bg-input/50 flex flex-col items-center justify-center p-6 text-center hover:bg-input hover:border-primary/50 transition-colors cursor-pointer group">
                            <div class="w-16 h-16 bg-white rounded-full shadow-sm flex items-center justify-center mb-4 group-hover:scale-105 transition-transform">
                                <i class="fa-solid fa-camera text-2xl text-primary"></i>
                            </div>
                            <h3 class="text-sm font-bold text-navy mb-1">Arraste fotos do problema aqui</h3>
                            <p class="text-xs text-navy-light mb-4">ou clique para selecionar do seu computador</p>
                            <span class="text-[10px] font-medium text-navy-light/70 uppercase tracking-wider bg-white px-3 py-1 rounded-full shadow-sm">PNG, JPG até 5MB</span>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Footer Action Area -->
            <div class="px-8 py-6 border-t border-border bg-gray-50/50 flex justify-between items-center rounded-b-[24px]">
                <button onclick="window.location.href='Tela 3 - Tela de histórico de solicitações.html'" class="text-sm font-semibold text-navy-light hover:text-navy transition-colors px-4 py-2 rounded-full hover:bg-gray-100">
                    Cancelar Solicitação
                </button>
                <button onclick="window.location.href='Tela 2 - Tela de detalhe da solicitação.html'" class="bg-primary hover:bg-primary/90 text-white text-sm font-bold py-3 px-8 rounded-full shadow-md hover:shadow-lg transition-all flex items-center gap-2">
                    Continuar para Local
                    <i class="fa-solid fa-arrow-right text-xs"></i>
                </button>
            </div>

        </div>
    </main>

</body>
</html>
