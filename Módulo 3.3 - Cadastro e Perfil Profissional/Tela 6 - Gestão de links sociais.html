<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Links Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#0016dc',
                            navy: '#1A1A24',
                            bg: '#F8F9FA',
                            card: '#FFFFFF',
                            border: '#E2E8F0',
                            muted: '#71717A'
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05), 0 0 3px rgba(0,0,0,0.02)',
                        'input': '0 1px 2px 0 rgba(0, 0, 0, 0.05)'
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; font-family: 'Plus Jakarta Sans', sans-serif; color: #1A1A24; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen bg-brand-bg text-brand-navy antialiased flex flex-col">

    <!-- Top Navigation -->
    <header id="header" class="w-full bg-white border-b border-brand-border h-[72px] flex items-center justify-center px-6 lg:px-8 sticky top-0 z-50">
        <div class="w-full max-w-[1000px] flex justify-between items-center">
            <!-- Logo -->
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-brand-blue flex items-center justify-center text-white font-bold text-lg">
                    M
                </div>
                <span class="font-bold text-xl tracking-tight text-brand-navy">MMO</span>
            </div>

            <!-- Profile -->
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-full overflow-hidden border border-brand-border">
                    <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-4.jpg" alt="Profile" class="w-full h-full object-cover">
                </div>
            </div>
        </div>
    </header>

    <!-- Main Workspace -->
    <main id="main-content" class="flex-1 flex flex-col items-center justify-start pt-12 pb-24 px-4 sm:px-6">
        
        <!-- Centered Card Container -->
        <div id="workspace-card" class="w-full max-w-[800px] bg-white rounded-[24px] shadow-soft p-8 sm:p-10 border border-brand-border/50">
            
            <!-- Header Section -->
            <div id="card-header" class="mb-10 text-center">
                <h1 class="text-[28px] font-bold text-brand-navy mb-3">Conexões e Redes Sociais</h1>
                <p class="text-brand-muted text-[15px] max-w-lg mx-auto leading-relaxed">
                    Adicione links externos para validar sua autoridade como Mestre e conectar com sua audiência.
                </p>
            </div>

            <!-- Input Grid -->
            <div id="input-grid" class="space-y-6 mb-10">
                
                <!-- Row 1: Instagram -->
                <div class="flex flex-col gap-2 relative group">
                    <label class="text-[13px] font-semibold text-brand-navy px-1">Instagram</label>
                    <div class="relative flex items-center w-full">
                        <div class="absolute left-4 text-brand-muted">
                            <i class="fa-brands fa-instagram text-[18px]"></i>
                        </div>
                        <input type="text" value="https://instagram.com/seuperfil" 
                            class="w-full h-[52px] pl-12 pr-[100px] rounded-full border border-brand-border bg-white text-[15px] text-brand-navy focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue shadow-input transition-all placeholder:text-gray-400" 
                            placeholder="Cole a URL do seu perfil">
                        <button class="absolute right-6 text-[13px] font-semibold text-brand-blue hover:text-blue-800 transition-colors">
                            Remover
                        </button>
                    </div>
                </div>

                <!-- Row 2: LinkedIn -->
                <div class="flex flex-col gap-2 relative group">
                    <label class="text-[13px] font-semibold text-brand-navy px-1">LinkedIn</label>
                    <div class="relative flex items-center w-full">
                        <div class="absolute left-4 text-brand-muted">
                            <i class="fa-brands fa-linkedin-in text-[18px]"></i>
                        </div>
                        <input type="text" value="https://linkedin.com/in/seuperfil" 
                            class="w-full h-[52px] pl-12 pr-[100px] rounded-full border border-brand-border bg-white text-[15px] text-brand-navy focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue shadow-input transition-all placeholder:text-gray-400" 
                            placeholder="Cole a URL do seu perfil">
                        <button class="absolute right-6 text-[13px] font-semibold text-brand-blue hover:text-blue-800 transition-colors">
                            Remover
                        </button>
                    </div>
                </div>

                <!-- Row 3: YouTube -->
                <div class="flex flex-col gap-2 relative group">
                    <label class="text-[13px] font-semibold text-brand-navy px-1">YouTube</label>
                    <div class="relative flex items-center w-full">
                        <div class="absolute left-4 text-brand-muted">
                            <i class="fa-brands fa-youtube text-[18px]"></i>
                        </div>
                        <input type="text" value="" 
                            class="w-full h-[52px] pl-12 pr-[100px] rounded-full border border-brand-border bg-white text-[15px] text-brand-navy focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue shadow-input transition-all placeholder:text-gray-400" 
                            placeholder="Cole a URL do seu canal">
                    </div>
                </div>

            </div>

            <!-- Add Button -->
            <div id="add-trigger" class="flex justify-center mb-12">
                <button class="h-[48px] px-8 rounded-full border-[1.5px] border-brand-blue text-brand-blue font-semibold text-[15px] hover:bg-brand-blue/5 transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-plus text-[14px]"></i>
                    Adicionar Nova Conexão
                </button>
            </div>

            <!-- Action Area / Footer -->
            <div id="card-footer" class="pt-6 border-t border-brand-border/60">
                <button onclick="window.location.href='Tela 7 - Gestão de portfólio.html'" class="w-full h-[56px] rounded-full bg-brand-blue text-white font-bold text-[16px] hover:bg-blue-800 transition-colors shadow-md hover:shadow-lg flex items-center justify-center gap-2">
                    Atualizar Perfil Social
                    <i class="fa-solid fa-arrow-right text-[14px] ml-1"></i>
                </button>
            </div>

        </div>
    </main>

    <script src="../_nav-helper.js"></script>
</body>
</html>
