<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métricas da campanha - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        background: '#F8F9FA',
                        primary: '#0016dc',
                        text: {
                            main: '#1A1A24',
                            muted: '#6C6C75'
                        },
                        success: '#10B981',
                        surface: '#FFFFFF'
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'nav': '0 -4px 24px -4px rgba(0, 0, 0, 0.08)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F8F9FA;
            color: #1A1A24;
            -webkit-font-smoothing: antialiased;
        }
        /* Hide scrollbar for clean mobile look */
        ::-webkit-scrollbar {
            display: none;
        }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="pb-28 font-sans antialiased min-h-[100dvh] flex justify-center bg-gray-100">

    <!-- Mobile Container Wrapper -->
    <div class="w-full max-w-[430px] min-h-[100dvh] bg-background relative overflow-x-hidden shadow-2xl mx-auto flex flex-col pb-24">
        
        <!-- 1. Top Header -->
        <header id="header" class="w-full bg-surface px-6 pt-12 pb-4 sticky top-0 z-40 shadow-sm flex items-center justify-between rounded-b-[24px]">
            <button class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-text-main hover:bg-gray-100 transition-colors">
                <i class="fa-solid fa-chevron-left text-sm"></i>
            </button>
            <h1 class="text-[17px] font-bold text-text-main tracking-tight">Resultados da Campanha</h1>
            <button class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-text-main hover:bg-gray-100 transition-colors">
                <i class="fa-solid fa-sliders text-sm"></i>
            </button>
        </header>

        <!-- Main Scrollable Content -->
        <main class="flex-1 px-5 pt-6 pb-32 flex flex-col gap-6">
            
            <!-- 2. Time Range Picker -->
            <section id="time-picker" class="w-full flex justify-center">
                <button class="flex items-center gap-2 bg-surface px-5 py-2.5 rounded-full shadow-soft text-sm font-semibold text-text-main hover:bg-gray-50 transition-colors border border-gray-100">
                    <i class="fa-regular fa-calendar text-primary"></i>
                    <span>Últimos 7 dias</span>
                    <i class="fa-solid fa-chevron-down text-[10px] text-text-muted ml-1"></i>
                </button>
            </section>

            <!-- 3. KPI Grid (2x2) -->
            <section id="kpi-grid" class="grid grid-cols-2 gap-4">
                <!-- Card 1 -->
                <div class="bg-surface rounded-[24px] p-5 shadow-soft border border-gray-50 flex flex-col gap-3 relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 w-16 h-16 bg-primary/5 rounded-full blur-xl"></div>
                    <div class="flex items-center gap-2 text-text-muted text-[13px] font-medium z-10">
                        <div class="w-6 h-6 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                            <i class="fa-solid fa-eye text-[10px]"></i>
                        </div>
                        Impressões
                    </div>
                    <div class="flex items-end justify-between z-10">
                        <span class="text-2xl font-bold tracking-tight text-text-main">12.4k</span>
                        <span class="text-[11px] font-bold text-success bg-success/10 px-2 py-1 rounded-full flex items-center gap-1">
                            <i class="fa-solid fa-arrow-trend-up text-[8px]"></i> 5%
                        </span>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="bg-surface rounded-[24px] p-5 shadow-soft border border-gray-50 flex flex-col gap-3 relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 w-16 h-16 bg-primary/5 rounded-full blur-xl"></div>
                    <div class="flex items-center gap-2 text-text-muted text-[13px] font-medium z-10">
                        <div class="w-6 h-6 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                            <i class="fa-solid fa-hand-pointer text-[10px]"></i>
                        </div>
                        Cliques (CTR)
                    </div>
                    <div class="flex items-end justify-between z-10">
                        <span class="text-2xl font-bold tracking-tight text-text-main">840</span>
                        <span class="text-[12px] font-semibold text-text-muted">6.7%</span>
                    </div>
                </div>

                <!-- Card 3 -->
                <div class="bg-surface rounded-[24px] p-5 shadow-soft border border-gray-50 flex flex-col gap-3 relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 w-16 h-16 bg-primary/5 rounded-full blur-xl"></div>
                    <div class="flex items-center gap-2 text-text-muted text-[13px] font-medium z-10">
                        <div class="w-6 h-6 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                            <i class="fa-solid fa-users text-[10px]"></i>
                        </div>
                        Alcance Único
                    </div>
                    <div class="flex items-end justify-between z-10">
                        <span class="text-2xl font-bold tracking-tight text-text-main">5.2k</span>
                    </div>
                </div>

                <!-- Card 4 -->
                <div class="bg-surface rounded-[24px] p-5 shadow-soft border border-gray-50 flex flex-col gap-3 relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 w-16 h-16 bg-primary/5 rounded-full blur-xl"></div>
                    <div class="flex items-center gap-2 text-text-muted text-[13px] font-medium z-10">
                        <div class="w-6 h-6 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                            <i class="fa-solid fa-wallet text-[10px]"></i>
                        </div>
                        Investimento
                    </div>
                    <div class="flex items-end justify-between z-10">
                        <span class="text-xl font-bold tracking-tight text-text-main">R$ 350<span class="text-sm text-text-muted">,00</span></span>
                    </div>
                </div>
            </section>

            <!-- 4. Performance Chart Card -->
            <section id="chart-section" class="w-full bg-surface rounded-[28px] p-5 shadow-soft border border-gray-50">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-[16px] font-bold text-text-main">Cliques por Dia</h2>
                    <button class="text-text-muted hover:text-primary transition-colors">
                        <i class="fa-solid fa-ellipsis"></i>
                    </button>
                </div>
                <!-- Chart Container -->
                <div id="clicks-chart" class="w-full h-[220px]"></div>
            </section>

            <!-- 5. Geographic Snapshot -->
            <section id="geo-snapshot" class="w-full bg-surface rounded-[28px] p-6 shadow-soft border border-gray-50">
                <h2 class="text-[16px] font-bold text-text-main mb-5">Top Cidades</h2>
                
                <div class="flex flex-col gap-4">
                    <!-- City 1 -->
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-center text-sm font-semibold">
                            <span class="text-text-main">Camboriú</span>
                            <span class="text-text-main">60%</span>
                        </div>
                        <div class="w-full h-2.5 bg-gray-100 rounded-full overflow-hidden">
                            <div class="h-full bg-primary rounded-full transition-all duration-1000 ease-out" style="width: 60%"></div>
                        </div>
                    </div>

                    <!-- City 2 -->
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-center text-sm font-semibold">
                            <span class="text-text-main">Itajaí</span>
                            <span class="text-text-main">30%</span>
                        </div>
                        <div class="w-full h-2.5 bg-gray-100 rounded-full overflow-hidden">
                            <div class="h-full bg-primary/60 rounded-full transition-all duration-1000 ease-out" style="width: 30%"></div>
                        </div>
                    </div>

                    <!-- City 3 -->
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-center text-sm font-semibold">
                            <span class="text-text-main">Outras</span>
                            <span class="text-text-main">10%</span>
                        </div>
                        <div class="w-full h-2.5 bg-gray-100 rounded-full overflow-hidden">
                            <div class="h-full bg-gray-300 rounded-full transition-all duration-1000 ease-out" style="width: 10%"></div>
                        </div>
                    </div>
                </div>
            </section>

        </main>

        <!-- 6. Primary Action (Pinned Bottom) -->
        <div class="fixed bottom-0 w-full max-w-[430px] px-5 pb-8 pt-4 bg-gradient-to-t from-background via-background/90 to-transparent z-50">
            <button class="w-full bg-primary text-white font-bold text-[16px] py-4 rounded-full shadow-[0_8px_24px_-8px_rgba(0,22,220,0.5)] hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Ver Detalhes por Público
                <i class="fa-solid fa-arrow-right text-sm"></i>
            </button>
        </div>

    </div>

    <script>
        // Chart Initialization
        function initializeCharts() {
            try {
                const chartData = [{
                    x: ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab', 'Dom'],
                    y: [120, 180, 140, 290, 220, 150, 190],
                    type: 'scatter',
                    mode: 'lines+markers',
                    line: {
                        color: '#0016dc',
                        width: 3,
                        shape: 'spline',
                        smoothing: 1.3
                    },
                    marker: {
                        color: '#0016dc',
                        size: 8,
                        symbol: 'circle',
                        line: {
                            color: '#FFFFFF',
                            width: 2
                        }
                    },
                    fill: 'tozeroy',
                    fillcolor: 'rgba(0, 22, 220, 0.05)',
                    hoverinfo: 'y+x',
                    hovertemplate: '<b style="font-family: Plus Jakarta Sans">%{y} cliques</b><extra></extra>'
                }];

                const chartLayout = {
                    margin: { t: 10, r: 10, b: 24, l: 30 },
                    paper_bgcolor: 'transparent',
                    plot_bgcolor: 'transparent',
                    xaxis: {
                        showgrid: false,
                        zeroline: false,
                        showline: false,
                        tickfont: {
                            family: 'Plus Jakarta Sans',
                            size: 11,
                            color: '#6C6C75'
                        },
                        fixedrange: true
                    },
                    yaxis: {
                        showgrid: true,
                        gridcolor: 'rgba(0,0,0,0.03)',
                        gridwidth: 1,
                        zeroline: false,
                        showline: false,
                        tickfont: {
                            family: 'Plus Jakarta Sans',
                            size: 11,
                            color: '#6C6C75'
                        },
                        fixedrange: true,
                        nticks: 4
                    },
                    showlegend: false,
                    hovermode: 'x unified',
                    hoverlabel: {
                        bgcolor: '#1A1A24',
                        font: { family: 'Plus Jakarta Sans', color: '#FFFFFF', size: 12 },
                        bordercolor: 'transparent',
                        padding: { t: 8, r: 12, b: 8, l: 12 }
                    }
                };

                const config = {
                    responsive: true,
                    displayModeBar: false,
                    staticPlot: false
                };

                Plotly.newPlot('clicks-chart', chartData, chartLayout, config);
            } catch (error) {
                console.error('Error initializing chart:', error);
            }
        }

        window.addEventListener('load', initializeCharts);
        setTimeout(initializeCharts, 1000);
    </script>
    <script src="../../_mobile-nav.js"></script>
</body>
</html>
