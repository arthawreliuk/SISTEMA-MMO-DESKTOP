<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seleção de região_cidade - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        'off-white': '#F8F9FA',
                        'trust-blue': '#0016dc',
                        'deep-navy': '#1A1A24',
                        'soft-blue': '#F0F4FF',
                    },
                    boxShadow: {
                        'ambient': '0 8px 30px rgba(0, 0, 0, 0.08)',
                        'ambient-lg': '0 12px 40px rgba(0, 0, 0, 0.12)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F8F9FA;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar {
            display: none;
        }
        
        /* Custom Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #0016dc;
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 4px 10px rgba(0, 22, 220, 0.2);
        }
        
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #0016dc;
            border-radius: 4px;
        }
    </style>
</head>
<body class="pb-28 m-0 p-0 bg-off-white flex justify-center items-start min-h-screen">

    <!-- Mobile Viewport Container -->
    <div id="mobile-container" class="w-full max-w-[375px] h-[840px] bg-off-white relative overflow-y-auto overflow-x-hidden shadow-2xl flex flex-col">
        
        <!-- 1. Top Header -->
        <header id="header" class="bg-white px-6 py-5 flex items-center justify-between sticky top-0 z-50 rounded-b-[24px] shadow-sm">
            <button class="text-deep-navy hover:text-trust-blue transition-colors h-10 w-10 flex items-center justify-center rounded-full bg-off-white">
                <i class="fa-solid fa-arrow-left text-lg"></i>
            </button>
            <h1 class="text-deep-navy font-bold text-[17px] tracking-tight">Público e Região</h1>
            <div class="bg-soft-blue text-trust-blue font-bold text-xs px-3 py-1.5 rounded-full tracking-wide">
                2/4
            </div>
        </header>

        <!-- Main Scrollable Content -->
        <main class="flex-1 px-5 pt-6 pb-40 flex flex-col gap-6">
            
            <!-- 2. Search & Select Card -->
            <section id="search-select-card" class="bg-white rounded-[24px] p-5 shadow-ambient">
                <h2 class="text-deep-navy font-bold text-[15px] mb-4">Adicionar Localização</h2>
                
                <!-- Search Input -->
                <div class="relative mb-5">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                    </div>
                    <input type="text" placeholder="Buscar cidade ou CEP..." class="w-full bg-off-white text-deep-navy text-[15px] font-medium rounded-full py-3.5 pl-11 pr-4 outline-none focus:ring-2 focus:ring-trust-blue/20 transition-all placeholder:text-gray-400">
                </div>

                <!-- Selected Regions (Tags) -->
                <div class="flex overflow-x-auto gap-2 pb-2 -mx-1 px-1">
                    <div class="flex-shrink-0 bg-trust-blue text-white font-semibold text-[13px] px-4 py-2 rounded-full flex items-center gap-2 shadow-md">
                        Camboriú
                        <button class="hover:bg-white/20 rounded-full w-5 h-5 flex items-center justify-center transition-colors">
                            <i class="fa-solid fa-xmark text-[10px]"></i>
                        </button>
                    </div>
                    <div class="flex-shrink-0 bg-trust-blue text-white font-semibold text-[13px] px-4 py-2 rounded-full flex items-center gap-2 shadow-md">
                        Itajaí
                        <button class="hover:bg-white/20 rounded-full w-5 h-5 flex items-center justify-center transition-colors">
                            <i class="fa-solid fa-xmark text-[10px]"></i>
                        </button>
                    </div>
                    <div class="flex-shrink-0 border border-dashed border-gray-300 text-gray-400 font-medium text-[13px] px-4 py-2 rounded-full flex items-center justify-center cursor-pointer hover:bg-gray-50 transition-colors">
                        <i class="fa-solid fa-plus mr-1"></i> Adicionar
                    </div>
                </div>
            </section>

            <!-- 3. Radius Control Card -->
            <section id="radius-control-card" class="bg-white rounded-[24px] p-5 shadow-ambient flex flex-col gap-5">
                <div class="flex justify-between items-center">
                    <h2 class="text-deep-navy font-bold text-[15px]">Raio de Alcance</h2>
                    <span class="text-trust-blue font-bold text-[15px]">+15km</span>
                </div>
                
                <!-- Map Snippet -->
                <div class="w-full h-[180px] rounded-[16px] overflow-hidden relative shadow-inner border border-gray-100">
                    <!-- AI Image for Map Texture -->
                    <img src="https://images.unsplash.com/photo-1524661135-423995f22d0b?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Map Background" class="w-full h-full object-cover opacity-60 blur-[1px]">
                    
                    <!-- Overlay UI on Map -->
                    <div class="absolute inset-0 flex items-center justify-center">
                        <div class="w-24 h-24 bg-trust-blue/10 rounded-full border border-trust-blue/30 flex items-center justify-center relative">
                            <div class="w-12 h-12 bg-trust-blue/20 rounded-full flex items-center justify-center">
                                <div class="w-4 h-4 bg-trust-blue rounded-full shadow-[0_0_15px_rgba(0,22,220,0.6)] border-2 border-white relative z-10"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Gradient overlay for text readability -->
                    <div class="absolute inset-0 bg-gradient-to-t from-white/60 to-transparent pointer-events-none"></div>
                </div>

                <!-- Slider Control -->
                <div class="pt-2 pb-1 px-1">
                    <input type="range" min="1" max="50" value="15" class="w-full">
                    <div class="flex justify-between text-xs font-medium text-gray-400 mt-3 px-1">
                        <span>1km</span>
                        <span>25km</span>
                        <span>50km</span>
                    </div>
                </div>
            </section>
            
            <!-- Contextual Info Cards (Fleshing out the UI) -->
            <section id="targeting-insights" class="grid grid-cols-2 gap-4">
                <div class="bg-white rounded-[20px] p-4 shadow-ambient flex flex-col justify-between h-[110px]">
                    <div class="w-8 h-8 rounded-full bg-soft-blue flex items-center justify-center text-trust-blue mb-2">
                        <i class="fa-solid fa-users text-sm"></i>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 font-medium mb-0.5">Densidade</p>
                        <p class="text-deep-navy font-bold text-[14px]">Alta / Urbana</p>
                    </div>
                </div>
                <div class="bg-white rounded-[20px] p-4 shadow-ambient flex flex-col justify-between h-[110px]">
                    <div class="w-8 h-8 rounded-full bg-[#FFF9E6] flex items-center justify-center text-[#F5B000] mb-2">
                        <i class="fa-solid fa-bolt text-sm"></i>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 font-medium mb-0.5">Potencial</p>
                        <p class="text-deep-navy font-bold text-[14px]">Excelente</p>
                    </div>
                </div>
            </section>

        </main>

        <!-- Bottom Fixed Action Area -->
        <div class="absolute bottom-0 left-0 w-full px-5 pb-8 pt-10 bg-gradient-to-t from-off-white via-off-white to-transparent pointer-events-none flex flex-col items-center gap-4 z-40">
            
            <!-- 4. Audience Estimate Banner -->
            <div id="audience-estimate" class="bg-soft-blue pointer-events-auto px-5 py-3 rounded-full flex items-center gap-3 shadow-ambient-lg border border-trust-blue/10 transform translate-y-2">
                <div class="w-2 h-2 rounded-full bg-trust-blue animate-pulse"></div>
                <span class="text-trust-blue font-bold text-[13px] tracking-wide">Alcance Estimado: 12.500 profissionais</span>
            </div>

            <!-- 5. Primary Action -->
            <button id="primary-action" class="w-full bg-trust-blue text-white pointer-events-auto font-bold text-[16px] py-4.5 h-[56px] rounded-full shadow-[0_12px_24px_rgba(0,22,220,0.25)] hover:bg-blue-800 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                Confirmar Região
                <i class="fa-solid fa-arrow-right text-sm ml-1"></i>
            </button>
        </div>

    </div>

    <script src="../../_mobile-nav.js"></script>
</body>
</html>
