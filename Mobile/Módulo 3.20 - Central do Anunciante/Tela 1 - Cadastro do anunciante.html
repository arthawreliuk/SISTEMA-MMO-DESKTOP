<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advertiser Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#0016dc',
                            navy: '#1A1A24',
                            bg: '#F8F9FA',
                            card: '#FFFFFF',
                            border: '#E5E7EB',
                            textMuted: '#6B7280',
                            inputBg: '#F3F4F6'
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'float': '0 10px 40px -10px rgba(0, 22, 220, 0.2)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F8F9FA;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* Floating Label Animations */
        .floating-input:focus-within label,
        .floating-input input:not(:placeholder-shown) + label,
        .floating-input select:not([value=""]) + label {
            transform: translateY(-50%) scale(0.85);
            top: 14px;
            color: #1A1A24;
        }
    </style>
</head>
<body class="bg-brand-bg text-brand-navy min-h-[100dvh] flex flex-col relative overflow-hidden">

    <!-- Mobile Container (Max 375px wide for exact spec match, centered on larger screens) -->
    <div class="w-full max-w-[375px] mx-auto h-[100dvh] flex flex-col bg-brand-bg relative shadow-2xl sm:shadow-none">

        <!-- Header -->
        <header id="header" class="w-full px-6 pt-12 pb-4 bg-white flex items-center justify-between sticky top-0 z-50 rounded-b-[24px] shadow-sm">
            <button class="w-10 h-10 flex items-center justify-center rounded-full bg-brand-bg text-brand-navy hover:bg-gray-200 transition-colors">
                <i class="fa-solid fa-arrow-left text-lg"></i>
            </button>
            <div class="font-bold text-[18px] tracking-tight">
                Ads Center
            </div>
            <div class="bg-brand-bg px-4 py-2 rounded-full text-sm font-semibold text-brand-navy flex items-center gap-1.5 border border-gray-100">
                <span class="w-2 h-2 rounded-full bg-brand-blue"></span>
                1/3
            </div>
        </header>

        <!-- Main Scrollable Content -->
        <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar px-6 pt-8 pb-32">
            
            <!-- Hero Copy -->
            <section id="hero-section" class="mb-8">
                <h1 class="text-[32px] leading-[1.15] font-extrabold text-brand-navy mb-3 tracking-tight">
                    Alcance quem <br> constrói e reforma.
                </h1>
                <p class="text-[16px] text-brand-textMuted font-medium leading-relaxed">
                    Crie sua conta de anunciante em 1 minuto e comece a impactar milhares de profissionais.
                </p>
            </section>

            <!-- Form Card -->
            <section id="registration-form" class="bg-white rounded-[24px] p-6 shadow-soft border border-gray-50">
                
                <div class="space-y-5">
                    
                    <!-- Input 1: CNPJ/CPF -->
                    <div class="relative floating-input h-[64px] bg-brand-inputBg rounded-[20px] px-5 flex items-center border border-transparent focus-within:border-brand-blue focus-within:bg-white transition-all duration-300">
                        <input type="text" id="document_id" placeholder=" " value="45.987.123/0001-99" class="w-full h-full bg-transparent pt-4 pb-1 text-[16px] font-semibold text-brand-navy outline-none placeholder-transparent z-10" />
                        <label for="document_id" class="absolute left-5 top-1/2 -translate-y-1/2 text-brand-textMuted text-[15px] font-medium transition-all duration-200 pointer-events-none z-0">CNPJ ou CPF do Anunciante</label>
                        
                        <!-- Success Icon (Auto-validated state) -->
                        <div class="absolute right-5 w-6 h-6 rounded-full bg-green-100 flex items-center justify-center text-green-600 z-20">
                            <i class="fa-solid fa-check text-xs"></i>
                        </div>
                    </div>

                    <!-- Input 2: Brand Name -->
                    <div class="relative floating-input h-[64px] bg-brand-inputBg rounded-[20px] px-5 flex items-center border border-transparent focus-within:border-brand-blue focus-within:bg-white transition-all duration-300">
                        <input type="text" id="brand_name" placeholder=" " class="w-full h-full bg-transparent pt-4 pb-1 text-[16px] font-semibold text-brand-navy outline-none placeholder-transparent z-10" />
                        <label for="brand_name" class="absolute left-5 top-1/2 -translate-y-1/2 text-brand-textMuted text-[15px] font-medium transition-all duration-200 pointer-events-none z-0">Nome da Marca / Loja</label>
                    </div>

                    <!-- Input 3: Segment Dropdown -->
                    <div class="relative floating-input h-[64px] bg-brand-inputBg rounded-[20px] px-5 flex items-center border border-transparent focus-within:border-brand-blue focus-within:bg-white transition-all duration-300 cursor-pointer">
                        <select id="segment" class="w-full h-full bg-transparent pt-4 pb-1 text-[16px] font-semibold text-brand-navy outline-none appearance-none z-10 cursor-pointer">
                            <option value="material" selected>Material de Construção</option>
                            <option value="ferramentas">Ferramentas e Equipamentos</option>
                            <option value="acabamento">Acabamento e Decoração</option>
                            <option value="servicos">Serviços Especializados</option>
                        </select>
                        <label for="segment" class="absolute left-5 top-[14px] -translate-y-1/2 scale-[0.85] text-[#1A1A24] text-[15px] font-medium transition-all duration-200 pointer-events-none z-0">Segmento</label>
                        
                        <div class="absolute right-5 text-brand-textMuted z-0 pointer-events-none">
                            <i class="fa-solid fa-chevron-down text-sm"></i>
                        </div>
                    </div>

                </div>

                <!-- Trust Badge inside card -->
                <div class="mt-6 flex items-center gap-3 px-2">
                    <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-brand-blue">
                        <i class="fa-solid fa-shield-halved text-lg"></i>
                    </div>
                    <p class="text-[13px] text-brand-textMuted font-medium leading-tight flex-1">
                        Seus dados estão seguros e criptografados de ponta a ponta.
                    </p>
                </div>

            </section>
        </main>

        <!-- Fixed Bottom Action -->
        <div id="bottom-action" class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-brand-bg via-brand-bg to-transparent pb-8">
            <button class="w-full h-[64px] bg-brand-blue text-white rounded-full font-bold text-[17px] flex items-center justify-center gap-3 shadow-float hover:bg-blue-700 transition-all active:scale-[0.98]">
                <span>Criar Conta de Anunciante</span>
                <i class="fa-solid fa-arrow-right text-sm"></i>
            </button>
        </div>

    </div>

</body>
</html>
