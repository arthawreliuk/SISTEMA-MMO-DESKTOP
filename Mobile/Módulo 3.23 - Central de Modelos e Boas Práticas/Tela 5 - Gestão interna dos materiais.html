<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resource Center CMS Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        background: '#F8F9FA',
                        primary: '#0016dc',
                        textMain: '#1A1A24',
                        textMuted: '#B4BBC6',
                        cardBg: '#FFFFFF',
                        success: '#3CC269',
                        successSoft: '#E8F8EE',
                        danger: '#F97316',
                        dangerSoft: '#FEF1E8',
                        surfaceAlt: '#F4F4F4',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'float': '0 12px 30px -4px rgba(0, 22, 220, 0.25)',
                        'nav': '0 -4px 24px -4px rgba(0, 0, 0, 0.06)',
                    },
                    borderRadius: {
                        '4xl': '2rem',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Toggle Switch Styles */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #3CC269;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #3CC269;
        }
        .toggle-checkbox:checked + .toggle-label:after {
            transform: translateX(100%);
            border-color: white;
        }
    </style>
</head>
<body class="text-textMain font-sans bg-background min-h-[100dvh] flex justify-center">

    <!-- Mobile Container (375x840 constraint) -->
    <div id="app-container" class="w-full max-w-[375px] h-[100dvh] bg-background relative overflow-hidden flex flex-col mx-auto shadow-2xl sm:rounded-[40px] sm:my-8 sm:h-[840px] border-x border-gray-100 sm:border-y">
        
        <!-- Top Header -->
        <header id="header" class="w-full bg-cardBg px-6 pt-12 pb-4 flex items-center justify-between z-20 rounded-b-[24px] shadow-soft relative">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white font-bold text-lg shadow-float">
                    M
                </div>
            </div>
            <h1 class="text-lg font-bold text-textMain tracking-tight">Arquivos & Modelos</h1>
            <button class="w-10 h-10 rounded-full bg-surfaceAlt flex items-center justify-center text-textMain hover:bg-gray-200 transition-colors">
                <i class="fa-solid fa-search text-[16px]"></i>
            </button>
        </header>

        <!-- Main Scrollable Content -->
        <main id="main-content" class="flex-1 overflow-y-auto hide-scrollbar pb-32 pt-6 px-4 flex flex-col gap-8 relative z-10">
            
            <!-- CMS Macro Metrics -->
            <section id="metrics-section" class="w-full">
                <div class="flex overflow-x-auto hide-scrollbar gap-4 pb-2 px-2 -mx-2">
                    <!-- Metric Card 1 -->
                    <div class="min-w-[140px] bg-cardBg rounded-full py-4 px-6 shadow-soft flex flex-col items-center justify-center gap-1 border border-gray-50 flex-shrink-0">
                        <span class="text-[13px] font-semibold text-textMuted uppercase tracking-wider">Total</span>
                        <div class="flex items-baseline gap-1">
                            <span class="text-2xl font-bold text-textMain">142</span>
                            <span class="text-sm font-medium text-textMuted">Arq.</span>
                        </div>
                    </div>
                    <!-- Metric Card 2 -->
                    <div class="min-w-[160px] bg-cardBg rounded-full py-4 px-6 shadow-soft flex flex-col items-center justify-center gap-1 border border-gray-50 flex-shrink-0">
                        <span class="text-[13px] font-semibold text-textMuted uppercase tracking-wider">Downloads</span>
                        <div class="flex items-baseline gap-1">
                            <span class="text-2xl font-bold text-textMain">15k</span>
                            <span class="text-sm font-medium text-textMuted">Total</span>
                        </div>
                    </div>
                    <!-- Metric Card 3 -->
                    <div class="min-w-[140px] bg-cardBg rounded-full py-4 px-6 shadow-soft flex flex-col items-center justify-center gap-1 border border-gray-50 flex-shrink-0">
                        <span class="text-[13px] font-semibold text-textMuted uppercase tracking-wider">Planilhas</span>
                        <div class="flex items-baseline gap-1">
                            <span class="text-2xl font-bold text-textMain">45</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- File Feed (Recent Uploads) -->
            <section id="recent-uploads" class="w-full flex flex-col gap-4">
                <div class="flex items-center justify-between px-2 mb-2">
                    <h2 class="text-lg font-bold text-textMain">Recent Uploads</h2>
                    <button class="text-sm font-semibold text-primary">View All</button>
                </div>

                <div class="flex flex-col gap-4">
                    <!-- Card 1: XLSX -->
                    <div id="file-card-1" class="bg-cardBg rounded-[24px] p-5 flex items-center justify-between shadow-soft border border-gray-50/50 relative overflow-hidden group">
                        <div class="flex items-center gap-4">
                            <!-- Icon Container -->
                            <div class="w-14 h-14 rounded-[16px] bg-successSoft flex items-center justify-center flex-shrink-0">
                                <i class="fa-solid fa-file-excel text-success text-2xl"></i>
                            </div>
                            
                            <!-- Info -->
                            <div class="flex flex-col gap-1">
                                <h3 class="font-bold text-[16px] text-textMain leading-tight">Planilha Obra Litoral</h3>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="px-2.5 py-1 bg-successSoft text-success text-[10px] font-bold uppercase tracking-wider rounded-full">Online</span>
                                    <span class="text-[13px] font-medium text-textMuted flex items-center gap-1">
                                        <i class="fa-solid fa-arrow-down text-[10px]"></i> 3.2k downloads
                                    </span>
                                </div>
                            </div>
                        </div>

                        <!-- Toggle -->
                        <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in flex-shrink-0">
                            <input type="checkbox" name="toggle1" id="toggle1" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-surfaceAlt appearance-none cursor-pointer transition-transform duration-200 ease-in-out z-10" checked/>
                            <label for="toggle1" class="toggle-label block overflow-hidden h-6 rounded-full bg-surfaceAlt cursor-pointer transition-colors duration-200 ease-in-out"></label>
                        </div>
                    </div>

                    <!-- Card 2: PDF -->
                    <div id="file-card-2" class="bg-cardBg rounded-[24px] p-5 flex items-center justify-between shadow-soft border border-gray-50/50 relative overflow-hidden">
                        <div class="flex items-center gap-4">
                            <!-- Icon Container -->
                            <div class="w-14 h-14 rounded-[16px] bg-dangerSoft flex items-center justify-center flex-shrink-0">
                                <i class="fa-solid fa-file-pdf text-danger text-2xl"></i>
                            </div>
                            
                            <!-- Info -->
                            <div class="flex flex-col gap-1">
                                <h3 class="font-bold text-[16px] text-textMain leading-tight">Guia de Maresia</h3>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="px-2.5 py-1 bg-successSoft text-success text-[10px] font-bold uppercase tracking-wider rounded-full">Online</span>
                                    <span class="text-[13px] font-medium text-textMuted flex items-center gap-1">
                                        <i class="fa-solid fa-arrow-down text-[10px]"></i> 1.8k downloads
                                    </span>
                                </div>
                            </div>
                        </div>

                        <!-- Toggle -->
                        <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in flex-shrink-0">
                            <input type="checkbox" name="toggle2" id="toggle2" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-surfaceAlt appearance-none cursor-pointer transition-transform duration-200 ease-in-out z-10" checked/>
                            <label for="toggle2" class="toggle-label block overflow-hidden h-6 rounded-full bg-surfaceAlt cursor-pointer transition-colors duration-200 ease-in-out"></label>
                        </div>
                    </div>
                    
                    <!-- Card 3: DOCX -->
                    <div id="file-card-3" class="bg-cardBg rounded-[24px] p-5 flex items-center justify-between shadow-soft border border-gray-50/50 relative overflow-hidden opacity-70">
                        <div class="flex items-center gap-4">
                            <!-- Icon Container -->
                            <div class="w-14 h-14 rounded-[16px] bg-[#E8F0FE] flex items-center justify-center flex-shrink-0">
                                <i class="fa-solid fa-file-word text-[#4285F4] text-2xl"></i>
                            </div>
                            
                            <!-- Info -->
                            <div class="flex flex-col gap-1">
                                <h3 class="font-bold text-[16px] text-textMain leading-tight">Contrato Padrão 2024</h3>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="px-2.5 py-1 bg-surfaceAlt text-textMuted text-[10px] font-bold uppercase tracking-wider rounded-full">Offline</span>
                                    <span class="text-[13px] font-medium text-textMuted flex items-center gap-1">
                                        <i class="fa-solid fa-arrow-down text-[10px]"></i> 850 downloads
                                    </span>
                                </div>
                            </div>
                        </div>

                        <!-- Toggle -->
                        <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in flex-shrink-0">
                            <input type="checkbox" name="toggle3" id="toggle3" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-surfaceAlt appearance-none cursor-pointer transition-transform duration-200 ease-in-out z-10"/>
                            <label for="toggle3" class="toggle-label block overflow-hidden h-6 rounded-full bg-surfaceAlt cursor-pointer transition-colors duration-200 ease-in-out"></label>
                        </div>
                    </div>

                </div>
            </section>
        </main>

        <!-- Floating Action Button (FAB) -->
        <button id="fab-upload" class="absolute bottom-[100px] right-6 w-16 h-16 bg-primary rounded-full shadow-float flex items-center justify-center text-white hover:scale-105 transition-transform z-40 group">
            <i class="fa-solid fa-plus text-2xl transition-transform group-hover:rotate-90 duration-300"></i>
        </button>

        <!-- Floating Bottom Navigation -->
        <nav id="bottom-nav" class="absolute bottom-6 left-6 right-6 h-[72px] bg-cardBg rounded-[36px] shadow-nav flex items-center justify-around px-2 z-50 border border-gray-50/50 backdrop-blur-md bg-white/90">
            <button class="flex flex-col items-center justify-center w-14 h-14 rounded-full text-textMuted hover:text-primary transition-colors">
                <i class="fa-solid fa-house text-xl mb-1"></i>
            </button>
            <button class="flex flex-col items-center justify-center w-14 h-14 rounded-full text-textMuted hover:text-primary transition-colors">
                <i class="fa-solid fa-folder-open text-xl mb-1"></i>
            </button>
            <button class="flex flex-col items-center justify-center w-14 h-14 rounded-full bg-primary/10 text-primary transition-colors relative">
                <div class="absolute -top-1 -right-1 w-3 h-3 bg-danger rounded-full border-2 border-white"></div>
                <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
            </button>
            <button class="flex flex-col items-center justify-center w-14 h-14 rounded-full text-textMuted hover:text-primary transition-colors">
                <i class="fa-solid fa-gear text-xl mb-1"></i>
            </button>
        </nav>

    </div>

</body>
</html>
