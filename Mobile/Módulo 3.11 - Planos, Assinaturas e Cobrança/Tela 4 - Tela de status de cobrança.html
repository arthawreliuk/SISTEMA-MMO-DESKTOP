<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Payment Success - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        background: '#F8F9FA',
                        primary: '#0016dc',
                        textMain: '#1A1A24',
                        textMuted: '#6B7280',
                        surface: '#FFFFFF',
                        success: '#10B981',
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
                        'card': '0 12px 40px -12px rgba(0, 0, 0, 0.08)',
                        'glow': '0 0 40px rgba(0, 22, 220, 0.15)',
                        'pill': '0 20px 40px -10px rgba(0, 0, 0, 0.1)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; font-family: 'Plus Jakarta Sans', sans-serif; color: #1A1A24; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .dashed-divider { background-image: linear-gradient(to right, #E5E7EB 50%, transparent 50%); background-size: 8px 1px; background-repeat: repeat-x; }
        /* Setup mobile container constraints to ensure 375x840 feel on larger screens while remaining fluid */
        .mobile-container { width: 100%; max-width: 430px; margin: 0 auto; min-height: 100dvh; position: relative; background-color: #F8F9FA; display: flex; flex-direction: column; overflow-x: hidden; }
    </style>
</head>
<body>

<div id="app-wrapper" class="mobile-container pb-28">

    <!-- Top Header -->
    <header id="header" class="glass-header sticky top-0 z-50 px-6 py-4 flex items-center justify-between border-b border-white/20 shadow-sm">
        <button class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm text-textMain hover:bg-gray-50 transition-colors">
            <i class="fa-solid fa-xmark text-lg"></i>
        </button>
        <h1 class="text-base font-semibold text-textMain tracking-tight">Status do Pagamento</h1>
        <div class="w-10"></div> <!-- Spacer for centering -->
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 px-6 pt-10 pb-8 flex flex-col items-center">
        
        <!-- Hero Success Graphic -->
        <section id="hero-graphic" class="flex flex-col items-center mb-8 relative w-full">
            <div class="relative mb-6">
                <!-- Outer glow rings -->
                <div class="absolute inset-0 bg-primary/20 rounded-full blur-2xl scale-150"></div>
                <div class="absolute inset-0 bg-primary/10 rounded-full blur-xl scale-110"></div>
                <!-- Main Icon Circle -->
                <div class="relative w-24 h-24 bg-primary rounded-full flex items-center justify-center shadow-glow border-4 border-white z-10">
                    <i class="fa-solid fa-check text-4xl text-white"></i>
                </div>
                <!-- Decorative particles -->
                <div class="absolute top-0 -left-4 w-2 h-2 bg-primary/40 rounded-full"></div>
                <div class="absolute bottom-4 -right-6 w-3 h-3 bg-primary/30 rounded-full"></div>
                <div class="absolute -top-6 right-2 w-1.5 h-1.5 bg-primary/50 rounded-full"></div>
            </div>

            <h2 class="text-3xl font-extrabold text-textMain text-center mb-3 tracking-tight">Pagamento<br>Aprovado!</h2>
            <p class="text-textMuted text-center text-[15px] leading-relaxed max-w-[280px]">Seu Plano Mestre já está ativo e pronto para uso.</p>
        </section>

        <!-- Receipt Card -->
        <section id="receipt-card" class="w-full bg-surface rounded-[24px] shadow-card p-6 mb-8 relative overflow-hidden border border-gray-100">
            <!-- Decorative top corners -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary/80 to-primary"></div>
            
            <div class="flex flex-col gap-5">
                <!-- Amount Row -->
                <div class="flex justify-between items-center pb-5 dashed-divider" style="background-position: bottom;">
                    <span class="text-textMuted text-sm font-medium">Valor Pago</span>
                    <span class="text-textMain text-xl font-bold">R$ 49,90</span>
                </div>

                <!-- Details Rows -->
                <div class="flex justify-between items-center">
                    <span class="text-textMuted text-sm">Data</span>
                    <span class="text-textMain text-sm font-semibold">29 de Abril de 2026</span>
                </div>

                <div class="flex justify-between items-center">
                    <span class="text-textMuted text-sm">Método</span>
                    <div class="flex items-center gap-2">
                        <div class="w-6 h-6 rounded bg-gray-50 flex items-center justify-center border border-gray-100">
                            <i class="fa-brands fa-pix text-[#32BCAD] text-xs"></i>
                        </div>
                        <span class="text-textMain text-sm font-semibold">PIX</span>
                    </div>
                </div>

                <div class="flex justify-between items-center pt-5 dashed-divider" style="background-position: top;">
                    <span class="text-textMuted text-sm">ID da Transação</span>
                    <span class="text-textMain text-sm font-mono font-medium tracking-tight bg-gray-50 px-2 py-1 rounded-md">#MMO-9982</span>
                </div>
            </div>
            
            <!-- Cutouts for receipt effect -->
            <div class="absolute -left-3 top-[70px] w-6 h-6 bg-background rounded-full shadow-inner"></div>
            <div class="absolute -right-3 top-[70px] w-6 h-6 bg-background rounded-full shadow-inner"></div>
        </section>

        <!-- Primary Actions -->
        <section id="action-stack" class="w-full flex flex-col gap-4 mt-auto w-full">
            <button class="w-full h-14 bg-primary text-white font-semibold text-[15px] rounded-full shadow-glow hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Ir para meu Painel
                <i class="fa-solid fa-arrow-right text-sm ml-1"></i>
            </button>
            <button class="w-full h-14 bg-white text-textMain font-semibold text-[15px] rounded-full shadow-sm border border-gray-200 hover:bg-gray-50 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                <i class="fa-regular fa-file-pdf text-textMuted"></i>
                Baixar Comprovante (PDF)
            </button>
        </section>

    </main>

    <!-- Floating Pill Navigation -->
    <nav id="bottom-nav" class="fixed bottom-6 left-0 right-0 z-50 px-6 flex justify-center pointer-events-none">
        <!-- Inner container to constrain width matching the mobile container -->
        <div class="w-full max-w-[430px] flex justify-center pointer-events-auto">
            <div class="bg-white rounded-full shadow-pill px-6 py-3 flex items-center justify-between gap-8 border border-gray-100 backdrop-blur-xl">
                <a href="#" class="w-12 h-12 flex items-center justify-center rounded-full text-textMuted hover:bg-gray-50 transition-colors">
                    <i class="fa-solid fa-house text-xl"></i>
                </a>
                <a href="#" class="w-12 h-12 flex items-center justify-center rounded-full text-textMuted hover:bg-gray-50 transition-colors">
                    <i class="fa-solid fa-wallet text-xl"></i>
                </a>
                <a href="#" class="w-12 h-12 flex items-center justify-center rounded-full text-textMuted hover:bg-gray-50 transition-colors relative">
                    <i class="fa-regular fa-bell text-xl"></i>
                    <span class="absolute top-3 right-3 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
                </a>
                <a href="#" class="w-12 h-12 flex items-center justify-center rounded-full bg-primary/10 text-primary transition-colors relative">
                    <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-4.jpg" alt="Profile" class="w-8 h-8 rounded-full object-cover border-2 border-primary">
                </a>
            </div>
        </div>
    </nav>

</div>

</body>
</html>
