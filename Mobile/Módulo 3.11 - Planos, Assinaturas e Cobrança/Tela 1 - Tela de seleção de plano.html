<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tela de seleção de plano - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0016dc',
                        navy: '#1A1A24',
                        offwhite: '#F8F9FA',
                        gray: {
                            100: '#F3F4F6',
                            300: '#D1D5DB',
                            500: '#6B7280',
                            800: '#1F2937'
                        }
                    },
                    boxShadow: {
                        'glass': '0 4px 30px rgba(0, 0, 0, 0.05)',
                        'card': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'glow': '0 0 20px rgba(0, 22, 220, 0.15)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F8F9FA;
            color: #1A1A24;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Hide scrollbar but keep functionality */
        ::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Mobile specific constraints */
        @media (min-width: 768px) {
            .mobile-container {
                max-width: 375px;
                margin: 0 auto;
                min-height: 840px;
                position: relative;
                box-shadow: 0 0 50px rgba(0,0,0,0.1);
                background-color: #F8F9FA;
                overflow: hidden;
            }
        }
    </style>
</head>
<body class="m-0 p-0 font-sans text-navy bg-offwhite">

    <!-- Mobile Container Wrapper for Desktop Viewing -->
    <div class="mobile-container w-full h-full min-h-screen relative pb-28">

        <!-- 1. Top Header -->
        <header id="header" class="glass-header sticky top-0 z-50 px-5 py-4 flex items-center justify-between">
            <button class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm text-navy hover:bg-gray-50 transition-colors">
                <i class="fa-solid fa-chevron-left text-sm"></i>
            </button>
            <h1 class="text-lg font-bold tracking-tight">Planos MMO</h1>
            <div class="w-10 h-10"></div> <!-- Spacer for centering -->
        </header>

        <!-- Main Content -->
        <main class="px-5 pt-8 pb-10">
            
            <!-- 2. Hero Typography & Toggle -->
            <section id="hero-section" class="text-center mb-10">
                <h2 class="text-[32px] leading-[1.1] font-extrabold mb-8 tracking-tight">
                    Evolua seu<br>negócio.
                </h2>

                <!-- Toggle Switch -->
                <div class="inline-flex bg-white p-1.5 rounded-full shadow-sm border border-gray-100 relative items-center">
                    <button class="px-6 py-2.5 rounded-full text-sm font-semibold text-gray-500 hover:text-navy transition-colors z-10">
                        Mensal
                    </button>
                    <button class="px-6 py-2.5 rounded-full text-sm font-bold bg-primary text-white shadow-md z-10 transition-all flex items-center gap-2">
                        Anual
                        <span class="bg-white/20 px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider">20% OFF</span>
                    </button>
                </div>
            </section>

            <!-- 3. Pricing Cards Stack -->
            <section id="pricing-cards" class="space-y-6">
                
                <!-- Card 1: Plano Básico -->
                <div id="card-basic" class="bg-white rounded-[24px] p-7 shadow-card border border-white relative overflow-hidden">
                    <div class="mb-6">
                        <h3 class="text-xl font-bold mb-2">Básico</h3>
                        <div class="flex items-baseline gap-1">
                            <span class="text-3xl font-extrabold">Grátis</span>
                        </div>
                    </div>

                    <ul class="space-y-4 mb-8">
                        <li class="flex items-start gap-3 text-sm font-medium text-gray-800">
                            <div class="mt-0.5 w-5 h-5 rounded-full bg-gray-100 flex items-center justify-center shrink-0">
                                <i class="fa-solid fa-check text-[10px] text-gray-500"></i>
                            </div>
                            Acesso ao painel principal
                        </li>
                        <li class="flex items-start gap-3 text-sm font-medium text-gray-800">
                            <div class="mt-0.5 w-5 h-5 rounded-full bg-gray-100 flex items-center justify-center shrink-0">
                                <i class="fa-solid fa-check text-[10px] text-gray-500"></i>
                            </div>
                            Gestão de até 50 clientes
                        </li>
                        <li class="flex items-start gap-3 text-sm font-medium text-gray-800">
                            <div class="mt-0.5 w-5 h-5 rounded-full bg-gray-100 flex items-center justify-center shrink-0">
                                <i class="fa-solid fa-check text-[10px] text-gray-500"></i>
                            </div>
                            Suporte via email
                        </li>
                    </ul>

                    <button class="w-full py-4 rounded-full border-2 border-gray-100 text-gray-800 font-bold text-sm bg-gray-50 hover:bg-gray-100 transition-colors">
                        Seu Plano Atual
                    </button>
                </div>

                <!-- Card 2: Plano Mestre (Highlighted) -->
                <div id="card-pro" class="bg-white rounded-[24px] p-8 shadow-card border-2 border-primary shadow-glow relative overflow-hidden transform scale-[1.02]">

        </main>


    <script src="../../_mobile-nav.js"></script>
</body>
</html>
