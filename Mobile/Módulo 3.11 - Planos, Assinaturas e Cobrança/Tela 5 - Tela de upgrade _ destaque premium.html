<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de upgrade _ destaque premium - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        background: '#F8F9FA',
                        primary: '#0016dc',
                        textMain: '#1A1A24',
                        textMuted: '#4B5563',
                        gold: '#F59E0B'
                    },
                    boxShadow: {
                        'glass': '0 4px 30px rgba(0, 0, 0, 0.05)',
                        'pill': '0 8px 24px rgba(0, 22, 220, 0.1)',
                        'soft': '0 4px 20px rgba(26, 26, 36, 0.04)',
                        'float': '0 12px 32px rgba(0, 0, 0, 0.08)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F8F9FA;
            color: #1A1A24;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        ::-webkit-scrollbar {
            display: none;
        }
        .glass-blur {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="pb-28 flex justify-center min-h-[100dvh] bg-gray-100">

    <!-- Mobile Wrapper -->
    <div id="app-container" class="w-full max-w-[375px] bg-background min-h-[100dvh] relative overflow-hidden flex flex-col shadow-2xl">

        <!-- Top Header -->
        <header id="header" class="fixed top-0 w-full max-w-[375px] z-50 glass-blur bg-white/80 border-b border-white/20 px-5 pt-12 pb-4 flex items-center justify-between">
            <button class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-soft text-textMain hover:bg-gray-50 transition-colors">
                <i class="fa-solid fa-arrow-left text-lg"></i>
            </button>
            <h1 class="text-base font-bold text-textMain tracking-tight">Turbinar Perfil</h1>
            <div class="w-10"></div> <!-- Spacer for centering -->
        </header>

        <!-- Main Content Scrollable Area -->
        <main class="flex-1 overflow-y-auto pt-28 pb-48 px-5">
            
            <!-- Hero Illustration (The Hook) -->
            <section id="hero-illustration" class="flex flex-col items-center justify-center mb-8 relative">
                <!-- Decorative background elements -->
                <div class="absolute w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10 top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"></div>
                
                <div class="relative w-full h-56 flex items-center justify-center">
                    <img class="w-full h-full object-contain" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/8e440070e4-ef4c34248a8374c47bf3.png" alt="modern 3D vector illustration of a professional profile card floating above a crowd, surrounded by small glowing stars and a rocket icon, deep blue and gold accents, clean off-white background" />
                    

        </main>

        <!-- Sticky Action Area -->
        <section id="sticky-action" class="fixed bottom-[90px] w-full max-w-[375px] px-5 z-40">
            <div class="bg-white/90 glass-blur rounded-[32px] p-2 pl-6 pr-2 flex items-center justify-between shadow-float border border-white/60">
                <div class="flex flex-col">
                    <span class="text-[10px] uppercase tracking-wider font-bold text-textMuted">Investimento</span>
                    <span class="text-base font-extrabold text-textMain">R$ 49,90<span class="text-xs font-medium text-textMuted">/mês</span></span>
                </div>
                <button class="bg-primary hover:bg-primary/90 text-white font-bold text-sm py-4 px-6 rounded-full shadow-pill transition-transform active:scale-95 flex items-center gap-2">
                    Fazer Upgrade
                    <i class="fa-solid fa-arrow-right text-xs"></i>
                </button>
            </div>
        </section>


    <script src="../../_mobile-nav.js"></script>
</body>
</html>
