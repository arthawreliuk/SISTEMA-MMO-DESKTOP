<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tela de checkout - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#0016dc',
                            navy: '#1A1A24',
                            offwhite: '#F8F9FA',
                            lightgray: '#E5E7EB',
                            darkgray: '#4B5563'
                        }
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'inner-soft': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.04)',
                        'glass': '0 4px 30px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F8F9FA;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        ::-webkit-scrollbar { display: none; }
        
        /* Inner shadow utility for inputs */
        .input-shadow {
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.04);
        }
    </style>
</head>
<body class="pb-28 text-brand-navy min-h-screen relative pb-24">

    <!-- Mobile Container Wrapper -->
    <div class="w-full max-w-[430px] mx-auto min-h-screen bg-brand-offwhite relative flex flex-col">

        <!-- 1. Top Header (Glassmorphism) -->
        <header id="header" class="sticky top-0 z-50 w-full px-6 py-5 bg-white/80 backdrop-blur-md border-b border-brand-lightgray/50 shadow-glass flex items-center justify-between">
            <button class="w-10 h-10 flex items-center justify-center rounded-full bg-brand-offwhite hover:bg-gray-100 transition-colors text-brand-navy">
                <i class="fa-solid fa-arrow-left text-lg"></i>
            </button>
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-lock text-brand-blue text-sm"></i>
                <h1 class="font-bold text-lg text-brand-navy tracking-tight">Pagamento Seguro</h1>
            </div>
            <div class="w-10"></div> <!-- Spacer for centering -->
        </header>

        <!-- Main Scrollable Content -->
        <main class="flex-1 px-5 pt-6 pb-8 flex flex-col gap-6">

            <!-- 2. Order Summary Card -->
            <section id="order-summary" class="bg-white rounded-[24px] p-6 shadow-soft border border-gray-100">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h2 class="text-sm font-medium text-brand-darkgray uppercase tracking-wider mb-1">Resumo do Pedido</h2>
                        <h3 class="text-xl font-bold text-brand-navy">Plano Mestre <span class="text-sm font-medium text-brand-darkgray font-normal">(Mensal)</span></h3>
                    </div>
                </div>
                
                <div class="flex items-baseline gap-1 mb-5">
                    <span class="text-3xl font-extrabold text-brand-blue tracking-tight">R$ 49,90</span>
                </div>

                <div class="w-full border-t border-dashed border-gray-200 my-4"></div>
                
                <div class="flex items-center gap-3 text-sm text-brand-darkgray">
                    <i class="fa-solid fa-rotate text-gray-400"></i>
                    <p>Renovação automática. Cancele quando quiser.</p>
                </div>
            </section>

            <!-- 3. Payment Method Selector -->
            <section id="payment-methods" class="flex flex-col gap-4">
                <h3 class="text-sm font-bold text-brand-navy ml-2">Método de Pagamento</h3>
                
                <div class="flex p-1 bg-white rounded-full shadow-inner-soft border border-gray-100">
                    <button class="flex-1 flex items-center justify-center gap-2 py-3.5 rounded-full bg-brand-blue text-white font-semibold text-sm shadow-md transition-all">
                        <i class="fa-regular fa-credit-card text-base"></i>
                        Cartão
                    </button>
                    <button class="flex-1 flex items-center justify-center gap-2 py-3.5 rounded-full text-brand-darkgray font-medium text-sm hover:bg-gray-50 transition-all">
                        <i class="fa-brands fa-pix text-base text-teal-500"></i>
                        PIX
                    </button>
                </div>
            </section>

            <!-- 4. Payment Form (Credit Card) -->
            <section id="payment-form" class="flex flex-col gap-4">
                
                <!-- Card Number -->
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                        <i class="fa-regular fa-credit-card text-gray-400 text-lg"></i>
                    </div>
                    <input type="text" placeholder="Número do Cartão" class="w-full pl-12 pr-5 py-4 bg-white border border-gray-200 rounded-[20px] text-brand-navy font-medium placeholder-gray-400 focus:outline-none focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/20 transition-all input-shadow">
                    <div class="absolute inset-y-0 right-0 pr-5 flex items-center pointer-events-none">
                        <i class="fa-brands fa-cc-visa text-brand-blue text-xl opacity-80"></i>
                    </div>
                </div>

                <!-- Cardholder Name -->
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                        <i class="fa-regular fa-user text-gray-400 text-lg"></i>
                    </div>
                    <input type="text" placeholder="Nome do Titular" value="Arthur R. Hawreliuk" class="w-full pl-12 pr-5 py-4 bg-white border border-gray-200 rounded-[20px] text-brand-navy font-medium placeholder-gray-400 focus:outline-none focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/20 transition-all input-shadow">
                </div>

                <!-- Split Fields: Expiry & CVV -->
                <div class="flex gap-4">
                    <div class="relative flex-1">
                        <input type="text" placeholder="Validade (MM/AA)" class="w-full px-5 py-4 bg-white border border-gray-200 rounded-[20px] text-brand-navy font-medium placeholder-gray-400 focus:outline-none focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/20 transition-all input-shadow text-center">
                    </div>
                    <div class="relative flex-1">
                        <input type="text" placeholder="CVV" class="w-full px-5 py-4 bg-white border border-gray-200 rounded-[20px] text-brand-navy font-medium placeholder-gray-400 focus:outline-none focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/20 transition-all input-shadow text-center">
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-circle-question text-gray-300 text-sm"></i>
                        </div>
                    </div>
                </div>

            </section>

            <!-- 5. Trust Badges -->
            <section id="trust-badges" class="mt-4 mb-8 flex items-center justify-center gap-6 opacity-60 grayscale hover:grayscale-0 transition-all duration-300">
                <div class="flex items-center gap-1 text-xs font-bold text-brand-darkgray">
                    <i class="fa-solid fa-shield-halved"></i> SSL
                </div>
                <i class="fa-brands fa-cc-visa text-2xl text-brand-darkgray"></i>
                <i class="fa-brands fa-cc-mastercard text-2xl text-brand-darkgray"></i>
                <i class="fa-brands fa-pix text-xl text-brand-darkgray"></i>
            </section>

        </main>

        <!-- 6. Primary Action (Pinned Bottom) -->
        <div id="pinned-action" class="fixed bottom-0 left-0 right-0 w-full max-w-[430px] mx-auto p-5 bg-white/90 backdrop-blur-md border-t border-gray-100 z-50 pb-8">
            <button class="w-full py-4.5 bg-brand-blue hover:bg-blue-800 text-white rounded-full font-bold text-lg shadow-[0_8px_30px_rgba(0,22,220,0.3)] transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                <i class="fa-solid fa-shield-check text-base"></i>
                Assinar e Pagar R$ 49,90
            </button>
        </div>

    </div>

    <script src="../../_mobile-nav.js"></script>
</body>
</html>
