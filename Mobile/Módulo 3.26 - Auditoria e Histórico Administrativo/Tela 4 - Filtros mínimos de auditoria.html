<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SaaS Audit Log Smart Filters</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        deepNavy: '#1A1A24',
                        trustBlue: '#0016dc',
                        trustBlueHover: '#0012b3',
                        appBackground: '#F3F4F6',
                        sheetBackground: '#FFFFFF',
                        borderGray: '#E5E7EB',
                        textMuted: '#6B7280',
                        chipBg: '#F3F4F6',
                    },
                    boxShadow: {
                        'sheet': '0 -10px 40px -10px rgba(0,0,0,0.1)',
                        'nav': '0 10px 30px -10px rgba(0,0,0,0.15)',
                        'input': '0 2px 4px rgba(0,0,0,0.02)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; background-color: #1A1A24; }
        ::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Blurred background effect */
        .bg-app-overlay {
            background-image: url('https://images.unsplash.com/photo-1551288049-bebda4e38f71?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="text-deepNavy overflow-hidden h-[100dvh] w-full relative flex justify-center bg-black">

    <!-- Mobile Container Wrapper -->
    <div class="w-full h-full max-w-[375px] mx-auto relative overflow-hidden flex flex-col bg-deepNavy">
        
        <!-- Background App Context (Blurred & Darkened) -->
        <div id="background-app" class="absolute inset-0 z-0 bg-app-overlay opacity-30 blur-sm mix-blend-overlay"></div>
        <div class="absolute inset-0 z-10 bg-deepNavy/70 backdrop-blur-[2px]"></div>

        <!-- Floating Bottom Navigation Bar (Visible under overlay) -->
        <div id="bottom-nav" class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[90%] z-20 bg-white/90 backdrop-blur-md rounded-full h-16 shadow-nav flex items-center justify-between px-6 border border-white/20">
            <button class="flex flex-col items-center justify-center w-12 h-12 text-trustBlue">
                <i class="fa-solid fa-house text-lg mb-1"></i>
            </button>
            <button class="flex flex-col items-center justify-center w-12 h-12 text-textMuted hover:text-deepNavy transition-colors">
                <i class="fa-solid fa-chart-pie text-lg mb-1"></i>
            </button>
            <button class="flex flex-col items-center justify-center w-12 h-12 text-textMuted hover:text-deepNavy transition-colors relative">
                <i class="fa-solid fa-bell text-lg mb-1"></i>
                <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full"></span>
            </button>
            <button class="flex flex-col items-center justify-center w-12 h-12 text-textMuted hover:text-deepNavy transition-colors">
                <i class="fa-solid fa-gear text-lg mb-1"></i>
            </button>
        </div>

        <!-- Bottom Sheet Overlay -->
        <div id="filter-sheet" class="absolute bottom-0 left-0 w-full h-[75%] bg-sheetBackground rounded-t-[24px] z-30 shadow-sheet flex flex-col transform transition-transform duration-300 ease-out">
            
            <!-- Drag Handle -->
            <div class="w-full flex justify-center pt-3 pb-1">
                <div class="w-12 h-1.5 bg-gray-200 rounded-full"></div>
            </div>

            <!-- Header -->
            <div id="sheet-header" class="px-6 pt-4 pb-5 flex items-center justify-between border-b border-gray-100">
                <h1 class="text-[20px] font-bold text-deepNavy tracking-tight">Filtros de Auditoria</h1>
                <button class="text-[14px] font-semibold text-trustBlue hover:text-trustBlueHover transition-colors">Limpar tudo</button>
            </div>

            <!-- Scrollable Content Area -->
            <div id="sheet-content" class="flex-1 overflow-y-auto hide-scrollbar px-6 py-6 pb-28 space-y-8">
                
                <!-- Período Section -->
                <section id="filter-period" class="space-y-3">
                    <h2 class="text-[15px] font-semibold text-deepNavy">Período</h2>
                    <div class="flex overflow-x-auto hide-scrollbar space-x-2 -mx-6 px-6 pb-1">
                        <button class="whitespace-nowrap px-5 py-2.5 rounded-full border border-gray-200 text-[14px] font-medium text-textMuted hover:bg-gray-50 transition-colors">
                            Hoje
                        </button>
                        <button class="whitespace-nowrap px-5 py-2.5 rounded-full bg-trustBlue text-white text-[14px] font-medium shadow-sm transition-colors">
                            Últimos 7 dias
                        </button>
                        <button class="whitespace-nowrap px-5 py-2.5 rounded-full border border-gray-200 text-[14px] font-medium text-textMuted hover:bg-gray-50 transition-colors">
                            Mês Atual
                        </button>
                        <button class="whitespace-nowrap px-5 py-2.5 rounded-full border border-gray-200 text-[14px] font-medium text-textMuted hover:bg-gray-50 transition-colors">
                            Personalizado
                        </button>
                    </div>
                </section>

                <!-- Módulo Section -->
                <section id="filter-module" class="space-y-3">
                    <h2 class="text-[15px] font-semibold text-deepNavy">Módulo</h2>
                    
                    <!-- Dropdown Input Pill -->
                    <div class="relative">
                        <div class="w-full h-14 bg-white border border-gray-200 rounded-full flex items-center px-5 shadow-input cursor-pointer hover:border-gray-300 transition-colors">
                            <span class="text-[15px] text-textMuted flex-1">Selecione o módulo...</span>
                            <i class="fa-solid fa-chevron-down text-gray-400 text-sm"></i>
                        </div>
                    </div>

                    <!-- Active Chips -->
                    <div class="flex flex-wrap gap-2 pt-1">
                        <div class="inline-flex items-center bg-chipBg px-3.5 py-2 rounded-full border border-gray-100">
                            <span class="text-[13px] font-medium text-deepNavy mr-2">📦 Central de Modelos</span>
                            <button class="text-gray-400 hover:text-deepNavy transition-colors"><i class="fa-solid fa-xmark text-[11px]"></i></button>
                        </div>
                        <div class="inline-flex items-center bg-chipBg px-3.5 py-2 rounded-full border border-gray-100">
                            <span class="text-[13px] font-medium text-deepNavy mr-2">⚙️ Configurações</span>
                            <button class="text-gray-400 hover:text-deepNavy transition-colors"><i class="fa-solid fa-xmark text-[11px]"></i></button>
                        </div>
                    </div>
                </section>

                <!-- Usuário Section -->
                <section id="filter-user" class="space-y-3">
                    <h2 class="text-[15px] font-semibold text-deepNavy">Usuário</h2>
                    
                    <!-- Search Input Pill -->
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                            <i class="fa-solid fa-magnifying-glass text-gray-400 text-[15px]"></i>
                        </div>
                        <input type="text" 
                               class="w-full h-14 bg-white border border-gray-200 rounded-full pl-12 pr-5 text-[15px] text-deepNavy placeholder-gray-400 shadow-input focus:outline-none focus:border-trustBlue focus:ring-1 focus:ring-trustBlue transition-all" 
                               placeholder="Buscar por nome ou ID...">
                    </div>
                </section>

            </div>

            <!-- Sticky Action Button -->
            <div id="sheet-footer" class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-white via-white to-transparent pt-10">
                <button class="w-full h-14 bg-trustBlue hover:bg-trustBlueHover text-white rounded-full font-semibold text-[16px] shadow-[0_8px_20px_-6px_rgba(0,22,220,0.5)] flex items-center justify-center space-x-2 transition-all active:scale-[0.98]">
                    <i class="fa-solid fa-magnifying-glass text-[15px]"></i>
                    <span>Aplicar 3 Filtros</span>
                </button>
            </div>

        </div>
    </div>

</body>
</html>
