<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Linha do tempo de ações sensíveis - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        background: '#F8F9FA',
                        surface: '#FFFFFF',
                        primary: '#0016dc',
                        text: {
                            main: '#1A1A24',
                            muted: '#6B7280',
                        },
                        status: {
                            critical: '#EF4444',
                            warning: '#F59E0B',
                            security: '#0016dc',
                        },
                        border: '#E5E7EB',
                    },
                    boxShadow: {
                        'card': '0 4px 20px rgba(0, 0, 0, 0.04)',
                        'nav': '0 -8px 30px rgba(0, 0, 0, 0.08)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F8F9FA;
            color: #1A1A24;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        ::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        html {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="min-h-[100dvh] flex flex-col relative pb-28">

    <!-- Header -->
    <header id="header" class="fixed top-0 left-0 right-0 bg-surface z-50 border-b border-border shadow-sm h-16 flex items-center justify-center px-4 w-full max-w-[375px] mx-auto sm:max-w-none">
        <h1 class="text-[17px] font-semibold text-text-main tracking-tight">Auditoria Crítica</h1>
    </header>

    <!-- Main Content (Timeline Canvas) -->
    <main id="main-content" class="flex-1 mt-16 px-5 py-8 w-full max-w-[375px] mx-auto sm:max-w-md">
        
        <!-- Timeline Wrapper -->
        <div id="timeline-container" class="relative">
            <!-- Vertical Line -->
            <div class="absolute left-[15px] top-4 bottom-4 w-[2px] bg-border rounded-full z-0"></div>

            <!-- Node 1: Critical -->
            <div id="node-critical" class="relative pl-12 mb-10 group">
                <!-- Dot -->
                <div class="absolute left-[11px] top-[14px] w-[10px] h-[10px] rounded-full bg-status-critical z-10 ring-4 ring-background shadow-[0_0_12px_rgba(239,68,68,0.4)]"></div>
                
                <!-- Card -->
                <div class="bg-surface rounded-[16px] p-5 shadow-card border border-border/50 relative overflow-hidden transition-transform duration-200 active:scale-[0.98]">
                    <!-- Subtle top accent line -->
                    <div class="absolute top-0 left-0 right-0 h-[3px] bg-status-critical/80"></div>
                    
                    <div class="flex justify-between items-start mb-2">
                        <h2 class="text-[15px] font-bold text-text-main leading-tight pr-2">Conta Bancária Alterada</h2>
                        <i class="fa-solid fa-triangle-exclamation text-status-critical text-[14px] mt-0.5"></i>
                    </div>
                    <p class="text-[13px] text-text-muted font-medium mb-3">Autorizado via Token SMS por Arthur H.</p>
                    
                    <div class="flex items-center gap-2 mt-4 pt-3 border-t border-border/40">
                        <i class="fa-regular fa-clock text-text-muted text-[12px]"></i>
                        <span class="text-[12px] font-semibold text-text-muted">Hoje, 10:45</span>
                    </div>
                </div>
            </div>

            <!-- Node 2: Warning -->
            <div id="node-warning" class="relative pl-12 mb-10 group">
                <!-- Dot -->
                <div class="absolute left-[11px] top-[14px] w-[10px] h-[10px] rounded-full bg-status-warning z-10 ring-4 ring-background shadow-[0_0_12px_rgba(245,158,11,0.3)]"></div>
                
                <!-- Card -->
                <div class="bg-surface rounded-[16px] p-5 shadow-card border border-border/50 relative overflow-hidden transition-transform duration-200 active:scale-[0.98]">
                    <div class="absolute top-0 left-0 right-0 h-[3px] bg-status-warning/80"></div>
                    
                    <div class="flex justify-between items-start mb-2">
                        <h2 class="text-[15px] font-bold text-text-main leading-tight pr-2">Exportação de Dados em Massa (CSV)</h2>
                        <i class="fa-solid fa-file-export text-status-warning text-[14px] mt-0.5"></i>
                    </div>
                    <p class="text-[13px] text-text-muted font-medium mb-3">Módulo: Clientes</p>
                    
                    <div class="flex items-center gap-2 mt-4 pt-3 border-t border-border/40">
                        <i class="fa-regular fa-clock text-text-muted text-[12px]"></i>
                        <span class="text-[12px] font-semibold text-text-muted">Ontem, 18:30</span>
                    </div>
                </div>
            </div>

            <!-- Node 3: Security -->
            <div id="node-security" class="relative pl-12 mb-4 group">
                <!-- Dot -->
                <div class="absolute left-[11px] top-[14px] w-[10px] h-[10px] rounded-full bg-status-security z-10 ring-4 ring-background shadow-[0_0_12px_rgba(0,22,220,0.3)]"></div>
                
                <!-- Card -->
                <div class="bg-surface rounded-[16px] p-5 shadow-card border border-border/50 relative overflow-hidden transition-transform duration-200 active:scale-[0.98]">
                    <div class="absolute top-0 left-0 right-0 h-[3px] bg-status-security/80"></div>
                    
                    <div class="flex justify-between items-start mb-2">
                        <h2 class="text-[15px] font-bold text-text-main leading-tight pr-2">Login de Novo Dispositivo</h2>
                        <i class="fa-solid fa-laptop-code text-status-security text-[14px] mt-0.5"></i>
                    </div>
                    <p class="text-[13px] text-text-muted font-medium mb-3">MacBook Pro - Balneário Camboriú</p>
                    
                    <div class="flex items-center gap-2 mt-4 pt-3 border-t border-border/40">
                        <i class="fa-regular fa-clock text-text-muted text-[12px]"></i>
                        <span class="text-[12px] font-semibold text-text-muted">Ontem, 09:15</span>
                    </div>
                </div>
            </div>

            <!-- Fade out end of timeline -->
            <div class="absolute bottom-[-20px] left-[15px] w-[2px] h-12 bg-gradient-to-b from-border to-transparent z-0"></div>
        </div>

    </main>


    <script src="../../_mobile-nav.js"></script>
</body>
</html>
