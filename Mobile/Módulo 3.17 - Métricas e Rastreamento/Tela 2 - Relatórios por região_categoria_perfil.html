<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios por região_categoria_perfil - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#0016dc',
                            navy: '#1A1A24',
                            offwhite: '#F8F9FA',
                            white: '#FFFFFF',
                            gray: '#E5E7EB',
                            lightGray: '#F3F4F6'
                        }
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'floating': '0 20px 40px -20px rgba(0, 22, 220, 0.25)',
                        'nav': '0 -10px 40px -10px rgba(0,0,0,0.05)'
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="pb-28 bg-brand-offwhite text-brand-navy min-h-[100dvh] flex justify-center">

    <!-- Mobile Container (Max Width for Desktop Viewing, Full Width on Mobile) -->
    <div class="w-full max-w-[375px] bg-brand-offwhite min-h-[100dvh] relative flex flex-col shadow-2xl overflow-hidden">
        
        <!-- Header -->
        <header id="header" class="bg-brand-white px-6 py-5 flex items-center justify-between sticky top-0 z-50 rounded-b-[24px] shadow-sm">
            <button class="w-10 h-10 flex items-center justify-center rounded-full bg-brand-lightGray hover:bg-gray-200 transition-colors">
                <i class="fa-solid fa-chevron-left text-brand-navy text-lg"></i>
            </button>
            <h1 class="text-[18px] font-bold tracking-tight text-brand-navy">Gerar Relatório</h1>
            <div class="w-10 h-10"></div> <!-- Spacer for centering -->
        </header>

        <!-- Main Content Scrollable Area -->
        <main class="flex-1 overflow-y-auto no-scrollbar pb-[180px] px-6 pt-6 flex flex-col gap-6">
            
            <!-- Filter Builder Card -->
            <section id="filter-builder" class="bg-brand-white rounded-[24px] p-6 shadow-soft flex flex-col gap-5">
                <h2 class="text-[16px] font-bold text-brand-navy mb-1">Configurar Filtros</h2>
                
                <!-- Região Dropdown -->
                <div class="flex flex-col gap-2">
                    <label class="text-[13px] font-semibold text-gray-500 uppercase tracking-wider pl-1">Região</label>
                    <button class="w-full bg-brand-lightGray hover:bg-gray-200 transition-colors rounded-full py-4 px-5 flex items-center justify-between text-left">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center shadow-sm">
                                <i class="fa-solid fa-map-location-dot text-brand-blue text-[14px]"></i>
                            </div>
                            <span class="text-[15px] font-semibold text-brand-navy">Camboriú e Itajaí</span>
                        </div>
                        <i class="fa-solid fa-chevron-down text-gray-400 text-[14px]"></i>
                    </button>
                </div>

                <!-- Categoria Dropdown -->
                <div class="flex flex-col gap-2">
                    <label class="text-[13px] font-semibold text-gray-500 uppercase tracking-wider pl-1">Categoria</label>
                    <button class="w-full bg-brand-lightGray hover:bg-gray-200 transition-colors rounded-full py-4 px-5 flex items-center justify-between text-left">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center shadow-sm">
                                <i class="fa-solid fa-layer-group text-brand-blue text-[14px]"></i>
                            </div>
                            <span class="text-[15px] font-semibold text-brand-navy">Todas as Categorias</span>
                        </div>
                        <i class="fa-solid fa-chevron-down text-gray-400 text-[14px]"></i>
                    </button>
                </div>

                <!-- Período Segmented Control -->
                <div class="flex flex-col gap-2 mt-2">
                    <label class="text-[13px] font-semibold text-gray-500 uppercase tracking-wider pl-1">Período</label>
                    <div class="bg-brand-lightGray p-1.5 rounded-full flex w-full relative">
                        <button class="flex-1 py-2.5 text-[14px] font-bold text-gray-500 rounded-full transition-all relative z-10">Semana</button>
                        <button class="flex-1 py-2.5 text-[14px] font-bold text-brand-navy bg-white shadow-sm rounded-full transition-all relative z-10">Mês</button>
                        <button class="flex-1 py-2.5 text-[14px] font-bold text-gray-500 rounded-full transition-all relative z-10">Ano</button>
                    </div>
                </div>

                <!-- Filter Action -->
                <button class="w-full bg-brand-blue text-white font-bold text-[16px] py-4 rounded-full mt-2 shadow-floating transition-transform active:scale-[0.98]">
                    Filtrar Dados
                </button>
            </section>

            <!-- Data Snapshot (Results) -->
            <section id="data-snapshot" class="flex flex-col gap-4 mt-2">
                <div class="flex items-center justify-between px-1">
                    <h3 class="text-[18px] font-bold text-brand-navy">Resultados</h3>
                    <span class="text-[13px] font-semibold text-brand-blue bg-blue-50 px-3 py-1 rounded-full">Novembro 2023</span>
                </div>

                <!-- Metric Card 1 -->
                <div class="bg-brand-white rounded-[20px] p-5 shadow-soft flex items-center gap-4 relative overflow-hidden">
                    <div class="absolute right-0 top-0 w-24 h-full bg-gradient-to-l from-blue-50 to-transparent opacity-50"></div>
                    <div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center shrink-0">
                        <i class="fa-solid fa-chart-line text-brand-blue text-[18px]"></i>
                    </div>
                    <div class="flex flex-col relative z-10">
                        <span class="text-[13px] font-semibold text-gray-500 mb-0.5">Volume de Transações</span>
                        <span class="text-[22px] font-extrabold text-brand-navy tracking-tight">R$ 8.500</span>
                    </div>
                </div>

                <!-- Metric Card 2 -->
                <div class="bg-brand-white rounded-[20px] p-5 shadow-soft flex items-center gap-4 relative overflow-hidden">
                    <div class="absolute right-0 top-0 w-24 h-full bg-gradient-to-l from-indigo-50 to-transparent opacity-50"></div>
                    <div class="w-12 h-12 rounded-full bg-indigo-50 flex items-center justify-center shrink-0">
                        <i class="fa-solid fa-users text-indigo-600 text-[18px]"></i>
                    </div>
                    <div class="flex flex-col relative z-10">
                        <span class="text-[13px] font-semibold text-gray-500 mb-0.5">Mestres Ativos na Seleção</span>
                        <span class="text-[22px] font-extrabold text-brand-navy tracking-tight">45</span>
                    </div>
                </div>
            </section>

        </main>

        <!-- Pinned Bottom Action & Navigation -->
        <div class="absolute bottom-0 left-0 w-full px-6 pb-8 pt-4 bg-gradient-to-t from-brand-offwhite via-brand-offwhite to-transparent flex flex-col gap-6 z-40">
            
            <!-- Primary Export Action -->
            <button class="w-full bg-brand-navy text-white font-bold text-[16px] py-4 rounded-full shadow-floating flex items-center justify-center gap-3 transition-transform active:scale-[0.98]">
                <i class="fa-solid fa-file-pdf text-[18px]"></i>
                Exportar Relatório (PDF)
            </button>


    <script src="../../_mobile-nav.js"></script>
</body>
</html>
