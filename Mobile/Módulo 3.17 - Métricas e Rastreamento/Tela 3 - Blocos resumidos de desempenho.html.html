<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#0016dc',
                            navy: '#1A1A24',
                            bg: '#F8F9FA',
                            success: '#37D299'
                        }
                    },
                    boxShadow: {
                        'bento': '0 10px 40px -10px rgba(0,0,0,0.04), 0 4px 12px -4px rgba(0,0,0,0.02)',
                        'nav': '0 -10px 40px -10px rgba(0,0,0,0.08)'
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
        .bento-card {
            background-color: #FFFFFF;
            border-radius: 24px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.04), 0 4px 12px -4px rgba(0,0,0,0.02);
            padding: 24px;
        }
    </style>
</head>
<body class="text-brand-navy min-h-[100dvh] pb-[140px]">

    <!-- Mobile Wrapper -->
    <div class="w-full max-w-[430px] mx-auto min-h-[100dvh] relative flex flex-col pt-[max(env(safe-area-inset-top),20px)] px-5">

        <!-- Top Header -->
        <header id="header" class="flex items-center justify-between py-4 mb-6 sticky top-0 z-40 bg-brand-bg/90 backdrop-blur-md">
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm">
                <i class="fa-solid fa-chart-line text-brand-blue text-lg"></i>
            </div>
            <h1 class="text-[17px] font-semibold text-brand-navy">Resumo do Dia</h1>
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm relative">
                <i class="fa-regular fa-bell text-brand-navy"></i>
                <div class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></div>
            </div>
        </header>

        <!-- Main Content (Bento Grid) -->
        <main class="flex flex-col gap-4 flex-1">

            <!-- Block 1: Hero Snapshot -->
            <section id="hero-snapshot" class="bento-card flex flex-col gap-5">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="text-[15px] font-medium text-brand-navy/60 mb-1">Saúde da Plataforma</h2>
                        <div class="flex items-center gap-2">
                            <span class="text-2xl font-bold text-brand-navy">Excelente</span>
                            <div class="bg-[#37D299]/10 text-[#37D299] px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1.5">
                                <i class="fa-solid fa-circle text-[6px]"></i>
                                ESTÁVEL
                            </div>
                        </div>
                    </div>
                    <div class="w-12 h-12 bg-[#37D299]/10 rounded-full flex items-center justify-center text-[#37D299] text-2xl">
                        <i class="fa-solid fa-face-smile-beam"></i>
                    </div>
                </div>
                
                <div class="bg-brand-bg rounded-[16px] p-4 border border-gray-100">
                    <p class="text-sm font-medium text-brand-navy/80 flex items-center gap-2">
                        <i class="fa-solid fa-check-circle text-[#37D299]"></i>
                        Sem gargalos no Balcão hoje.
                    </p>
                </div>
            </section>

            <!-- Grid Row: Blocks 2 & 3 -->
            <div class="grid grid-cols-2 gap-4">
                
                <!-- Block 2: Leads -->
                <section id="leads-stat" class="bento-card flex flex-col justify-between aspect-square">
                    <div class="flex items-center justify-between">
                        <div class="w-8 h-8 bg-brand-blue/10 rounded-full flex items-center justify-center text-brand-blue">
                            <i class="fa-solid fa-users"></i>
                        </div>
                        <span class="text-xs font-bold text-[#37D299] bg-[#37D299]/10 px-2 py-1 rounded-full">+12%</span>
                    </div>
                    <div>
                        <h3 class="text-[13px] font-medium text-brand-navy/60 mb-1">Leads Hoje</h3>
                        <p class="text-[32px] font-bold text-brand-navy leading-none">142</p>
                    </div>
                </section>

                <!-- Block 3: Conversion -->
                <section id="conversion-stat" class="bento-card flex flex-col justify-between aspect-square items-center text-center relative overflow-hidden">
                    <h3 class="text-[13px] font-medium text-brand-navy/60 w-full text-left absolute top-6 left-6 z-10">Conversão</h3>
                    
                    <!-- SVG Radial Progress -->
                    <div class="relative w-[100px] h-[100px] mt-6">
                        <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                            <!-- Background circle -->
                            <circle cx="50" cy="50" r="40" fill="transparent" stroke="#F0F2F5" stroke-width="8"></circle>
                            <!-- Progress circle -->
                            <circle cx="50" cy="50" r="40" fill="transparent" stroke="#0016dc" stroke-width="8" stroke-dasharray="251.2" stroke-dashoffset="30.14" stroke-linecap="round"></circle>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center flex-col">
                            <span class="text-2xl font-bold text-brand-navy">88%</span>
                        </div>
                    </div>
                </section>

            </div>

            <!-- Block 4: Top Performer -->
            <section id="top-performer" class="bento-card relative overflow-hidden group">
                <div class="absolute top-0 right-0 w-32 h-32 bg-brand-blue/5 rounded-full blur-2xl -mr-10 -mt-10"></div>
                
                <div class="flex items-center justify-between mb-4 relative z-10">
                    <h3 class="text-[14px] font-semibold text-brand-navy">Destaque da Semana</h3>
                    <i class="fa-solid fa-trophy text-[#FCA34D]"></i>
                </div>

                <div class="flex items-center gap-4 relative z-10 bg-brand-bg rounded-[16px] p-4 border border-gray-100">
                    <div class="relative">
                        <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-4.jpg" alt="Roberto" class="w-12 h-12 rounded-full object-cover border-2 border-white shadow-sm">
                        <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-[#FCA34D] rounded-full flex items-center justify-center border-2 border-white">
                            <i class="fa-solid fa-star text-[8px] text-white"></i>
                        </div>
                    </div>
                    <div class="flex-1">
                        <p class="text-[15px] font-bold text-brand-navy">Roberto</p>
                        <p class="text-[13px] text-brand-navy/60">Elétrica</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[12px] text-brand-navy/60 mb-0.5">Gerados</p>
                        <p class="text-[15px] font-bold text-[#37D299]">R$ 2.4k</p>
                    </div>
                </div>
            </section>

        </main>

        <!-- Floating Bottom Navigation & CTA -->
        <div class="fixed bottom-0 left-0 w-full z-50 px-5 pb-[max(env(safe-area-inset-bottom),24px)] pt-6 bg-gradient-to-t from-[#F8F9FA] via-[#F8F9FA]/90 to-transparent">
            <div class="max-w-[430px] mx-auto flex flex-col gap-4">
                
                <!-- Massive Pinned CTA -->
                <button class="w-full bg-brand-blue text-white h-[60px] rounded-[20px] font-bold text-[16px] shadow-[0_12px_24px_-8px_rgba(0,22,220,0.4)] flex items-center justify-center gap-3 active:scale-[0.98] transition-transform">
                    Ver Relatório Completo
                    <i class="fa-solid fa-arrow-right text-sm"></i>
                </button>

                <!-- Floating Pill Nav -->
                <nav class="bg-white h-[64px] rounded-full shadow-nav flex items-center justify-between px-6 border border-gray-100">
                    <a href="#" class="flex flex-col items-center gap-1 text-brand-blue">
                        <i class="fa-solid fa-house text-lg"></i>
                        <span class="text-[10px] font-medium">Início</span>
                    </a>
                    <a href="#" class="flex flex-col items-center gap-1 text-brand-navy/40 hover:text-brand-navy transition-colors">
                        <i class="fa-solid fa-chart-pie text-lg"></i>
                        <span class="text-[10px] font-medium">Métricas</span>
                    </a>
                    <a href="#" class="flex flex-col items-center gap-1 text-brand-navy/40 hover:text-brand-navy transition-colors">
                        <i class="fa-solid fa-wallet text-lg"></i>
                        <span class="text-[10px] font-medium">Carteira</span>
                    </a>
                    <a href="#" class="flex flex-col items-center gap-1 text-brand-navy/40 hover:text-brand-navy transition-colors">
                        <i class="fa-regular fa-user text-lg"></i>
                        <span class="text-[10px] font-medium">Perfil</span>
                    </a>
                </nav>
            </div>
        </div>

    </div>

</body>
</html>
