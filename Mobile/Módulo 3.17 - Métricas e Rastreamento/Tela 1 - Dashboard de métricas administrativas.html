<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de métricas administrativas - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-3.1.1.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        background: '#F8F9FA',
                        surface: '#FFFFFF',
                        primary: '#0016dc',
                        accent: '#BF80FF',
                        textMain: '#1A1A24',
                        textMuted: '#6B7280',
                        success: '#10B981',
                        border: '#E5E7EB'
                    },
                    boxShadow: {
                        'ambient': '0 10px 40px -10px rgba(0, 22, 220, 0.08), 0 4px 6px -4px rgba(0, 0, 0, 0.05)',
                        'nav': '0 -4px 20px -5px rgba(0, 0, 0, 0.05)'
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
        
        /* Mobile Constraint Wrapper */
        .mobile-wrapper {
            width: 100%;
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            background-color: #F8F9FA;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.05);
            overflow-x: hidden;
            padding-bottom: 100px; /* Space for nav */
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .nav-glow {
            box-shadow: 0 0 15px rgba(191, 128, 255, 0.4);
        }
    </style>
</head>
<body class="pb-28 bg-gray-100 flex justify-center items-start min-h-screen">

    <div class="mobile-wrapper" id="app-container">
        
        <!-- Top Header -->
        <header id="header" class="glass-header sticky top-0 z-50 px-6 py-4 flex justify-between items-center w-full">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-[10px] bg-primary flex items-center justify-center text-white font-bold text-sm shadow-[0_4px_12px_rgba(0,22,220,0.3)]">M</div>
                <span class="font-bold text-textMain text-lg tracking-tight">MMO</span>
            </div>
            <div class="flex items-center gap-4">
                <button class="relative w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-textMain hover:bg-gray-50 transition-colors">
                    <i class="fa-regular fa-bell text-[18px]"></i>
                    <span class="absolute top-2 right-2 w-2 h-2 bg-accent rounded-full border-2 border-white"></span>
                </button>
                <div class="w-10 h-10 rounded-full border-2 border-white shadow-sm overflow-hidden bg-gray-100">
                    <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-4.jpg" alt="Profile" class="w-full h-full object-cover">
                </div>
            </div>
        </header>

        <main class="px-5 py-6 flex flex-col gap-6" id="main-content">
            
            <!-- Time Range Selector -->
            <section id="time-selector" class="flex justify-center">
                <button class="bg-white px-5 py-2.5 rounded-full shadow-sm border border-border flex items-center gap-2 text-sm font-semibold text-textMain hover:bg-gray-50 transition-all">
                    <i class="fa-regular fa-calendar text-primary"></i>
                    Últimos 7 dias
                    <i class="fa-solid fa-chevron-down text-[10px] text-textMuted ml-1"></i>
                </button>
            </section>

            <!-- KPI Grid -->
            <section id="kpi-grid" class="grid grid-cols-2 gap-4">
                <!-- Card 1 -->
                <div class="bg-white rounded-[20px] p-4 shadow-ambient border border-white/50 relative overflow-hidden group">
                    <div class="absolute -right-4 -top-4 w-16 h-16 bg-primary/5 rounded-full blur-xl group-hover:bg-primary/10 transition-colors"></div>
                    <span class="text-[13px] font-medium text-textMuted block mb-1">Receita Bruta</span>
                    <div class="flex items-end gap-2 mb-2">
                        <span class="text-xl font-bold text-textMain tracking-tight">R$ 12.450</span>
                    </div>
                    <div class="inline-flex items-center gap-1 bg-success/10 text-success px-2 py-1 rounded-[6px] text-[11px] font-bold">
                        <i class="fa-solid fa-arrow-trend-up text-[10px]"></i>
                        +12%
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="bg-white rounded-[20px] p-4 shadow-ambient border border-white/50 relative overflow-hidden group">
                    <div class="absolute -right-4 -top-4 w-16 h-16 bg-accent/5 rounded-full blur-xl group-hover:bg-accent/10 transition-colors"></div>
                    <span class="text-[13px] font-medium text-textMuted block mb-1">Leads Gerados</span>
                    <div class="flex items-end gap-2 mb-2">
                        <span class="text-xl font-bold text-textMain tracking-tight">840</span>
                    </div>
                    <div class="inline-flex items-center gap-1 bg-gray-100 text-textMuted px-2 py-1 rounded-[6px] text-[11px] font-semibold">
                        Neste período
                    </div>
                </div>

                <!-- Card 3 -->
                <div class="bg-white rounded-[20px] p-4 shadow-ambient border border-white/50 relative overflow-hidden group">
                    <div class="absolute -right-4 -top-4 w-16 h-16 bg-blue-500/5 rounded-full blur-xl group-hover:bg-blue-500/10 transition-colors"></div>
                    <span class="text-[13px] font-medium text-textMuted block mb-1">Novos Mestres</span>
                    <div class="flex items-end gap-2 mb-2">
                        <span class="text-xl font-bold text-textMain tracking-tight">24</span>
                    </div>
                    <div class="inline-flex items-center gap-1 bg-primary/10 text-primary px-2 py-1 rounded-[6px] text-[11px] font-bold">
                        <i class="fa-solid fa-users text-[10px]"></i>
                        Ativos
                    </div>
                </div>

                <!-- Card 4 -->
                <div class="bg-white rounded-[20px] p-4 shadow-ambient border border-white/50 relative overflow-hidden group">
                    <div class="absolute -right-4 -top-4 w-16 h-16 bg-purple-500/5 rounded-full blur-xl group-hover:bg-purple-500/10 transition-colors"></div>
                    <span class="text-[13px] font-medium text-textMuted block mb-1">Taxa de Conversão</span>
                    <div class="flex items-end gap-2 mb-2">
                        <span class="text-xl font-bold text-textMain tracking-tight">18%</span>
                    </div>
                    <div class="w-full bg-gray-100 rounded-full h-1.5 mt-2 overflow-hidden">
                        <div class="bg-accent h-1.5 rounded-full" style="width: 18%"></div>
                    </div>
                </div>
            </section>

            <!-- Chart Section -->
            <section id="chart-section" class="bg-white rounded-[20px] p-5 shadow-ambient border border-white/50 w-full relative">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h3 class="text-[15px] font-bold text-textMain">Volume de Leads</h3>
                        <p class="text-[12px] text-textMuted">Visão geral da semana</p>
                    </div>
                    <button class="w-8 h-8 rounded-[10px] bg-gray-50 flex items-center justify-center text-textMuted hover:bg-gray-100">
                        <i class="fa-solid fa-ellipsis"></i>
                    </button>
                </div>
                
                <div id="leadsChart" class="w-full h-[200px] -ml-2"></div>
            </section>

            <!-- Top Categories -->
            <section id="categories-section" class="bg-white rounded-[20px] p-5 shadow-ambient border border-white/50">
                <div class="flex justify-between items-center mb-5">
                    <h3 class="text-[15px] font-bold text-textMain">Top Categorias</h3>
                    <a href="#" class="text-[12px] font-semibold text-primary">Ver todas</a>
                </div>

                <div class="flex flex-col gap-4">
                    <!-- Category 1 -->
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <div class="w-6 h-6 rounded-[6px] bg-blue-50 flex items-center justify-center text-blue-600">
                                    <i class="fa-solid fa-bolt text-[10px]"></i>
                                </div>
                                <span class="text-[13px] font-semibold text-textMain">Elétrica</span>
                            </div>
                            <span class="text-[13px] font-bold text-textMain">45%</span>
                        </div>
                        <div class="w-full bg-gray-100 rounded-full h-[6px] overflow-hidden">
                            <div class="bg-primary h-full rounded-full relative" style="width: 45%">
                                <div class="absolute inset-0 bg-white/20 w-full"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Category 2 -->
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <div class="w-6 h-6 rounded-[6px] bg-orange-50 flex items-center justify-center text-orange-500">
                                    <i class="fa-solid fa-paint-roller text-[10px]"></i>
                                </div>
                                <span class="text-[13px] font-semibold text-textMain">Pintura</span>
                            </div>
                            <span class="text-[13px] font-bold text-textMain">32%</span>
                        </div>
                        <div class="w-full bg-gray-100 rounded-full h-[6px] overflow-hidden">
                            <div class="bg-accent h-full rounded-full" style="width: 32%"></div>
                        </div>
                    </div>

                    <!-- Category 3 -->
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <div class="w-6 h-6 rounded-[6px] bg-teal-50 flex items-center justify-center text-teal-500">
                                    <i class="fa-solid fa-faucet-drip text-[10px]"></i>
                                </div>
                                <span class="text-[13px] font-semibold text-textMain">Hidráulica</span>
                            </div>
                            <span class="text-[13px] font-bold text-textMain">23%</span>
                        </div>
                        <div class="w-full bg-gray-100 rounded-full h-[6px] overflow-hidden">
                            <div class="bg-[#1A1A24] h-full rounded-full" style="width: 23%"></div>
                        </div>
                    </div>
                </div>
            </section>

        </main>

    <script src="../../_mobile-nav.js"></script>
</body>
</html>
