<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Confirmação de ativação - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#0016dc',
                            navy: '#1A1A24',
                            bg: '#F8F9FA',
                            card: '#FFFFFF',
                            particle1: 'rgba(0, 22, 220, 0.1)',
                            particle2: 'rgba(0, 22, 220, 0.15)',
                            particle3: 'rgba(0, 22, 220, 0.05)',
                        }
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.06)',
                        'badge': '0 8px 20px -6px rgba(0, 22, 220, 0.15)',
                        'card': '0 12px 32px -8px rgba(0,0,0,0.04)',
                        'button': '0 16px 32px -8px rgba(0, 22, 220, 0.3)'
                    },
                    animation: {
                        'float-1': 'float 6s ease-in-out infinite',
                        'float-2': 'float 8s ease-in-out infinite reverse',
                        'float-3': 'float 7s ease-in-out infinite 1s',
                        'pulse-glow': 'pulseGlow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards'
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(10deg)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: '0.4', transform: 'scale(1)' },
                            '50%': { opacity: '0.8', transform: 'scale(1.1)' },
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F8F9FA;
            color: #1A1A24;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        ::-webkit-scrollbar { display: none; }
        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .bottom-blur {
            background: linear-gradient(180deg, rgba(248,249,250,0) 0%, rgba(248,249,250,0.9) 30%, rgba(248,249,250,1) 100%);
        }
    </style>
</head>
<body class="pb-28 bg-brand-bg text-brand-navy min-h-[100dvh] flex flex-col relative overflow-x-hidden">

    <!-- Header Glassmorphism -->
    <header id="header" class="fixed top-0 left-0 right-0 z-50 glass-header px-6 py-4 flex justify-end items-center">
        <button class="w-10 h-10 rounded-full flex items-center justify-center bg-white shadow-sm border border-gray-100 hover:bg-gray-50 transition-colors">
            <i class="fa-solid fa-xmark text-brand-blue text-lg"></i>
        </button>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col items-center justify-center px-6 pt-24 pb-36 relative z-10 w-full max-w-md mx-auto">
        
        <!-- Particle Effects (Absolute positioned behind text) -->
        <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none flex items-center justify-center">
            <div class="absolute w-12 h-12 rounded-full bg-brand-particle1 blur-xl top-[30%] left-[20%] animate-float-1"></div>
            <div class="absolute w-16 h-16 rounded-full bg-brand-particle2 blur-2xl top-[45%] right-[15%] animate-float-2"></div>
            <div class="absolute w-8 h-8 rounded-full bg-brand-particle1 blur-lg bottom-[40%] left-[30%] animate-float-3"></div>
            <div class="absolute w-20 h-20 rounded-full bg-brand-particle3 blur-3xl top-[20%] right-[30%] animate-pulse-glow"></div>
            
            <!-- Crisp Confetti Particles -->
            <div class="absolute w-2 h-2 rounded-full bg-brand-blue opacity-20 top-[35%] left-[25%] animate-float-2"></div>
            <div class="absolute w-3 h-3 rounded-full bg-blue-300 opacity-40 top-[40%] right-[25%] animate-float-1"></div>
            <div class="absolute w-2 h-2 rounded-full bg-brand-blue opacity-30 bottom-[45%] left-[35%] animate-float-3"></div>
            <div class="absolute w-1.5 h-1.5 rounded-full bg-blue-400 opacity-50 top-[28%] right-[40%] animate-float-2"></div>
        </div>

        <!-- Success Header Section -->
        <section id="success-header" class="relative z-10 flex flex-col items-center text-center w-full animate-fade-in-up">
            <h1 class="text-[32px] font-extrabold leading-[1.2] text-brand-navy mb-5 tracking-tight px-2">
                Você agora é<br>um Mestre!
            </h1>
            
            <!-- Verified Badge -->
            <div class="inline-flex items-center gap-2 bg-white px-4 py-2.5 rounded-full shadow-badge border border-white/50 mb-8 transform transition-transform hover:scale-105">
                <div class="w-5 h-5 rounded-full bg-brand-blue/10 flex items-center justify-center">
                    <i class="fa-solid fa-check text-[10px] text-brand-blue"></i>
                </div>
                <span class="text-[14px] font-semibold text-brand-blue tracking-wide">Perfil Verificado</span>
            </div>

            <p class="text-[18px] text-brand-navy/70 leading-relaxed font-medium mb-10 px-4 max-w-[320px]">
                Parabéns, Arthur! Seu perfil profissional foi ativado com sucesso. Agora você faz parte do ecossistema de elite da MMO.
            </p>
        </section>

        <!-- Next Steps Card -->
        <section id="next-steps" class="w-full relative z-10 animate-fade-in-up" style="animation-delay: 0.1s;">
            <div class="bg-white rounded-[24px] p-7 shadow-card border border-gray-50/50 w-full relative overflow-hidden">
                <!-- Decorative subtle gradient in card -->
                <div class="absolute top-0 right-0 w-32 h-32 bg-brand-blue/[0.02] rounded-full blur-2xl -mr-10 -mt-10 pointer-events-none"></div>
                
                <h3 class="text-[16px] font-bold text-brand-navy mb-5 flex items-center gap-2">
                    <i class="fa-solid fa-list-check text-brand-blue opacity-80"></i>
                    O que fazer agora?
                </h3>
                
                <ul class="space-y-4">
                    <li class="flex items-start gap-4 p-3 rounded-2xl hover:bg-gray-50/80 transition-colors">
                        <div class="w-6 h-6 rounded-full bg-brand-blue/10 flex items-center justify-center shrink-0 mt-0.5">
                            <i class="fa-solid fa-check text-[12px] text-brand-blue"></i>
                        </div>
                        <span class="text-[15px] font-medium text-brand-navy/80 leading-snug">Receber notificações de pedidos</span>
                    </li>
                    <li class="flex items-start gap-4 p-3 rounded-2xl hover:bg-gray-50/80 transition-colors">
                        <div class="w-6 h-6 rounded-full bg-brand-blue/10 flex items-center justify-center shrink-0 mt-0.5">
                            <i class="fa-solid fa-check text-[12px] text-brand-blue"></i>
                        </div>
                        <span class="text-[15px] font-medium text-brand-navy/80 leading-snug">Gerenciar seu Balcão</span>
                    </li>
                    <li class="flex items-start gap-4 p-3 rounded-2xl hover:bg-gray-50/80 transition-colors">
                        <div class="w-6 h-6 rounded-full bg-brand-blue/10 flex items-center justify-center shrink-0 mt-0.5">
                            <i class="fa-solid fa-check text-[12px] text-brand-blue"></i>
                        </div>
                        <span class="text-[15px] font-medium text-brand-navy/80 leading-snug">Personalizar seu perfil</span>
                    </li>
                </ul>
            </div>
        </section>

    </main>

    <!-- Fixed Bottom Action -->
    <section id="fixed-action" class="fixed bottom-0 left-0 right-0 z-40 pb-8 pt-12 px-6 bottom-blur flex justify-center">
        <div class="w-full max-w-md mx-auto animate-fade-in-up" style="animation-delay: 0.2s;">
            <button class="w-full bg-brand-blue text-white h-[64px] rounded-full text-[17px] font-bold shadow-button flex items-center justify-center gap-3 hover:bg-blue-700 active:scale-[0.98] transition-all relative overflow-hidden group">
                <span class="relative z-10 flex items-center gap-3">
                    Acessar meu Painel
                    <i class="fa-solid fa-arrow-right text-sm group-hover:translate-x-1 transition-transform"></i>
                </span>
                <!-- Button hover effect -->
                <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out rounded-full"></div>
            </button>
        </div>
    </section>

    <script src="../../_mobile-nav.js"></script>
</body>
</html>
