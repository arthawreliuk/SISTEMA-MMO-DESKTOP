<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0016dc',
                        surface: '#F8F9FA',
                        text: {
                            main: '#1A1A24',
                            muted: '#6B7280'
                        },
                        success: {
                            light: '#E6F4EA',
                            DEFAULT: '#16A34A'
                        }
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0, 22, 220, 0.08)',
                        'glow': '0 0 40px rgba(22, 163, 74, 0.2)',
                        'card': '0 4px 20px rgba(0, 0, 0, 0.03)'
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased text-text-main flex items-center justify-center min-h-[100dvh]">

    <!-- Mobile Container Wrapper -->
    <main id="mobile-container" class="w-full max-w-[375px] min-h-[840px] bg-surface relative flex flex-col mx-auto overflow-hidden shadow-2xl sm:rounded-[40px] sm:my-8 sm:border-[8px] sm:border-white">
        
        <!-- Content Area -->
        <div class="flex-1 flex flex-col px-6 pt-16 pb-8 z-10 relative">
            
            <!-- Hero Success Graphic -->
            <section id="success_hero" class="flex flex-col items-center text-center mt-6 mb-10 animate-[fadeIn_0.5s_ease-out]">
                <div class="relative mb-8">
                    <!-- Outer Glow -->
                    <div class="absolute inset-0 bg-success rounded-full blur-2xl opacity-20 scale-150"></div>
                    <!-- Icon Container -->
                    <div class="relative w-24 h-24 bg-success-light rounded-full flex items-center justify-center shadow-glow border-4 border-white">
                        <i class="fa-solid fa-check text-4xl text-success"></i>
                    </div>
                </div>
                
                <h1 class="text-[28px] font-bold leading-tight mb-3 tracking-tight text-text-main">
                    Pagamento<br>Confirmado!
                </h1>
                <p class="text-text-muted text-[15px] leading-relaxed max-w-[280px]">
                    O Mestre já foi notificado do seu pagamento.
                </p>
            </section>

            <!-- Payment Receipt Card -->
            <section id="payment_receipt_card" class="bg-white rounded-[24px] p-6 shadow-card border border-gray-100 mb-8 relative z-20">
                
                <!-- Professional Info -->
                <div class="flex items-center gap-4 pb-6 border-b border-gray-100/80">
                    <div class="w-12 h-12 rounded-full overflow-hidden bg-gray-100 flex-shrink-0 border-2 border-white shadow-sm">
                        <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-4.jpg" alt="Mestre Elétrica" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <p class="text-[13px] text-text-muted font-medium mb-0.5">Pago para:</p>
                        <p class="text-[16px] font-bold text-text-main">Mestre Elétrica</p>
                    </div>
                </div>

                <!-- Total Paid -->
                <div class="py-6 border-b border-gray-100/80 text-center">
                    <p class="text-[14px] text-text-muted font-medium mb-1">Valor Total</p>
                    <p class="text-[36px] font-extrabold text-primary tracking-tight">R$ 450,00</p>
                </div>

                <!-- Transaction Details -->
                <div id="transaction_details" class="pt-6 space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-[14px] text-text-muted">Data</span>
                        <span class="text-[14px] font-semibold text-text-main">29 Abr 2026</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-[14px] text-text-muted">Método</span>
                        <div class="flex items-center gap-2">
                            <i class="fa-brands fa-pix text-teal-500 text-sm"></i>
                            <span class="text-[14px] font-semibold text-text-main">PIX</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-[14px] text-text-muted">Transação</span>
                        <span class="text-[14px] font-semibold text-text-main font-mono">#MMO-8842</span>
                    </div>
                </div>
            </section>

            <!-- Spacer to push actions to bottom -->
            <div class="flex-1"></div>

            <!-- Primary Actions -->
            <section id="action_buttons" class="mt-auto space-y-3 pt-4">
                <button class="w-full bg-primary hover:bg-[#0012b3] text-white h-[56px] rounded-full font-semibold text-[16px] flex items-center justify-center gap-3 transition-all active:scale-[0.98] shadow-soft">
                    <i class="fa-brands fa-whatsapp text-xl"></i>
                    Voltar para o WhatsApp
                </button>
                
                <button class="w-full bg-transparent text-primary h-[56px] rounded-full font-semibold text-[15px] flex items-center justify-center gap-2 transition-all hover:bg-primary/5 active:bg-primary/10">
                    <i class="fa-solid fa-download text-sm"></i>
                    Baixar Comprovante (PDF)
                </button>
            </section>

        </div>
        
        <!-- Decorative Background Elements -->
        <div class="absolute top-0 left-0 w-full h-[300px] bg-gradient-to-b from-success-light/30 to-transparent pointer-events-none"></div>
    </main>

</body>
</html>
