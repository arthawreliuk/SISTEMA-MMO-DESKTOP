<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Balcão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0016dc',
                        background: '#F8F9FA',
                        text: {
                            main: '#1A1A24',
                            muted: '#6B7280',
                        },
                        surface: '#FFFFFF',
                        border: '#E5E7EB',
                        highlight: 'rgba(0, 22, 220, 0.05)'
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'nav': '0 -4px 24px -4px rgba(0, 0, 0, 0.08)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; color: #1A1A24; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Smooth scrolling */
        html { scroll-behavior: smooth; }
        
        /* Custom Toggle Switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #0016dc;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #0016dc;
        }
        
        /* Glassmorphism */
        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="font-sans antialiased text-main bg-background flex justify-center w-full min-h-screen">

    <!-- Mobile Container (Max 430px for standard mobile feel, centered on desktop) -->
    <div class="w-full max-w-[430px] min-h-screen bg-background relative shadow-2xl overflow-x-hidden flex flex-col">

        <!-- 1. Top Header -->
        <header id="header" class="fixed top-0 w-full max-w-[430px] z-50 glass-header border-b border-border/50 px-6 py-4 flex items-center justify-between">
            <button class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm border border-gray-100 text-primary transition-transform active:scale-95">
                <i class="fa-solid fa-arrow-left text-lg"></i>
            </button>
            <h1 class="text-lg font-bold text-main tracking-tight">Novo Balcão</h1>
            <div class="w-10 h-10"></div> <!-- Spacer for centering -->
        </header>

        <!-- Main Scrollable Content -->
        <main class="flex-1 pt-24 pb-32 px-5 flex flex-col gap-6">

            <!-- 2. Hero Section -->
            <section id="hero-section" class="px-1">
                <p class="text-[16px] leading-relaxed text-text-muted font-medium">
                    Arthur, descreva o que você precisa em Camboriú. Os melhores Mestres virão até você.
                </p>
            </section>

            <!-- 3. Form Section 1 (O Básico) -->
            <section id="form-section-1" class="bg-surface rounded-[24px] p-5 shadow-soft border border-gray-50 flex flex-col gap-5">
                <div class="flex items-center gap-2 mb-1">
                    <div class="w-1.5 h-5 bg-primary rounded-full"></div>
                    <h2 class="text-[18px] font-bold text-main">O Básico</h2>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-[13px] font-semibold text-text-muted ml-1">Título do Serviço</label>
                    <input type="text" placeholder="Ex: Troca de fiação completa" 
                           class="w-full bg-gray-50/50 border border-border rounded-full px-5 py-4 text-[15px] font-medium text-main placeholder-gray-400 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all">
                </div>

                <div class="flex flex-col gap-3 mt-2">
                    <label class="text-[13px] font-semibold text-text-muted ml-1">Categoria principal</label>
                    
                    <!-- Horizontal Scroll Tags -->
                    <div class="flex overflow-x-auto hide-scrollbar gap-2.5 pb-1 -mx-1 px-1">
                        <button class="whitespace-nowrap px-5 py-2.5 rounded-full border border-primary bg-primary text-white text-[14px] font-semibold shadow-sm transition-all">
                            Elétrica
                        </button>
                        <button class="whitespace-nowrap px-5 py-2.5 rounded-full border border-border bg-white text-text-muted text-[14px] font-medium hover:border-gray-300 transition-all">
                            Hidráulica
                        </button>
                        <button class="whitespace-nowrap px-5 py-2.5 rounded-full border border-border bg-white text-text-muted text-[14px] font-medium hover:border-gray-300 transition-all">
                            Pintura
                        </button>
                        <button class="whitespace-nowrap px-5 py-2.5 rounded-full border border-border bg-white text-text-muted text-[14px] font-medium hover:border-gray-300 transition-all">
                            Montagem
                        </button>
                    </div>
                </div>
            </section>

            <!-- 4. Form Section 2 (Detalhes & Mídia) -->
            <section id="form-section-2" class="bg-surface rounded-[24px] p-5 shadow-soft border border-gray-50 flex flex-col gap-5">
                <div class="flex items-center gap-2 mb-1">
                    <div class="w-1.5 h-5 bg-primary rounded-full"></div>
                    <h2 class="text-[18px] font-bold text-main">Detalhes & Mídia</h2>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-[13px] font-semibold text-text-muted ml-1">Descrição detalhada do problema</label>
                    <textarea placeholder="Descreva com detalhes o que precisa ser feito..." rows="4"
                              class="w-full bg-gray-50/50 border border-border rounded-[20px] px-5 py-4 text-[15px] font-medium text-main placeholder-gray-400 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all resize-none"></textarea>
                </div>

                <!-- Drag & Drop Zone -->
                <div class="mt-2 w-full border-2 border-dashed border-primary/40 bg-highlight rounded-[20px] p-6 flex flex-col items-center justify-center gap-3 cursor-pointer hover:bg-primary/5 transition-colors">
                    <div class="w-12 h-12 rounded-full bg-white shadow-sm flex items-center justify-center text-primary mb-1">
                        <i class="fa-solid fa-cloud-arrow-up text-xl"></i>
                    </div>
                    <span class="text-[14px] font-semibold text-primary text-center">
                        + Adicionar Fotos ou Vídeos do local
                    </span>
                    <span class="text-[12px] text-text-muted text-center">
                        Arraste ou clique para fazer upload
                    </span>
                </div>
            </section>

            <!-- 5. Form Section 3 (Urgência) -->
            <section id="form-section-3" class="bg-surface rounded-[24px] p-5 shadow-soft border border-gray-50">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-[#FFF0ED] flex items-center justify-center text-[#FF6D3F]">
                            <i class="fa-solid fa-bolt"></i>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[15px] font-bold text-main">Tenho urgência</span>
                            <span class="text-[12px] font-medium text-text-muted">Atendimento em até 24h</span>
                        </div>
                    </div>
                    
                    <!-- Toggle Switch -->
                    <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle" id="urgency-toggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300 z-10 top-0.5 left-0.5 checked:border-primary checked:translate-x-5"/>
                        <label for="urgency-toggle" class="toggle-label block overflow-hidden h-7 rounded-full bg-gray-200 cursor-pointer transition-colors duration-300"></label>
                    </div>
                </div>
            </section>

        </main>

        <!-- Fixed Bottom Area -->
        <div class="fixed bottom-0 w-full max-w-[430px] z-50 pointer-events-none flex flex-col pb-6 px-5 gap-4">
            
            <!-- 6. Primary Action Button -->
            <button class="w-full bg-primary hover:bg-primary/90 text-white rounded-full py-4 px-6 font-bold text-[16px] shadow-[0_8px_20px_rgba(0,22,220,0.3)] transition-all active:scale-[0.98] pointer-events-auto flex items-center justify-center gap-2">
                Avançar para Exposição <i class="fa-solid fa-arrow-right ml-1"></i>
            </button>

            <!-- 7. Floating Pill Navigation -->
            <nav id="bottom-nav" class="bg-white rounded-full shadow-nav border border-gray-100 py-3 px-6 pointer-events-auto flex items-center justify-between">
                
                <!-- Active Item -->
                <a href="#" class="flex flex-col items-center gap-1 min-w-[50px]">
                    <i class="fa-solid fa-house text-primary text-[20px]"></i>
                    <div class="w-1.5 h-1.5 rounded-full bg-primary mt-0.5"></div>
                </a>

                <!-- Inactive Items -->
                <a href="#" class="flex flex-col items-center gap-1 min-w-[50px] text-gray-400 hover:text-gray-600 transition-colors">
                    <i class="fa-solid fa-clipboard-list text-[20px]"></i>
                    <div class="w-1.5 h-1.5 rounded-full bg-transparent mt-0.5"></div>
                </a>

                <a href="#" class="flex flex-col items-center gap-1 min-w-[50px] text-gray-400 hover:text-gray-600 transition-colors relative">
                    <i class="fa-regular fa-message text-[20px]"></i>
                    <div class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-[#FF6D3F] rounded-full border-2 border-white"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-transparent mt-0.5"></div>
                </a>

                <a href="#" class="flex flex-col items-center gap-1 min-w-[50px] text-gray-400 hover:text-gray-600 transition-colors">
                    <i class="fa-regular fa-user text-[20px]"></i>
                    <div class="w-1.5 h-1.5 rounded-full bg-transparent mt-0.5"></div>
                </a>

            </nav>
        </div>

    </div>

</body>
</html>
