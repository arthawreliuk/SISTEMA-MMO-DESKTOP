<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de estado vazio _ sem resultados - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        background: '#F8F9FA',
                        primary: '#0016dc',
                        navy: '#1A1A24',
                        muted: '#6C757D'
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
                        'nav': '0 20px 40px -10px rgba(0, 22, 220, 0.15)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { display: none; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="text-navy min-h-[100dvh] flex flex-col items-center justify-center relative overflow-hidden">

    <!-- Mobile Container (375x840 constraint applied visually) -->
    <div id="mobile-app-wrapper" class="w-full max-w-[375px] h-[840px] mx-auto bg-background relative flex flex-col sm:shadow-2xl sm:rounded-[40px] overflow-hidden">
        
        <!-- Background Decorative Elements -->
        <div class="absolute top-[-10%] left-[-20%] w-[300px] h-[300px] bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute bottom-[20%] right-[-20%] w-[250px] h-[250px] bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>

        <!-- 1. Top Header & Search -->
        <header id="header-search" class="w-full px-5 pt-12 pb-4 z-10 relative">
            <div class="glass-panel w-full rounded-full flex items-center px-4 py-3 shadow-glass">
                <button class="text-muted hover:text-navy transition-colors mr-3">
                    <i class="fa-solid fa-chevron-left text-sm"></i>
                </button>
                <div class="flex-1 flex items-center bg-gray-50 rounded-full px-3 py-2 border border-gray-100">
                    <i class="fa-solid fa-magnifying-glass text-muted text-xs mr-2"></i>
                    <input type="text" value="Físico Quântico em Camboriú" class="bg-transparent w-full outline-none text-sm font-medium text-navy/70" readonly>
                    <button class="text-muted hover:text-navy ml-2">
                        <i class="fa-solid fa-xmark text-xs"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- 2. Centered Empty State (The Core) -->
        <main id="empty-state-core" class="flex-1 flex flex-col items-center justify-center px-6 z-10 -mt-10">
            <!-- Illustration Area -->
            <div class="relative w-48 h-48 mb-8 flex items-center justify-center">
                <!-- Abstract glowing accent -->
                <div class="absolute inset-0 bg-primary/10 rounded-full blur-2xl animate-pulse"></div>
                <!-- 3D/Line Art Icon Placeholder -->
                <div class="relative z-10 w-32 h-32 bg-white rounded-full shadow-glass flex items-center justify-center border border-gray-100">
                    <div class="absolute -right-2 -top-2 w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-question text-primary text-sm"></i>
                    </div>
                    <i class="fa-solid fa-magnifying-glass text-5xl text-primary opacity-80"></i>
                    <i class="fa-solid fa-box-open absolute bottom-4 right-4 text-2xl text-muted opacity-50"></i>
                </div>
            </div>

            <!-- Text Content -->
            <div class="text-center max-w-[280px]">
                <h1 class="text-[24px] font-bold text-navy mb-3 leading-tight tracking-tight">
                    Poxa, nenhum Mestre encontrado
                </h1>
                <p class="text-[16px] text-muted leading-relaxed font-medium">
                    Não encontramos profissionais com esses filtros exatos na região. Que tal ampliar a busca?
                </p>
            </div>
        </main>

        <!-- 3. Recovery Action Buttons -->
        <section id="recovery-actions" class="w-full px-6 pb-28 z-10">
            <div class="flex flex-col gap-3">
                <button class="w-full bg-primary text-white font-semibold text-[16px] py-4 rounded-full shadow-[0_8px_20px_rgba(0,22,220,0.25)] hover:bg-[#0012b3] transition-all active:scale-[0.98]">
                    Limpar Filtros
                </button>
                <button class="w-full bg-transparent text-primary font-semibold text-[16px] py-4 rounded-full border-2 border-primary/20 hover:border-primary/50 hover:bg-primary/5 transition-all active:scale-[0.98]">
                    Explorar Categorias
                </button>
            </div>
        </section>

    <script src="../../_mobile-nav.js"></script>
</body>
</html>
