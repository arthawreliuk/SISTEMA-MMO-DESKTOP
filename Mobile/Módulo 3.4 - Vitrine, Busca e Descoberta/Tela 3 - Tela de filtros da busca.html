<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Search Filters</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        navy: '#1A1A24',
                        trustBlue: '#0016dc',
                        lightGrey: '#F3F4F6',
                        borderGrey: '#E5E7EB',
                        textMuted: '#6B7280'
                    },
                    boxShadow: {
                        'soft-up': '0 -4px 20px rgba(0, 0, 0, 0.05)',
                        'floating': '0 8px 30px rgba(0, 0, 0, 0.12)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; }
        
        /* Custom Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #0016dc;
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 4px 10px rgba(0, 22, 220, 0.3);
            border: 4px solid #fff;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #E5E7EB;
            border-radius: 9999px;
        }
        
        /* Toggle Switch Styling */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #0016dc;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #0016dc;
        }
        
        /* Hide Scrollbar */
        ::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased overflow-hidden w-full h-full min-h-[100dvh] flex justify-center bg-black">

    <!-- Mock Background (Underlying App) -->
    <div id="mock-background" class="absolute inset-0 w-full h-full z-0 max-w-[430px] mx-auto bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1581578731548-c64695cc6952?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80')">
        <!-- Frosted Glass Overlay -->
        <div class="absolute inset-0 bg-black/40 backdrop-blur-md"></div>
    </div>

    <!-- Main Mobile Container -->
    <main id="app-container" class="relative w-full max-w-[430px] h-[100dvh] mx-auto flex flex-col justify-end z-10 pointer-events-none">
        
        <!-- Bottom Sheet Modal -->
        <div id="bottom-sheet" class="bg-white w-full h-[85%] rounded-t-[32px] flex flex-col relative pointer-events-auto shadow-floating">
            
            <!-- Drag Handle -->
            <div id="drag-handle-container" class="w-full flex justify-center pt-3 pb-2 absolute top-0 left-0 z-20">
                <div class="w-12 h-1.5 bg-gray-300 rounded-full"></div>
            </div>

            <!-- Header -->
            <header id="modal-header" class="flex items-center justify-between px-6 pt-8 pb-4 border-b border-borderGrey shrink-0 mt-2">
                <div class="w-16"></div> <!-- Spacer for centering -->
                <h1 class="text-navy font-bold text-[20px] tracking-tight">Refinar Busca</h1>
                <button class="w-16 text-right text-trustBlue font-semibold text-[15px] hover:opacity-80 transition-opacity">Limpar</button>
            </header>

            <!-- Scrollable Content -->
            <div id="scrollable-content" class="flex-1 overflow-y-auto no-scrollbar pb-[100px] px-6 pt-6 space-y-8">
                
                <!-- Filter 1: Especialidades -->
                <section id="filter-categories">
                    <h2 class="text-navy font-bold text-[17px] mb-4">Categorias</h2>
                    <div class="flex flex-wrap gap-2.5">
                        <!-- Selected Pill -->
                        <button class="px-5 py-2.5 bg-trustBlue text-white rounded-full font-semibold text-[14px] transition-all shadow-[0_4px_12px_rgba(0,22,220,0.25)]">
                            Eletricista
                        </button>
                        <!-- Unselected Pills -->
                        <button class="px-5 py-2.5 bg-white border border-borderGrey text-textMuted rounded-full font-medium text-[14px] hover:border-gray-300 transition-all">
                            Pintura
                        </button>
                        <button class="px-5 py-2.5 bg-white border border-borderGrey text-textMuted rounded-full font-medium text-[14px] hover:border-gray-300 transition-all">
                            Hidráulica
                        </button>
                        <button class="px-5 py-2.5 bg-white border border-borderGrey text-textMuted rounded-full font-medium text-[14px] hover:border-gray-300 transition-all">
                            Reformas
                        </button>
                        <button class="px-5 py-2.5 bg-white border border-borderGrey text-textMuted rounded-full font-medium text-[14px] hover:border-gray-300 transition-all">
                            Marcenaria
                        </button>
                        <button class="px-5 py-2.5 bg-white border border-borderGrey text-textMuted rounded-full font-medium text-[14px] hover:border-gray-300 transition-all">
                            Limpeza
                        </button>
                    </div>
                </section>

                <!-- Filter 2: Distância -->
                <section id="filter-distance" class="pt-2">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-navy font-bold text-[17px]">Raio de Busca <span class="text-textMuted font-normal text-[14px] ml-1">(Camboriú)</span></h2>
                    </div>
                    
                    <div class="relative w-full px-2">
                        <!-- Tooltip -->
                        <div class="absolute -top-8 left-[40%] -translate-x-1/2 bg-navy text-white text-[12px] font-bold py-1 px-3 rounded-[8px] shadow-lg whitespace-nowrap">
                            Até 15 km
                            <!-- Tooltip Arrow -->
                            <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-2 h-2 bg-navy rotate-45"></div>
                        </div>
                        
                        <!-- Slider Track Fill (Visual only) -->
                        <div class="absolute top-1/2 left-2 right-2 -translate-y-1/2 h-1.5 bg-lightGrey rounded-full overflow-hidden pointer-events-none">
                            <div class="h-full bg-trustBlue w-[40%]"></div>
                        </div>
                        
                        <!-- Actual Input -->
                        <input type="range" min="1" max="50" value="15" class="w-full relative z-10" id="distance-slider">
                        
                        <!-- Labels -->
                        <div class="flex justify-between mt-3 text-[13px] text-textMuted font-medium px-1">
                            <span>1 km</span>
                            <span>50 km</span>
                        </div>
                    </div>
                </section>

                <!-- Filter 3: Comodidades -->
                <section id="filter-amenities" class="pt-2">
                    <h2 class="text-navy font-bold text-[17px] mb-5">Comodidades</h2>
                    
                    <div class="space-y-5">
                        <!-- Toggle 1 -->
                        <div class="flex items-center justify-between">
                            <span class="text-navy font-medium text-[15px]">Aceita Cartão de Crédito</span>
                            <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                                <input type="checkbox" name="toggle1" id="toggle1" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 transition-all duration-300 right-0 border-trustBlue" checked/>
                                <label for="toggle1" class="toggle-label block overflow-hidden h-6 rounded-full bg-trustBlue cursor-pointer transition-colors duration-300"></label>
                            </div>
                        </div>
                        
                        <!-- Toggle 2 -->
                        <div class="flex items-center justify-between">
                            <span class="text-navy font-medium text-[15px]">Orçamento/Visita Grátis</span>
                            <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                                <input type="checkbox" name="toggle2" id="toggle2" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 transition-all duration-300 right-6 border-borderGrey"/>
                                <label for="toggle2" class="toggle-label block overflow-hidden h-6 rounded-full bg-borderGrey cursor-pointer transition-colors duration-300"></label>
                            </div>
                        </div>

                        <!-- Toggle 3 -->
                        <div class="flex items-center justify-between">
                            <span class="text-navy font-medium text-[15px]">Atendimento 24h</span>
                            <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                                <input type="checkbox" name="toggle3" id="toggle3" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 transition-all duration-300 right-6 border-borderGrey"/>
                                <label for="toggle3" class="toggle-label block overflow-hidden h-6 rounded-full bg-borderGrey cursor-pointer transition-colors duration-300"></label>
                            </div>
                        </div>
                    </div>
                </section>
                
            </div>

            <!-- Sticky Footer Action -->
            <div id="sticky-footer" class="absolute bottom-0 left-0 w-full bg-white px-6 py-5 shadow-soft-up z-30 rounded-t-[24px]">
                <button class="w-full bg-trustBlue hover:bg-blue-800 text-white font-bold text-[16px] py-4 rounded-full shadow-[0_8px_20px_rgba(0,22,220,0.3)] transition-all active:scale-[0.98]">
                    Mostrar 24 Resultados
                </button>
            </div>

        </div>
    </main>

    <script>
        // Simple slider interaction logic for visual fidelity
        const slider = document.getElementById('distance-slider');
        const tooltip = document.querySelector('#filter-distance .absolute.-top-8');
        const fill = document.querySelector('#filter-distance .bg-trustBlue.h-full');
        
        slider.addEventListener('input', function() {
            const val = this.value;
            const min = this.min;
            const max = this.max;
            const percentage = ((val - min) / (max - min)) * 100;
            
            // Update visual fill
            fill.style.width = percentage + '%';
            
            // Update tooltip text and position
            tooltip.innerHTML = `Até ${val} km <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-2 h-2 bg-navy rotate-45"></div>`;
            
            // Adjust tooltip position slightly to follow thumb
            const thumbOffset = 12; // half thumb width
            const newLeft = `calc(${percentage}% + (${8 - percentage * 0.16}px))`;
            tooltip.style.left = newLeft;
        });

        // Toggle logic for visual representation
        const toggles = document.querySelectorAll('.toggle-checkbox');
        toggles.forEach(toggle => {
            toggle.addEventListener('change', function() {
                if(this.checked) {
                    this.classList.replace('right-6', 'right-0');
                    this.classList.replace('border-borderGrey', 'border-trustBlue');
                    this.nextElementSibling.classList.replace('bg-borderGrey', 'bg-trustBlue');
                } else {
                    this.classList.replace('right-0', 'right-6');
                    this.classList.replace('border-trustBlue', 'border-borderGrey');
                    this.nextElementSibling.classList.replace('bg-trustBlue', 'bg-borderGrey');
                }
            });
        });
    </script>
</body>
</html>
