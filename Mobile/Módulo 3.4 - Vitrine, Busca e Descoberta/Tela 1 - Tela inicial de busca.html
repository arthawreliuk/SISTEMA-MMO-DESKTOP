<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tela inicial de busca - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0016dc',
                        surface: '#F8F9FA',
                        navy: '#1A1A24',
                        'soft-gray': '#8A8A93',
                        'glass-white': 'rgba(255, 255, 255, 0.85)',
                    },
                    boxShadow: {
                        'soft': '0 8px 32px rgba(0, 0, 0, 0.04)',
                        'float': '0 20px 40px rgba(0, 22, 220, 0.12)',
                        'glass': '0 4px 24px rgba(0, 0, 0, 0.03)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F8F9FA;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
        }
        
        /* Hide scrollbar for clean horizontal scrolling */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="text-navy font-sans antialiased min-h-[100dvh] relative pb-28">

    <!-- Mobile Container (Max width constraint for desktop viewing) -->
    <main id="app-container" class="w-full max-w-[430px] mx-auto bg-surface min-h-[100dvh] relative shadow-2xl sm:shadow-none overflow-x-hidden">
        
        <!-- 1. Top Header (Glassmorphism) -->
        <header id="top-header" class="fixed top-0 w-full max-w-[430px] z-40 glass-panel px-5 py-4 flex justify-between items-center border-b border-white/20">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white font-bold text-lg">
                    M
                </div>
                <span class="font-bold text-lg tracking-tight text-navy">MMO</span>
            </div>
            
            <button class="flex items-center gap-1.5 bg-white/60 hover:bg-white px-3 py-1.5 rounded-full shadow-sm transition-all border border-gray-100">
                <i class="fa-solid fa-location-dot text-primary text-sm"></i>
                <span class="text-sm font-semibold text-primary">Camboriú, SC</span>
                <i class="fa-solid fa-chevron-down text-primary text-[10px] ml-0.5"></i>
            </button>
        </header>

        <!-- Main Scrollable Content -->
        <div class="pt-24 px-5 space-y-8">

            <!-- 2. Hero Search Section -->
            <section id="hero-search" class="space-y-6 mt-2">
                <h1 class="text-[28px] leading-[1.2] font-bold text-navy tracking-tight max-w-[280px]">
                    Olá, Arthur.<br>
                    <span class="text-navy/80">O que vamos resolver hoje?</span>
                </h1>

                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                        <i class="fa-solid fa-magnifying-glass text-primary text-lg"></i>
                    </div>
                    <input type="text" 
                        class="w-full bg-white h-16 pl-12 pr-5 rounded-full shadow-soft border border-white focus:border-primary/20 focus:outline-none focus:ring-4 focus:ring-primary/5 transition-all text-base placeholder:text-soft-gray font-medium"
                        placeholder="Busque por eletricista, encanador...">
                    <button class="absolute inset-y-2 right-2 bg-primary text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md hover:bg-primary/90 transition-colors">
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </section>

            <!-- 3. Smart Categories Grid -->
            <section id="categories" class="pt-2">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-navy">Categorias</h2>
                </div>
                <div class="grid grid-cols-4 gap-y-6 gap-x-3">
                    <!-- Item 1 -->
                    <button class="flex flex-col items-center gap-2 group">
                        <div class="w-[60px] h-[60px] rounded-full bg-white shadow-glass flex items-center justify-center border border-gray-50 group-hover:border-primary/20 group-hover:shadow-md transition-all">
                            <i class="fa-solid fa-bolt text-primary text-xl group-hover:scale-110 transition-transform"></i>
                        </div>
                        <span class="text-[11px] font-semibold text-navy/80 text-center leading-tight">Elétrica</span>
                    </button>
                    <!-- Item 2 -->
                    <button class="flex flex-col items-center gap-2 group">
                        <div class="w-[60px] h-[60px] rounded-full bg-white shadow-glass flex items-center justify-center border border-gray-50 group-hover:border-primary/20 group-hover:shadow-md transition-all">
                            <i class="fa-solid fa-faucet-drip text-primary text-xl group-hover:scale-110 transition-transform"></i>
                        </div>
                        <span class="text-[11px] font-semibold text-navy/80 text-center leading-tight">Hidráulica</span>
                    </button>
                    <!-- Item 3 -->
                    <button class="flex flex-col items-center gap-2 group">
                        <div class="w-[60px] h-[60px] rounded-full bg-white shadow-glass flex items-center justify-center border border-gray-50 group-hover:border-primary/20 group-hover:shadow-md transition-all">
                            <i class="fa-solid fa-trowel-bricks text-primary text-xl group-hover:scale-110 transition-transform"></i>
                        </div>
                        <span class="text-[11px] font-semibold text-navy/80 text-center leading-tight">Reformas</span>
                    </button>
                    <!-- Item 4 -->
                    <button class="flex flex-col items-center gap-2 group">
                        <div class="w-[60px] h-[60px] rounded-full bg-white shadow-glass flex items-center justify-center border border-gray-50 group-hover:border-primary/20 group-hover:shadow-md transition-all">
                            <i class="fa-solid fa-broom text-primary text-xl group-hover:scale-110 transition-transform"></i>
                        </div>
                        <span class="text-[11px] font-semibold text-navy/80 text-center leading-tight">Limpeza</span>
                    </button>
                    <!-- Item 5 -->
                    <button class="flex flex-col items-center gap-2 group">
                        <div class="w-[60px] h-[60px] rounded-full bg-white shadow-glass flex items-center justify-center border border-gray-50 group-hover:border-primary/20 group-hover:shadow-md transition-all">
                            <i class="fa-solid fa-paint-roller text-primary text-xl group-hover:scale-110 transition-transform"></i>
                        </div>
                        <span class="text-[11px] font-semibold text-navy/80 text-center leading-tight">Pintura</span>
                    </button>
                    <!-- Item 6 -->
                    <button class="flex flex-col items-center gap-2 group">
                        <div class="w-[60px] h-[60px] rounded-full bg-white shadow-glass flex items-center justify-center border border-gray-50 group-hover:border-primary/20 group-hover:shadow-md transition-all">
                            <i class="fa-solid fa-snowflake text-primary text-xl group-hover:scale-110 transition-transform"></i>
                        </div>
                        <span class="text-[11px] font-semibold text-navy/80 text-center leading-tight">Ar cond.</span>
                    </button>
                    <!-- Item 7 -->
                    <button class="flex flex-col items-center gap-2 group">
                        <div class="w-[60px] h-[60px] rounded-full bg-white shadow-glass flex items-center justify-center border border-gray-50 group-hover:border-primary/20 group-hover:shadow-md transition-all">
                            <i class="fa-solid fa-leaf text-primary text-xl group-hover:scale-110 transition-transform"></i>
                        </div>
                        <span class="text-[11px] font-semibold text-navy/80 text-center leading-tight">Jardinagem</span>
                    </button>
                    <!-- Item 8 -->
                    <button class="flex flex-col items-center gap-2 group">
                        <div class="w-[60px] h-[60px] rounded-full bg-gray-100 shadow-glass flex items-center justify-center border border-gray-50 group-hover:bg-gray-200 transition-all">
                            <i class="fa-solid fa-ellipsis text-navy/60 text-xl"></i>
                        </div>
                        <span class="text-[11px] font-semibold text-navy/80 text-center leading-tight">Mais</span>
                    </button>
                </div>
            </section>

            <!-- 4. Featured Masters -->
            <section id="featured-masters" class="pt-4 pb-8 -mx-5 px-5">
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-xl font-bold text-navy leading-tight max-w-[200px]">Mestres Recomendados para você</h2>
                    <button class="text-sm font-semibold text-primary mb-1">Ver todos</button>
                </div>
                
                <!-- Horizontal Scroll Container -->
                <div class="flex overflow-x-auto hide-scrollbar gap-4 pb-6 snap-x snap-mandatory pr-5">
                    
                    <!-- Card 1 -->
                    <div class="min-w-[260px] bg-white rounded-[24px] p-2 shadow-soft border border-gray-50 snap-start relative group">
                        <div class="absolute top-4 left-4 z-10 bg-white/90 backdrop-blur-sm px-2.5 py-1 rounded-full flex items-center gap-1 shadow-sm">
                            <i class="fa-solid fa-star text-yellow-400 text-[10px]"></i>
                            <span class="text-xs font-bold text-navy">5.0</span>
                        </div>
                        <div class="absolute top-4 right-4 z-10 bg-primary text-white px-2.5 py-1 rounded-full shadow-md">
                            <span class="text-[10px] font-bold uppercase tracking-wider">98% Match</span>
                        </div>
                        
                        <div class="h-[140px] w-full rounded-[18px] overflow-hidden mb-3 relative">
                            <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-3.jpg" class="w-full h-full object-cover" alt="Project Thumbnail">
                            <div class="absolute inset-0 bg-gradient-to-t from-navy/40 to-transparent"></div>
                        </div>
                        
                        <div class="px-2 pb-2">
                            <div class="flex items-center gap-3 mb-2">
                                <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-white shadow-sm -mt-6 relative z-20 bg-white">
                                    <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-2.jpg" class="w-full h-full object-cover" alt="Professional">
                                </div>
                                <div class="flex-1 -mt-2">
                                    <h3 class="font-bold text-navy text-sm">Carlos Silva</h3>
                                    <p class="text-xs text-soft-gray font-medium">Eletricista Premium</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 mt-3">
                                <span class="bg-surface text-navy/70 text-[10px] px-2 py-1 rounded-md font-semibold">150+ projetos</span>
                                <span class="bg-surface text-navy/70 text-[10px] px-2 py-1 rounded-md font-semibold">Responde rápido</span>
                            </div>
                        </div>
                    </div>

                    <!-- Card 2 -->
                    <div class="min-w-[260px] bg-white rounded-[24px] p-2 shadow-soft border border-gray-50 snap-start relative group">
                        <div class="absolute top-4 left-4 z-10 bg-white/90 backdrop-blur-sm px-2.5 py-1 rounded-full flex items-center gap-1 shadow-sm">
                            <i class="fa-solid fa-star text-yellow-400 text-[10px]"></i>
                            <span class="text-xs font-bold text-navy">4.9</span>
                        </div>
                        <div class="absolute top-4 right-4 z-10 bg-primary text-white px-2.5 py-1 rounded-full shadow-md">
                            <span class="text-[10px] font-bold uppercase tracking-wider">95% Match</span>
                        </div>
                        
                        <div class="h-[140px] w-full rounded-[18px] overflow-hidden mb-3 relative">
                            <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-5.jpg" class="w-full h-full object-cover" alt="Project Thumbnail">
                            <div class="absolute inset-0 bg-gradient-to-t from-navy/40 to-transparent"></div>
                        </div>
                        
                        <div class="px-2 pb-2">
                            <div class="flex items-center gap-3 mb-2">
                                <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-white shadow-sm -mt-6 relative z-20 bg-white">
                                    <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-6.jpg" class="w-full h-full object-cover" alt="Professional">
                                </div>
                                <div class="flex-1 -mt-2">
                                    <h3 class="font-bold text-navy text-sm">Mariana Costa</h3>
                                    <p class="text-xs text-soft-gray font-medium">Reformas Gerais</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 mt-3">
                                <span class="bg-surface text-navy/70 text-[10px] px-2 py-1 rounded-md font-semibold">89 projetos</span>
                                <span class="bg-surface text-navy/70 text-[10px] px-2 py-1 rounded-md font-semibold">Top Avaliada</span>
                            </div>
                        </div>
                    </div>

                </div>
            </section>

        </div>


    </main>

    <script src="../../_mobile-nav.js"></script>
</body>
</html>
