<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fazer uma Denúncia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        trustBlue: '#0016dc',
                        softRed: '#e11d48', // Tailwind rose-600 equivalent for soft red
                        deepNavy: '#1A1A24',
                        offWhite: '#F8F9FA',
                        surfaceWhite: '#FFFFFF',
                        borderLight: '#E2E8F0',
                        textMuted: '#64748B',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'float': '0 8px 30px rgba(0, 0, 0, 0.08)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Custom radio button styles for the pill selector */
        .reason-radio:checked + label {
            border-color: #0016dc;
            background-color: rgba(0, 22, 220, 0.04);
            color: #0016dc;
            font-weight: 600;
        }
        .reason-radio:checked + label .check-icon {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body class="text-deepNavy font-sans min-h-[100dvh] flex flex-col items-center justify-start">

    <!-- Mobile Container Wrapper -->
    <div id="app-container" class="w-full max-w-[430px] min-h-[100dvh] bg-offWhite relative flex flex-col mx-auto shadow-2xl overflow-hidden">

        <!-- Top Header -->
        <header id="header" class="bg-surfaceWhite px-6 py-5 flex items-center justify-between sticky top-0 z-50 rounded-b-[24px] shadow-sm">
            <button class="text-textMuted font-medium text-[15px] hover:text-deepNavy transition-colors">
                Cancelar
            </button>
            <h1 class="text-[17px] font-bold text-deepNavy absolute left-1/2 -translate-x-1/2">
                Fazer uma Denúncia
            </h1>
            <div class="w-[60px]"></div> <!-- Spacer for centering -->
        </header>

        <!-- Main Content Scroll Area -->
        <main class="flex-1 overflow-y-auto pb-[140px] px-6 pt-6 flex flex-col gap-8">

            <!-- Context Card -->
            <section id="context-card" class="bg-surfaceWhite rounded-[24px] p-5 shadow-soft flex items-center gap-4 border border-borderLight/50">
                <div class="relative">
                    <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-3.jpg" alt="Roberto" class="w-14 h-14 rounded-full object-cover border-2 border-surfaceWhite shadow-sm">
                    <div class="absolute bottom-0 right-0 w-4 h-4 bg-red-500 border-2 border-surfaceWhite rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-exclamation text-[8px] text-white"></i>
                    </div>
                </div>
                <div class="flex flex-col">
                    <span class="text-[13px] text-textMuted font-medium mb-0.5">Denunciando:</span>
                    <h2 class="text-[16px] font-bold text-deepNavy leading-tight">Roberto - Eletricista</h2>
                </div>
            </section>

            <!-- Reason Selector Grid -->
            <section id="reason-selector" class="flex flex-col gap-4">
                <h3 class="text-[18px] font-bold text-deepNavy px-1">Qual o motivo da denúncia?</h3>
                
                <div class="grid grid-cols-1 gap-3">
                    <!-- Option 1 -->
                    <div class="relative">
                        <input type="radio" name="reason" id="reason-1" class="reason-radio hidden">
                        <label for="reason-1" class="flex items-center justify-between w-full p-4 rounded-[20px] bg-surfaceWhite border-[1.5px] border-borderLight cursor-pointer transition-all duration-200 shadow-sm hover:border-trustBlue/30">
                            <span class="text-[15px] font-medium text-deepNavy">Serviço não concluído</span>
                            <div class="w-5 h-5 rounded-full border-2 border-borderLight flex items-center justify-center transition-colors">
                                <div class="w-2.5 h-2.5 rounded-full bg-trustBlue opacity-0 scale-50 transition-all duration-200 check-icon"></div>
                            </div>
                        </label>
                    </div>

                    <!-- Option 2 (Selected State Example) -->
                    <div class="relative">
                        <input type="radio" name="reason" id="reason-2" class="reason-radio hidden" checked>
                        <label for="reason-2" class="flex items-center justify-between w-full p-4 rounded-[20px] bg-surfaceWhite border-[1.5px] border-borderLight cursor-pointer transition-all duration-200 shadow-sm">
                            <span class="text-[15px] font-medium text-deepNavy">Comportamento inadequado</span>
                            <div class="w-5 h-5 rounded-full border-2 border-trustBlue flex items-center justify-center transition-colors">
                                <div class="w-2.5 h-2.5 rounded-full bg-trustBlue opacity-1 scale-100 transition-all duration-200 check-icon"></div>
                            </div>
                        </label>
                    </div>

                    <!-- Option 3 -->
                    <div class="relative">
                        <input type="radio" name="reason" id="reason-3" class="reason-radio hidden">
                        <label for="reason-3" class="flex items-center justify-between w-full p-4 rounded-[20px] bg-surfaceWhite border-[1.5px] border-borderLight cursor-pointer transition-all duration-200 shadow-sm hover:border-trustBlue/30">
                            <span class="text-[15px] font-medium text-deepNavy">Cobrança abusiva</span>
                            <div class="w-5 h-5 rounded-full border-2 border-borderLight flex items-center justify-center transition-colors">
                                <div class="w-2.5 h-2.5 rounded-full bg-trustBlue opacity-0 scale-50 transition-all duration-200 check-icon"></div>
                            </div>
                        </label>
                    </div>

                    <!-- Option 4 -->
                    <div class="relative">
                        <input type="radio" name="reason" id="reason-4" class="reason-radio hidden">
                        <label for="reason-4" class="flex items-center justify-between w-full p-4 rounded-[20px] bg-surfaceWhite border-[1.5px] border-borderLight cursor-pointer transition-all duration-200 shadow-sm hover:border-trustBlue/30">
                            <span class="text-[15px] font-medium text-deepNavy">Perfil Falso</span>
                            <div class="w-5 h-5 rounded-full border-2 border-borderLight flex items-center justify-center transition-colors">
                                <div class="w-2.5 h-2.5 rounded-full bg-trustBlue opacity-0 scale-50 transition-all duration-200 check-icon"></div>
                            </div>
                        </label>
                    </div>
                </div>
            </section>

            <!-- Detailed Description -->
            <section id="detailed-description" class="flex flex-col gap-3">
                <label for="description-text" class="text-[16px] font-bold text-deepNavy px-1">Detalhes do ocorrido</label>
                <textarea 
                    id="description-text" 
                    rows="4" 
                    class="w-full bg-surfaceWhite border-[1.5px] border-borderLight rounded-[24px] p-5 text-[15px] text-deepNavy placeholder:text-textMuted/70 focus:outline-none focus:border-trustBlue focus:ring-4 focus:ring-trustBlue/10 transition-all resize-none shadow-sm"
                    placeholder="Descreva o que aconteceu com o máximo de detalhes..."></textarea>
            </section>

            <!-- Evidence Upload -->
            <section id="evidence-upload" class="flex flex-col gap-3">
                <span class="text-[16px] font-bold text-deepNavy px-1">Evidências</span>
                <button class="w-full bg-surfaceWhite border-2 border-dashed border-borderLight hover:border-trustBlue/50 rounded-[24px] p-6 flex flex-col items-center justify-center gap-3 transition-colors group shadow-sm">
                    <div class="w-12 h-12 rounded-full bg-offWhite group-hover:bg-trustBlue/5 flex items-center justify-center transition-colors">
                        <i class="fa-solid fa-paperclip text-[20px] text-textMuted group-hover:text-trustBlue transition-colors"></i>
                    </div>
                    <span class="text-[14px] font-medium text-textMuted group-hover:text-deepNavy transition-colors text-center">
                        Anexar Provas<br>
                        <span class="text-[12px] font-normal text-textMuted/70">Fotos ou prints do chat</span>
                    </span>
                </button>
            </section>

        </main>

        <!-- Pinned Primary Action Bottom -->
        <div id="footer-action" class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-offWhite via-offWhite to-transparent pt-8 pb-8 px-6 z-40">
            <div class="flex flex-col items-center gap-3 w-full max-w-[430px] mx-auto">
                <button class="w-full bg-softRed hover:bg-softRed/90 active:scale-[0.98] text-white font-bold text-[16px] py-4.5 h-[56px] rounded-full shadow-float transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-shield-halved text-[14px] opacity-90"></i>
                    Enviar Denúncia para Moderação
                </button>
                <div class="flex items-center gap-1.5 text-textMuted">
                    <i class="fa-solid fa-lock text-[10px]"></i>
                    <span class="text-[12px] font-medium">Seu relato é confidencial</span>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
