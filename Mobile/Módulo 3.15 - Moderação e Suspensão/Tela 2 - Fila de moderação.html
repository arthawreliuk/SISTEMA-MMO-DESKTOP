<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fila de moderação - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        background: '#F8F9FA',
                        primary: '#0016dc',
                        textMain: '#1A1A24',
                        textMuted: '#6B7280',
                        cardBg: '#FFFFFF',
                        dangerLight: '#FEE2E2',
                        dangerText: '#DC2626',
                        warningLight: '#FEF3C7',
                        warningText: '#D97706',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'float': '0 10px 30px -5px rgba(0, 22, 220, 0.15)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F8F9FA;
            color: #1A1A24;
            -webkit-font-smoothing: antialiased;
        }
        /* Hide scrollbar for horizontal scrolling tabs */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="font-sans antialiased text-textMain bg-background h-[100dvh] flex flex-col relative overflow-hidden">

    <!-- 1. Top Header -->
    <header id="header" class="glass-header w-full flex items-center justify-between px-6 py-4 sticky top-0 z-50 border-b border-gray-100">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white font-bold text-sm shadow-md">
                M
            </div>
        </div>
        <h1 class="text-base font-semibold tracking-tight">Moderação</h1>
        <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-gray-100 transition-colors">
            <i class="fa-solid fa-sliders text-textMain"></i>
        </button>
    </header>

    <!-- Main Content Area (Scrollable) -->
    <main class="flex-1 overflow-y-auto pb-28 px-4 pt-4">
        
        <!-- 2. Triage Tabs (Horizontal Scroll) -->
        <section id="triage-tabs" class="mb-6">
            <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2 px-1">
                <button class="flex-shrink-0 flex items-center gap-2 px-5 py-2.5 rounded-full bg-white border border-gray-200 text-sm font-medium shadow-sm transition-all">
                    <span class="w-2 h-2 rounded-full bg-red-500"></span>
                    Urgentes
                    <span class="bg-gray-100 text-textMuted px-2 py-0.5 rounded-full text-xs ml-1">3</span>
                </button>
                <button class="flex-shrink-0 flex items-center gap-2 px-5 py-2.5 rounded-full bg-primary text-white text-sm font-medium shadow-[0_4px_12px_rgba(0,22,220,0.25)] transition-all">
                    <span class="w-2 h-2 rounded-full bg-yellow-400"></span>
                    Abertos
                    <span class="bg-white/20 px-2 py-0.5 rounded-full text-xs ml-1">12</span>
                </button>
                <button class="flex-shrink-0 flex items-center gap-2 px-5 py-2.5 rounded-full bg-white border border-gray-200 text-textMuted text-sm font-medium shadow-sm transition-all">
                    Em Análise
                </button>
            </div>
        </section>

        <!-- 3. Queue Feed (Ticket Inbox) -->
        <section id="queue-feed" class="flex flex-col gap-4">
            
            <!-- Card 1: Critical Severity -->
            <article class="bg-cardBg rounded-[16px] p-5 shadow-soft border border-gray-100 flex flex-col gap-4 relative overflow-hidden">
                <!-- Top: Badge & Timer -->
                <div class="flex items-center justify-between">
                    <div class="bg-dangerLight text-dangerText px-3 py-1 rounded-full text-xs font-semibold flex items-center gap-1.5">
                        <i class="fa-solid fa-triangle-exclamation text-[10px]"></i>
                        Fraude Financeira
                    </div>
                    <div class="text-xs font-medium text-textMuted flex items-center gap-1.5 bg-gray-50 px-3 py-1 rounded-full">
                        <i class="fa-regular fa-hourglass-half"></i>
                        SLA: 10 min
                    </div>
                </div>

                <!-- Middle: Reporter -> Reported -->
                <div class="bg-gray-50/50 rounded-xl p-4 border border-gray-50">
                    <div class="flex items-center justify-between mb-3 relative">
                        <!-- Connecting Line -->
                        <div class="absolute left-[3rem] right-[3rem] top-1/2 h-[2px] bg-gray-200 -translate-y-1/2 z-0 border-t border-dashed border-gray-300"></div>
                        
                        <!-- Reporter -->
                        <div class="flex flex-col items-center gap-2 relative z-10 bg-white p-1 rounded-xl shadow-sm">
                            <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-4.jpg" alt="João" class="w-10 h-10 rounded-full object-cover border-2 border-white shadow-sm">
                        </div>
                        
                        <!-- Arrow Icon -->
                        <div class="relative z-10 w-6 h-6 rounded-full bg-white shadow-sm flex items-center justify-center text-gray-400 text-[10px]">
                            <i class="fa-solid fa-arrow-right"></i>
                        </div>

                        <!-- Reported -->
                        <div class="flex flex-col items-center gap-2 relative z-10 bg-white p-1 rounded-xl shadow-sm border border-red-100">
                            <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-8.jpg" alt="Mestre Elétrica" class="w-10 h-10 rounded-full object-cover border-2 border-white shadow-sm">
                        </div>
                    </div>
                    <div class="text-sm flex justify-center items-center gap-2 text-center">
                        <span class="font-medium">João</span>
                        <i class="fa-solid fa-arrow-right text-[10px] text-gray-300"></i>
                        <span class="font-semibold text-dangerText">Mestre Elétrica</span>
                    </div>
                </div>

                <!-- Bottom: Action -->
                <button class="w-full py-3 rounded-full text-primary font-semibold text-sm border-2 border-primary/10 bg-primary/5 hover:bg-primary hover:text-white transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-user-shield"></i>
                    Assumir Caso
                </button>
            </article>

            <!-- Card 2: Medium Severity -->
            <article class="bg-cardBg rounded-[16px] p-5 shadow-soft border border-gray-100 flex flex-col gap-4 relative overflow-hidden">
                <!-- Top: Badge & Timer -->
                <div class="flex items-center justify-between">
                    <div class="bg-warningLight text-warningText px-3 py-1 rounded-full text-xs font-semibold flex items-center gap-1.5">
                        <i class="fa-solid fa-circle-exclamation text-[10px]"></i>
                        Trabalho Incompleto
                    </div>
                    <div class="text-xs font-medium text-textMuted flex items-center gap-1.5 bg-gray-50 px-3 py-1 rounded-full">
                        <i class="fa-regular fa-hourglass-half"></i>
                        SLA: 45 min
                    </div>
                </div>

                <!-- Middle: Reporter -> Reported -->
                <div class="bg-gray-50/50 rounded-xl p-4 border border-gray-50">
                    <div class="flex items-center justify-between mb-3 relative">
                        <!-- Connecting Line -->
                        <div class="absolute left-[3rem] right-[3rem] top-1/2 h-[2px] bg-gray-200 -translate-y-1/2 z-0 border-t border-dashed border-gray-300"></div>
                        
                        <!-- Reporter -->
                        <div class="flex flex-col items-center gap-2 relative z-10 bg-white p-1 rounded-xl shadow-sm">
                            <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-1.jpg" alt="Maria" class="w-10 h-10 rounded-full object-cover border-2 border-white shadow-sm">
                        </div>
                        
                        <!-- Arrow Icon -->
                        <div class="relative z-10 w-6 h-6 rounded-full bg-white shadow-sm flex items-center justify-center text-gray-400 text-[10px]">
                            <i class="fa-solid fa-arrow-right"></i>
                        </div>

                        <!-- Reported -->
                        <div class="flex flex-col items-center gap-2 relative z-10 bg-white p-1 rounded-xl shadow-sm border border-orange-100">
                            <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-3.jpg" alt="Carlos Pinturas" class="w-10 h-10 rounded-full object-cover border-2 border-white shadow-sm">
                        </div>
                    </div>
                    <div class="text-sm flex justify-center items-center gap-2 text-center">
                        <span class="font-medium">Maria S.</span>
                        <i class="fa-solid fa-arrow-right text-[10px] text-gray-300"></i>
                        <span class="font-semibold text-warningText">Carlos Pinturas</span>
                    </div>
                </div>

                <!-- Bottom: Action -->
                <button class="w-full py-3 rounded-full text-primary font-semibold text-sm border-2 border-primary/10 bg-primary/5 hover:bg-primary hover:text-white transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-user-shield"></i>
                    Assumir Caso
                </button>
            </article>

        </section>
    </main>


    <script src="../../_mobile-nav.js"></script>
</body>
</html>
