<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Document Analysis & Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0016dc',
                        'primary-hover': '#0010a3',
                        surface: '#F8F9FA',
                        navy: '#1A1A24',
                        'navy-light': '#3D3D4E',
                        'card-bg': '#FFFFFF',
                        success: {
                            bg: '#E6F4EA',
                            text: '#137333'
                        },
                        warning: {
                            text: '#E65100',
                            bg: '#FFF3E0'
                        }
                    },
                    boxShadow: {
                        'ambient': '0 8px 30px rgba(0, 0, 0, 0.04)',
                        'ambient-lg': '0 12px 40px rgba(0, 0, 0, 0.06)',
                        'nav': '0 -4px 20px rgba(0, 0, 0, 0.05)',
                    },
                    borderRadius: {
                        '4xl': '2rem',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
        
        .glass-header {
            background: rgba(248, 249, 250, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
    </style>
</head>
<body class="text-navy font-sans min-h-[100dvh] flex flex-col items-center">

    <!-- Mobile Container (Max width constraint for desktop viewing) -->
    <main class="w-full max-w-[375px] min-h-[100dvh] bg-surface relative flex flex-col shadow-2xl overflow-hidden mx-auto">

        <!-- 1. Top Header -->
        <header id="header" class="glass-header sticky top-0 z-50 w-full px-5 py-4 flex items-center justify-between transition-all duration-300">
            <button class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm text-navy hover:bg-gray-50 transition-colors">
                <i class="fa-solid fa-arrow-left text-lg"></i>
            </button>
            <h1 class="text-[17px] font-bold text-navy tracking-tight">Análise Documental</h1>
            <button class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm text-navy hover:bg-gray-50 transition-colors">
                <i class="fa-solid fa-magnifying-glass-plus text-lg"></i>
            </button>
        </header>

        <!-- Scrollable Content Area -->
        <div class="flex-1 overflow-y-auto pb-[140px] px-5 pt-6 space-y-6">

            <!-- 2. Biometric Comparison Card -->
            <section id="biometric-card" class="bg-card rounded-[20px] p-5 shadow-ambient flex flex-col gap-5">
                <div class="flex items-center justify-between">
                    <h2 class="text-sm font-semibold text-navy uppercase tracking-wider">Comparação Biométrica</h2>
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                </div>
                
                <div class="flex gap-4">
                    <!-- Selfie -->
                    <div class="flex-1 flex flex-col gap-2">
                        <div class="aspect-[3/4] rounded-2xl overflow-hidden relative bg-gray-100 shadow-inner">
                            <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/f09493fbc3-1de189772462de5cba7a.png" alt="A clear, professional selfie of a person looking straight at the camera, neutral lighting, taken on a mobile phone" />
                            <div class="absolute inset-0 ring-1 ring-inset ring-black/5 rounded-2xl"></div>
                        </div>
                        <span class="text-xs font-medium text-navy-light text-center">Selfie Enviada</span>
                    </div>

                    <!-- Divider -->
                    <div class="flex items-center justify-center">
                        <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 shadow-sm z-10">
                            <i class="fa-solid fa-arrows-left-right text-xs"></i>
                        </div>
                    </div>

                    <!-- Doc Photo -->
                    <div class="flex-1 flex flex-col gap-2">
                        <div class="aspect-[3/4] rounded-2xl overflow-hidden relative bg-gray-100 shadow-inner">
                            <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/2af12d01e9-92f2da7d6fec3d871998.png" alt="A cropped portrait photo from a Brazilian ID card (RG or CNH), slightly lower quality than the selfie, formal pose" />
                            <div class="absolute inset-0 ring-1 ring-inset ring-black/5 rounded-2xl"></div>
                        </div>
                        <span class="text-xs font-medium text-navy-light text-center">Foto do Documento</span>
                    </div>
                </div>

                <!-- Match Badge -->
                <div class="flex justify-center mt-1">
                    <div class="inline-flex items-center gap-2 bg-success-bg text-success-text px-4 py-2 rounded-full font-bold text-sm shadow-sm border border-success-text/10">
                        <i class="fa-solid fa-fingerprint"></i>
                        Match Biométrico: 98%
                    </div>
                </div>
            </section>

            <!-- 3. Document Viewer -->
            <section id="document-viewer" class="flex flex-col gap-4">
                <div class="flex items-center justify-between px-1">
                    <h2 class="text-sm font-semibold text-navy uppercase tracking-wider">Documento Original</h2>
                    <span class="text-xs font-medium text-primary bg-primary/10 px-2.5 py-1 rounded-md">CNH</span>
                </div>
                
                <div class="bg-card rounded-[20px] p-2 shadow-ambient">
                    <div class="w-full aspect-[1.58/1] rounded-2xl overflow-hidden relative bg-gray-100">
                        <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/c6bc33ce49-e0863362167acfcbaa8d.png" alt="A clear, well-lit photo of a Brazilian Driver" />
                        <!-- Scan line effect -->
                        <div class="absolute top-0 left-0 w-full h-1 bg-primary/30 shadow-[0_0_15px_rgba(0,22,220,0.5)] animate-[scan_3s_ease-in-out_infinite]"></div>
                    </div>
                </div>

                <button class="w-full py-3.5 rounded-full bg-white text-navy font-semibold text-sm shadow-sm border border-gray-100 hover:bg-gray-50 transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-layer-group text-primary"></i>
                    Ver Frente e Verso
                </button>
            </section>

            <!-- 4. Extracted Data (OCR) -->
            <section id="ocr-data" class="bg-card rounded-[20px] p-5 shadow-ambient flex flex-col gap-1">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-sm font-semibold text-navy uppercase tracking-wider">Dados Extraídos (OCR)</h2>
                    <i class="fa-solid fa-robot text-gray-400"></i>
                </div>

                <!-- Data Row 1 -->
                <div class="py-3 border-b border-gray-100 last:border-0 flex flex-col gap-1">
                    <span class="text-xs font-medium text-gray-400">Nome no DOC</span>
                    <div class="flex items-center justify-between">
                        <span class="text-[15px] font-bold text-navy">Roberto Alves</span>
                        <div class="flex items-center gap-1.5 text-xs font-semibold text-success-text bg-success-bg px-2 py-0.5 rounded-md">
                            <i class="fa-solid fa-check-circle"></i>
                            Bate com input
                        </div>
                    </div>
                </div>

                <!-- Data Row 2 -->
                <div class="py-3 border-b border-gray-100 last:border-0 flex flex-col gap-1">
                    <span class="text-xs font-medium text-gray-400">CPF</span>
                    <div class="flex items-center justify-between">
                        <span class="text-[15px] font-bold text-navy">123.456.789-00</span>
                        <div class="flex items-center gap-1.5 text-xs font-semibold text-success-text bg-success-bg px-2 py-0.5 rounded-md">
                            <i class="fa-solid fa-check-circle"></i>
                            Válido
                        </div>
                    </div>
                </div>
                
                <!-- Data Row 3 -->
                <div class="py-3 border-b border-gray-100 last:border-0 flex flex-col gap-1">
                    <span class="text-xs font-medium text-gray-400">Data de Nascimento</span>
                    <div class="flex items-center justify-between">
                        <span class="text-[15px] font-bold text-navy">15/08/1985</span>
                        <div class="flex items-center gap-1.5 text-xs font-semibold text-success-text bg-success-bg px-2 py-0.5 rounded-md">
                            <i class="fa-solid fa-check-circle"></i>
                            Maior de idade
                        </div>
                    </div>
                </div>

            </section>

        </div>

        <!-- 5. Moderation Actions (Pinned Bottom) -->
        <div id="footer-actions" class="absolute bottom-0 left-0 w-full p-5 pt-0 z-50">
            <div class="glass-nav rounded-[28px] p-2 shadow-nav flex items-center gap-2 border border-gray-100">
                
                <!-- Request New Photo (Ghost Pill) -->
                <button class="flex-1 h-14 rounded-[20px] bg-warning-bg text-warning-text font-bold text-[15px] tracking-tight hover:bg-orange-100 transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-camera-rotate"></i>
                    <span>Pedir Nova Foto</span>
                </button>

                <!-- Approve (Solid Primary Pill) -->
                <button class="flex-[1.2] h-14 rounded-[20px] bg-primary text-white font-bold text-[15px] tracking-tight hover:bg-primary-hover shadow-[0_8px_20px_rgba(0,22,220,0.25)] transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-check"></i>
                    <span>Aprovar Documento</span>
                </button>

            </div>
            
            <!-- Home Indicator Area -->
            <div class="h-6 w-full flex items-center justify-center mt-1">
                <div class="w-1/3 h-1.5 bg-gray-300 rounded-full"></div>
            </div>
        </div>

    </main>

    <style>
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</body>
</html>
