<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registration Validation Queue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0016dc',
                        'primary-light': 'rgba(0, 22, 220, 0.1)',
                        'deep-navy': '#1A1A24',
                        'off-white': '#F8F9FA',
                        'alert-orange': '#F59E0B',
                        'alert-orange-light': '#FEF3C7',
                        'success-green': '#10B981',
                        'success-green-light': '#D1FAE5',
                        'gray-text': '#6B7280',
                        'gray-border': '#E5E7EB',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'float': '0 10px 40px -10px rgba(0, 22, 220, 0.15)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; color: #1A1A24; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(229, 231, 235, 0.5); }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(229, 231, 235, 0.8); }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-off-white min-h-[100dvh] flex flex-col relative pb-24">

    <!-- 1. Top Header -->
    <header id="header" class="glass-header sticky top-0 z-40 w-full px-5 py-4 flex items-center justify-between">
        <button class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm border border-gray-100 text-deep-navy active:scale-95 transition-transform" aria-label="Voltar">
            <i class="fa-solid fa-arrow-left text-[18px]"></i>
        </button>
        <h1 class="text-[18px] font-bold text-deep-navy tracking-tight">Fila de Validação</h1>
        <button class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm border border-gray-100 text-deep-navy active:scale-95 transition-transform" aria-label="Filtros">
            <i class="fa-solid fa-sliders text-[16px]"></i>
        </button>
    </header>

    <!-- 2. SLA & Status Tabs -->
    <section id="StatusTabScroller" class="w-full pt-4 pb-2 px-5">
        <div class="flex overflow-x-auto hide-scrollbar gap-2 pb-2">
            <!-- Active Tab -->
            <button class="flex-shrink-0 flex items-center gap-2 px-5 py-2.5 rounded-full bg-primary text-white font-semibold text-[14px] shadow-md transition-all">
                <i class="fa-solid fa-hourglass-half text-[12px]"></i>
                Pendentes (12)
            </button>
            <!-- Inactive Tab -->
            <button class="flex-shrink-0 flex items-center gap-2 px-5 py-2.5 rounded-full bg-white text-gray-text font-medium text-[14px] border border-gray-border hover:bg-gray-50 transition-all">
                <i class="fa-solid fa-magnifying-glass text-[12px]"></i>
                Em Análise
            </button>
            <!-- Inactive Tab -->
            <button class="flex-shrink-0 flex items-center gap-2 px-5 py-2.5 rounded-full bg-white text-gray-text font-medium text-[14px] border border-gray-border hover:bg-gray-50 transition-all">
                <i class="fa-solid fa-xmark text-[12px]"></i>
                Rejeitados
            </button>
        </div>
    </section>

    <!-- 3. Queue Feed (The List) -->
    <main id="PriorityQueueFeed" class="flex-1 w-full px-5 py-4 flex flex-col gap-4">
        
        <!-- Card 1 (High Priority) -->
        <article id="card-high-priority" class="bg-white rounded-[20px] p-5 shadow-soft border border-gray-100 flex flex-col gap-4 relative overflow-hidden">
            <!-- Top: Badge -->
            <div class="flex justify-between items-start">
                <div class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-alert-orange-light text-alert-orange text-[12px] font-bold tracking-wide">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    Esperando há 24h
                </div>
                <button class="text-gray-400 hover:text-deep-navy transition-colors">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </button>
            </div>

            <!-- Middle: Info -->
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-full bg-gray-100 overflow-hidden border-2 border-white shadow-sm flex-shrink-0">
                    <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-4.jpg" alt="Roberto" class="w-full h-full object-cover">
                </div>
                <div class="flex flex-col">
                    <h2 class="text-[16px] font-bold text-deep-navy leading-tight">Roberto Silva</h2>
                    <p class="text-[13px] font-medium text-gray-text flex items-center gap-1.5 mt-0.5">
                        <i class="fa-solid fa-wrench text-[11px]"></i> Encanador
                        <span class="text-gray-300 mx-1">•</span>
                        <i class="fa-solid fa-location-dot text-[11px]"></i> Itajaí
                    </p>
                </div>
            </div>

            <!-- Bottom: Progress & CTA -->
            <div class="flex items-center justify-between pt-2 mt-1 border-t border-gray-50">
                <div class="flex flex-col gap-1.5 w-1/2">
                    <div class="flex justify-between items-center text-[11px] font-semibold text-deep-navy">
                        <span>Perfil Preenchido</span>
                        <span class="text-primary">100%</span>
                    </div>
                    <div class="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden">
                        <div class="h-full bg-primary rounded-full w-full"></div>
                    </div>
                </div>
                
                <button class="px-4 py-2 rounded-full bg-primary-light text-primary font-bold text-[13px] hover:bg-primary hover:text-white transition-colors active:scale-95 flex items-center gap-2">
                    Iniciar Análise
                    <i class="fa-solid fa-chevron-right text-[10px]"></i>
                </button>
            </div>
        </article>

        <!-- Card 2 (Normal Priority) -->
        <article id="card-normal-priority-1" class="bg-white rounded-[20px] p-5 shadow-soft border border-gray-100 flex flex-col gap-4 relative overflow-hidden">
            <!-- Top: Badge -->
            <div class="flex justify-between items-start">
                <div class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-success-green-light text-success-green text-[12px] font-bold tracking-wide">
                    <i class="fa-solid fa-hourglass-half"></i>
                    Esperando há 2h
                </div>
                <button class="text-gray-400 hover:text-deep-navy transition-colors">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </button>
            </div>

            <!-- Middle: Info -->
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-full bg-gray-100 overflow-hidden border-2 border-white shadow-sm flex-shrink-0">
                    <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-6.jpg" alt="Juliana" class="w-full h-full object-cover">
                </div>
                <div class="flex flex-col">
                    <h2 class="text-[16px] font-bold text-deep-navy leading-tight">Juliana Costa</h2>
                    <p class="text-[13px] font-medium text-gray-text flex items-center gap-1.5 mt-0.5">
                        <i class="fa-solid fa-bolt text-[11px]"></i> Eletricista
                        <span class="text-gray-300 mx-1">•</span>
                        <i class="fa-solid fa-location-dot text-[11px]"></i> Balneário Camboriú
                    </p>
                </div>
            </div>

            <!-- Bottom: Progress & CTA -->
            <div class="flex items-center justify-between pt-2 mt-1 border-t border-gray-50">
                <div class="flex flex-col gap-1.5 w-1/2">
                    <div class="flex justify-between items-center text-[11px] font-semibold text-deep-navy">
                        <span>Perfil Preenchido</span>
                        <span class="text-primary">85%</span>
                    </div>
                    <div class="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden">
                        <div class="h-full bg-primary rounded-full w-[85%]"></div>
                    </div>
                </div>
                
                <button class="px-4 py-2 rounded-full bg-gray-50 text-deep-navy font-bold text-[13px] border border-gray-200 hover:bg-primary-light hover:text-primary hover:border-transparent transition-colors active:scale-95 flex items-center gap-2">
                    Ver Detalhes
                </button>
            </div>
        </article>
        
        <!-- Card 3 (Normal Priority) -->
        <article id="card-normal-priority-2" class="bg-white rounded-[20px] p-5 shadow-soft border border-gray-100 flex flex-col gap-4 relative overflow-hidden">
            <!-- Top: Badge -->
            <div class="flex justify-between items-start">
                <div class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-success-green-light text-success-green text-[12px] font-bold tracking-wide">
                    <i class="fa-solid fa-hourglass-half"></i>
                    Esperando há 1h
                </div>
                <button class="text-gray-400 hover:text-deep-navy transition-colors">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </button>
            </div>

            <!-- Middle: Info -->
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-full bg-gray-100 overflow-hidden border-2 border-white shadow-sm flex-shrink-0 flex items-center justify-center text-gray-400">
                    <i class="fa-solid fa-user text-[20px]"></i>
                </div>
                <div class="flex flex-col">
                    <h2 class="text-[16px] font-bold text-deep-navy leading-tight">Marcos Pereira</h2>
                    <p class="text-[13px] font-medium text-gray-text flex items-center gap-1.5 mt-0.5">
                        <i class="fa-solid fa-hammer text-[11px]"></i> Pedreiro
                        <span class="text-gray-300 mx-1">•</span>
                        <i class="fa-solid fa-location-dot text-[11px]"></i> Navegantes
                    </p>
                </div>
            </div>

            <!-- Bottom: Progress & CTA -->
            <div class="flex items-center justify-between pt-2 mt-1 border-t border-gray-50">
                <div class="flex flex-col gap-1.5 w-1/2">
                    <div class="flex justify-between items-center text-[11px] font-semibold text-deep-navy">
                        <span>Perfil Preenchido</span>
                        <span class="text-alert-orange">60%</span>
                    </div>
                    <div class="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden">
                        <div class="h-full bg-alert-orange rounded-full w-[60%]"></div>
                    </div>
                </div>
                
                <button class="px-4 py-2 rounded-full bg-gray-50 text-deep-navy font-bold text-[13px] border border-gray-200 hover:bg-primary-light hover:text-primary hover:border-transparent transition-colors active:scale-95 flex items-center gap-2">
                    Ver Detalhes
                </button>
            </div>
        </article>

    </main>

    <!-- 4. Floating Pill Navigation -->
    <nav id="FloatingPillNav" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 w-[90%] max-w-[340px] z-50">
        <div class="glass-nav rounded-full px-6 py-3 shadow-float flex justify-between items-center">
            
            <!-- Inactive Nav Item -->
            <a href="#" class="flex flex-col items-center gap-1 text-gray-400 hover:text-deep-navy transition-colors w-16">
                <i class="fa-solid fa-chart-pie text-[20px]"></i>
            </a>

            <!-- Inactive Nav Item -->
            <a href="#" class="flex flex-col items-center gap-1 text-gray-400 hover:text-deep-navy transition-colors w-16">
                <i class="fa-solid fa-users text-[20px]"></i>
            </a>

            <!-- Active Nav Item (Validation/Shield) -->
            <a href="#" class="flex flex-col items-center gap-1 text-primary relative w-16">
                <div class="bg-primary-light w-12 h-12 rounded-full flex items-center justify-center -mt-6 shadow-sm border border-white">
                    <i class="fa-solid fa-shield-halved text-[22px]"></i>
                </div>
                <div class="w-1.5 h-1.5 rounded-full bg-primary mt-1 absolute -bottom-2"></div>
            </a>

            <!-- Inactive Nav Item -->
            <a href="#" class="flex flex-col items-center gap-1 text-gray-400 hover:text-deep-navy transition-colors w-16">
                <i class="fa-solid fa-bell text-[20px]"></i>
            </a>

            <!-- Inactive Nav Item -->
            <a href="#" class="flex flex-col items-center gap-1 text-gray-400 hover:text-deep-navy transition-colors w-16">
                <i class="fa-solid fa-gear text-[20px]"></i>
            </a>
            
        </div>
    </nav>

</body>
</html>
