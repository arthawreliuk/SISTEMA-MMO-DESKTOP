<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ação de desfavoritar - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        background: '#F8F9FA',
                        primary: '#0016dc',
                        textDark: '#1A1A24',
                        toastBg: '#1E293B',
                        grayOutline: '#94A3B8',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'toast': '0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1)',
                        'nav': '0 -4px 20px -2px rgba(0, 0, 0, 0.05)',
                    },
                    animation: {
                        'fade-out': 'fadeOut 0.3s ease-out forwards',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        fadeOut: {
                            '0%': { opacity: '1', transform: 'scale(1)' },
                            '100%': { opacity: '0.5', transform: 'scale(0.95)' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(100%)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
        .heart-transition { transition: all 0.3s ease; }
    </style>
</head>
<body class="pb-28 text-textDark min-h-[100dvh] flex flex-col items-center">

    <!-- Mobile Wrapper -->
    <main class="w-full max-w-[375px] min-h-[840px] h-screen bg-background relative overflow-hidden flex flex-col shadow-2xl sm:border sm:border-gray-200">
        
        <!-- Header Context -->
        <header id="header_context" class="px-6 pt-12 pb-4 bg-background z-10 sticky top-0">
            <div class="flex justify-between items-center mb-6">
                <button class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm text-textDark">
                    <i class="fa-solid fa-chevron-left text-sm"></i>
                </button>
                <h1 class="text-lg font-bold text-textDark">Favorites</h1>
                <button class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm text-textDark relative">
                    <i class="fa-regular fa-bell"></i>
                    <span class="absolute top-2 right-2 w-2 h-2 bg-primary rounded-full"></span>
                </button>
            </div>
            
            <!-- Search -->
            <div id="favorites_search" class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text" placeholder="Search favorites..." class="w-full bg-white rounded-[16px] py-3.5 pl-11 pr-4 text-sm font-medium text-textDark placeholder-gray-400 shadow-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all">
            </div>
            
            <div class="flex gap-3 mt-4 overflow-x-auto pb-2 scrollbar-hide">
                <button class="px-5 py-2 bg-textDark text-white text-xs font-semibold rounded-full whitespace-nowrap">All Items</button>
                <button class="px-5 py-2 bg-white text-gray-500 text-xs font-semibold rounded-full whitespace-nowrap shadow-sm border border-gray-100">Mentors</button>
                <button class="px-5 py-2 bg-white text-gray-500 text-xs font-semibold rounded-full whitespace-nowrap shadow-sm border border-gray-100">Courses</button>
            </div>
        </header>

        <!-- Favorites List -->
        <section id="favorites_list" class="flex-1 overflow-y-auto px-6 pb-32 pt-2 space-y-4">
            
            <!-- Card 1: The Transition State (Unfavorited) -->
            <div class="bg-white rounded-[16px] p-4 shadow-soft flex items-start gap-4 relative animate-fade-out opacity-70">
                <div class="w-16 h-16 rounded-[12px] bg-gray-100 overflow-hidden flex-shrink-0">
                    <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-4.jpg" alt="Mentor" class="w-full h-full object-cover">
                </div>
                <div class="flex-1 pt-1">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[10px] font-bold text-primary uppercase tracking-wider mb-1 block">Data Science</span>
                            <h3 class="font-bold text-textDark text-sm">Dr. Marcus Chen</h3>
                        </div>
                        <!-- Transitioned Heart Button -->
                        <button class="w-8 h-8 rounded-full border border-grayOutline flex items-center justify-center bg-white heart-transition">
                            <i class="fa-regular fa-heart text-grayOutline text-xs"></i>
                        </button>
                    </div>
                    <div class="flex items-center gap-2 mt-2 text-xs text-gray-500 font-medium">
                        <i class="fa-solid fa-star text-yellow-400 text-[10px]"></i>
                        <span>4.9 (120 reviews)</span>
                    </div>
                    <div class="mt-3 font-semibold text-textDark text-sm">
                        $150 <span class="text-gray-400 text-xs font-normal">/ session</span>
                    </div>
                </div>
            </div>

            <!-- Card 2: Normal State -->
            <div class="bg-white rounded-[16px] p-4 shadow-soft flex items-start gap-4 relative">
                <div class="w-16 h-16 rounded-[12px] bg-gray-100 overflow-hidden flex-shrink-0">
                    <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-5.jpg" alt="Mentor" class="w-full h-full object-cover">
                </div>
                <div class="flex-1 pt-1">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[10px] font-bold text-primary uppercase tracking-wider mb-1 block">UI/UX Design</span>
                            <h3 class="font-bold text-textDark text-sm">Sarah Jenkins</h3>
                        </div>
                        <button class="w-8 h-8 rounded-full bg-primary flex items-center justify-center shadow-sm">
                            <i class="fa-solid fa-heart text-white text-xs"></i>
                        </button>
                    </div>
                    <div class="flex items-center gap-2 mt-2 text-xs text-gray-500 font-medium">
                        <i class="fa-solid fa-star text-yellow-400 text-[10px]"></i>
                        <span>5.0 (84 reviews)</span>
                    </div>
                    <div class="mt-3 font-semibold text-textDark text-sm">
                        $120 <span class="text-gray-400 text-xs font-normal">/ session</span>
                    </div>
                </div>
            </div>

            <!-- Card 3: Normal State -->
            <div class="bg-white rounded-[16px] p-4 shadow-soft flex items-start gap-4 relative">
                <div class="w-16 h-16 rounded-[12px] bg-gray-100 overflow-hidden flex-shrink-0">
                    <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-2.jpg" alt="Mentor" class="w-full h-full object-cover">
                </div>
                <div class="flex-1 pt-1">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[10px] font-bold text-primary uppercase tracking-wider mb-1 block">Product Mgmt</span>
                            <h3 class="font-bold text-textDark text-sm">David Alaba</h3>
                        </div>
                        <button class="w-8 h-8 rounded-full bg-primary flex items-center justify-center shadow-sm">
                            <i class="fa-solid fa-heart text-white text-xs"></i>
                        </button>
                    </div>
                    <div class="flex items-center gap-2 mt-2 text-xs text-gray-500 font-medium">
                        <i class="fa-solid fa-star text-yellow-400 text-[10px]"></i>
                        <span>4.8 (210 reviews)</span>
                    </div>
                    <div class="mt-3 font-semibold text-textDark text-sm">
                        $180 <span class="text-gray-400 text-xs font-normal">/ session</span>
                    </div>
                </div>
            </div>
            
        </section>

        <!-- Undo Toast Overlay -->
        <div id="undo_toast_overlay" class="absolute bottom-28 left-6 right-6 z-40 animate-slide-up">
            <div class="bg-toastBg/95 backdrop-blur-md rounded-full py-3.5 px-5 shadow-toast flex items-center justify-between border border-white/10">
                <span class="text-white text-sm font-medium">Mestre removido da sua lista.</span>
                <button class="text-primary font-bold text-sm tracking-wide hover:opacity-80 transition-opacity">Desfazer</button>
            </div>
        </div>


    </main>

    <script src="../../_mobile-nav.js"></script>
</body>
</html>
