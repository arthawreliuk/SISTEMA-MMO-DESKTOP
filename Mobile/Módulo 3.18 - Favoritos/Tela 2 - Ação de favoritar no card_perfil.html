<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Card - Favorite Action</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        background: '#F8F9FA',
                        primary: '#0016dc',
                        textDark: '#1A1A24',
                        textMuted: '#6B7280',
                        surface: '#FFFFFF',
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0, 0, 0, 0.08)',
                        'glow': '0 0 20px rgba(0, 22, 220, 0.3)',
                        'toast': '0 20px 40px -10px rgba(26, 26, 36, 0.15)',
                    },
                    animation: {
                        'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slide-up 0.5s ease-out forwards',
                    },
                    keyframes: {
                        'pulse-glow': {
                            '0%, 100%': { boxShadow: '0 0 0 0 rgba(0, 22, 220, 0.4)' },
                            '50%': { boxShadow: '0 0 0 10px rgba(0, 22, 220, 0)' },
                        },
                        'slide-up': {
                            '0%': { transform: 'translateY(100%)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
        .glass-toast {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="text-textDark font-sans flex justify-center min-h-screen bg-background">

    <!-- Mobile Container (375x840 constraint) -->
    <div id="app-container" class="w-full max-w-[375px] h-[840px] bg-background relative overflow-hidden shadow-2xl mx-auto flex flex-col">
        
        <!-- Status Bar Spacer -->
        <div id="status_bar_spacer" class="h-12 w-full flex items-center justify-between px-6 pt-2 z-20 relative">
            <div class="text-sm font-semibold">9:41</div>
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-signal text-xs"></i>
                <i class="fa-solid fa-wifi text-xs"></i>
                <i class="fa-solid fa-battery-full text-sm"></i>
            </div>
        </div>

        <!-- Header -->
        <header id="header" class="px-6 py-4 flex items-center justify-between z-20 relative">
            <button class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-textDark">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <h1 class="text-lg font-bold">Profissionais</h1>
            <button class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-textDark">
                <i class="fa-solid fa-sliders"></i>
            </button>
        </header>

        <!-- Main Content Area -->
        <main id="professional_card_feed" class="flex-1 px-5 pt-4 pb-32 overflow-y-auto relative z-10">
            
            <!-- Filter Pills -->
            <div class="flex gap-3 mb-6 overflow-x-auto pb-2 -mx-5 px-5">
                <button class="px-5 py-2.5 rounded-full bg-primary text-white text-sm font-semibold whitespace-nowrap shadow-md">Elétrica</button>
                <button class="px-5 py-2.5 rounded-full bg-white text-textMuted text-sm font-semibold whitespace-nowrap shadow-sm">Encanamento</button>
                <button class="px-5 py-2.5 rounded-full bg-white text-textMuted text-sm font-semibold whitespace-nowrap shadow-sm">Pintura</button>
            </div>

            <!-- Massive Central Professional Card -->
            <div id="pro-card-1" class="bg-surface rounded-[24px] shadow-soft p-5 relative mb-6">
                <!-- Image Area -->
                <div class="relative w-full h-64 rounded-[16px] overflow-hidden mb-5">
                    <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-3.jpg" alt="Roberto Alves" class="w-full h-full object-cover">
                    
                    <!-- Gradient Overlay for contrast -->
                    <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
                    
                    <!-- The Favorite Interaction (Active State) -->
                    <button id="favorite-btn" class="absolute top-4 right-4 w-11 h-11 bg-white rounded-full flex items-center justify-center shadow-lg z-10 transition-transform active:scale-95 animate-pulse-glow">
                        <i class="fa-solid fa-heart text-primary text-lg"></i>
                    </button>

                    <!-- Rating Pill on Image -->
                    <div class="absolute bottom-4 left-4 bg-white/90 backdrop-blur-sm px-3 py-1.5 rounded-full flex items-center gap-1.5 shadow-sm">
                        <i class="fa-solid fa-star text-yellow-400 text-xs"></i>
                        <span class="text-sm font-bold text-textDark">4.9</span>
                        <span class="text-xs text-textMuted">(128)</span>
                    </div>
                </div>

                <!-- Card Content -->
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <h2 class="text-2xl font-bold text-textDark mb-1">Roberto Alves</h2>
                        <p class="text-textMuted text-sm font-medium flex items-center gap-1.5">
                            <i class="fa-solid fa-location-dot text-primary"></i> São Paulo, SP (2.5 km)
                        </p>
                    </div>
                    <div class="bg-blue-50 text-primary px-3 py-1 rounded-lg text-xs font-bold border border-blue-100">
                        Pro
                    </div>
                </div>

                <!-- Skill Pills -->
                <div class="flex flex-wrap gap-2 mb-5">
                    <span class="px-3 py-1.5 bg-gray-100 rounded-lg text-xs font-semibold text-textDark">Instalação</span>
                    <span class="px-3 py-1.5 bg-gray-100 rounded-lg text-xs font-semibold text-textDark">Manutenção</span>
                    <span class="px-3 py-1.5 bg-gray-100 rounded-lg text-xs font-semibold text-textDark">Projetos 220v</span>
                </div>

                <!-- Action Area -->
                <div class="flex items-center justify-between pt-4 border-t border-gray-100">
                    <div class="flex flex-col">
                        <span class="text-xs text-textMuted font-medium">A partir de</span>
                        <span class="text-lg font-bold text-textDark">R$ 150<span class="text-sm font-normal text-textMuted">/hora</span></span>
                    </div>
                    <button class="bg-textDark text-white px-6 py-3 rounded-xl font-semibold text-sm shadow-md hover:bg-black transition-colors">
                        Solicitar
                    </button>
                </div>
            </div>

            <!-- Secondary Card (Partial visibility to show scroll) -->
            <div id="pro-card-2" class="bg-surface rounded-[24px] shadow-soft p-5 relative opacity-60">
                <div class="relative w-full h-20 rounded-[16px] overflow-hidden mb-5 bg-gray-200">
                    <div class="absolute inset-0 flex items-center justify-center text-gray-400">
                        <i class="fa-solid fa-image text-2xl"></i>
                    </div>
                </div>
                <h2 class="text-xl font-bold text-textDark mb-1">Carlos Silva</h2>
                <div class="h-4 w-1/2 bg-gray-100 rounded mt-2"></div>
            </div>

        </main>

        <!-- Toast Notification Area -->
        <div id="toast_notification" class="absolute bottom-28 left-0 w-full px-5 z-40 flex justify-center pointer-events-none animate-slide-up">
            <div class="glass-toast rounded-full px-5 py-3.5 flex items-center gap-3 shadow-toast max-w-[90%]">
                <div class="w-6 h-6 rounded-full bg-primary/10 flex items-center justify-center">
                    <i class="fa-solid fa-check text-primary text-xs"></i>
                </div>
                <span class="text-sm font-bold text-textDark">Mestre Roberto salvo nos favoritos</span>
            </div>
        </div>

        <!-- Floating Pill Navigation -->
        <div id="floating_pill_navigation" class="absolute bottom-8 left-0 w-full px-6 z-30">
            <nav class="bg-white rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.12)] px-6 py-4 flex justify-between items-center relative">
                
                <a href="#" class="flex flex-col items-center gap-1 text-textMuted w-12">
                    <i class="fa-solid fa-house text-xl"></i>
                </a>
                
                <a href="#" class="flex flex-col items-center gap-1 text-textMuted w-12">
                    <i class="fa-solid fa-magnifying-glass text-xl"></i>
                </a>
                
                <a href="#" class="flex flex-col items-center gap-1 text-primary w-12 relative">
                    <i class="fa-solid fa-heart text-xl"></i>
                    <!-- Notification Dot -->
                    <div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-1.5 h-1.5 bg-primary rounded-full"></div>
                </a>
                
                <a href="#" class="flex flex-col items-center gap-1 text-textMuted w-12">
                    <i class="fa-solid fa-message text-xl"></i>
                </a>
                
                <a href="#" class="flex flex-col items-center gap-1 text-textMuted w-12">
                    <i class="fa-regular fa-user text-xl"></i>
                </a>
                
            </nav>
        </div>

        <!-- Home Indicator -->
        <div class="absolute bottom-2 left-0 w-full flex justify-center z-50">
            <div class="w-32 h-1 bg-textDark rounded-full opacity-20"></div>
        </div>

    </div>

</body>
</html>
