<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meus Favoritos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        'off-white': '#F8F9FA',
                        'trust-blue': '#0016dc',
                        'deep-navy': '#1A1A24',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'nav': '0 -4px 20px -2px rgba(0, 0, 0, 0.08)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Mobile target width wrapper */
        .mobile-wrapper {
            width: 100%;
            max-width: 375px;
            margin: 0 auto;
            min-height: 100dvh;
            background-color: #F8F9FA;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }
        @media (min-width: 376px) {
            body { background-color: #e5e7eb; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        }
    </style>
</head>
<body class="bg-gray-200">

<div class="mobile-wrapper" id="app-container">
    
    <!-- Top Header -->
    <header id="header" class="w-full bg-white px-6 py-5 flex items-center justify-between shadow-soft z-10 sticky top-0">
        <button class="w-10 h-10 flex items-center justify-center rounded-full bg-off-white text-deep-navy transition-colors hover:bg-gray-100">
            <i class="fa-solid fa-chevron-left text-lg"></i>
        </button>
        <h1 class="text-deep-navy font-bold text-lg tracking-tight">Meus Favoritos</h1>
        <div class="w-10 h-10"></div> <!-- Spacer for centering -->
    </header>

    <!-- Main Content: Empty State -->
    <main id="main-content" class="flex-1 flex flex-col items-center justify-center px-8 pb-32 pt-8 text-center relative z-0">
        
        <!-- Illustration Area -->
        <div class="mb-10 relative w-48 h-48 flex items-center justify-center">
            <!-- Decorative background glow -->
            <div class="absolute inset-0 bg-trust-blue/5 rounded-full blur-2xl"></div>
            
            <!-- Abstract Line Art Illustration -->
            <div class="relative w-full h-full bg-white rounded-full shadow-soft flex items-center justify-center border border-gray-100/50">
                <div class="relative">
                    <i class="fa-regular fa-folder-open text-6xl text-gray-200"></i>
                    <!-- Accent Heart -->
                    <div class="absolute -bottom-2 -right-2 bg-white rounded-full p-2 shadow-sm border border-gray-50">
                        <i class="fa-solid fa-heart text-2xl text-trust-blue"></i>
                    </div>
                </div>
            </div>
            
            <!-- Floating decorative elements -->
            <div class="absolute top-4 right-4 w-3 h-3 rounded-full bg-trust-blue/20"></div>
            <div class="absolute bottom-8 left-4 w-2 h-2 rounded-full bg-gray-300"></div>
            <div class="absolute top-1/2 -right-2 w-4 h-4 rounded-full border-2 border-gray-200"></div>
        </div>

        <!-- Typography -->
        <h2 class="text-2xl font-bold text-deep-navy mb-4 tracking-tight">Nenhum Mestre salvo</h2>
        
        <p class="text-gray-500 font-medium text-[15px] leading-relaxed mb-12 max-w-[280px]">
            Você ainda não favoritou nenhum profissional. Quando encontrar alguém de confiança, salve-o para acesso rápido.
        </p>

        <!-- CTA Button -->
        <button class="w-full bg-trust-blue text-white font-bold text-base py-4 px-8 rounded-full shadow-[0_8px_20px_-6px_rgba(0,22,220,0.4)] transition-transform hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-2">
            Explorar o Balcão
            <i class="fa-solid fa-arrow-right text-sm ml-1"></i>
        </button>

    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-48px)] max-w-[327px] bg-white rounded-full shadow-nav px-6 py-4 flex justify-between items-center z-50 border border-gray-100/50">
        <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-deep-navy transition-colors">
            <i class="fa-solid fa-house text-xl"></i>
        </button>
        <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-deep-navy transition-colors">
            <i class="fa-solid fa-magnifying-glass text-xl"></i>
        </button>
        <!-- Active State -->
        <button class="flex flex-col items-center gap-1 text-trust-blue relative">
            <i class="fa-solid fa-heart text-xl"></i>
            <span class="absolute -bottom-3 w-1 h-1 bg-trust-blue rounded-full"></span>
        </button>
        <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-deep-navy transition-colors">
            <i class="fa-regular fa-comment-dots text-xl"></i>
        </button>
        <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-deep-navy transition-colors">
            <i class="fa-regular fa-user text-xl"></i>
        </button>
    </nav>

</div>

</body>
</html>
