<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        background: '#F8F9FA',
                        navy: '#1A1A24',
                        brand: {
                            blue: '#0016dc',
                            light: '#F0F4FF',
                            border: '#E2E8F0'
                        }
                    },
                    boxShadow: {
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                        'soft': '0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; color: #1A1A24; font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased min-h-screen flex justify-center bg-gray-100">

    <!-- Mobile Wrapper -->
    <div class="w-full max-w-[375px] min-h-[840px] bg-background relative overflow-hidden shadow-2xl flex flex-col">
        
        <!-- Global Header -->
        <header id="global_mobile_header" class="flex items-center justify-between px-5 py-4 bg-white border-b border-gray-100 z-10 sticky top-0">
            <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-50 transition-colors">
                <i class="fa-solid fa-bars text-navy text-lg"></i>
            </button>
            <h1 class="text-lg font-bold text-navy">Dashboard</h1>
            <button class="w-10 h-10 rounded-full overflow-hidden border border-gray-200">
                <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-4.jpg" alt="User Profile" class="w-full h-full object-cover">
            </button>
        </header>

        <!-- Main Content Scroll Area -->
        <main class="flex-1 overflow-y-auto pb-20">
            
            <!-- Highlight Alert Banner -->
            <section id="highlight_alert_banner" class="p-5 pt-6">
                <div class="relative bg-brand-light rounded-[16px] p-5 border border-[#DCE4FF] shadow-sm">
                    <!-- Dismiss Button -->
                    <button class="absolute top-3 right-3 w-6 h-6 flex items-center justify-center text-[#6B7280] hover:text-navy transition-colors rounded-full hover:bg-black/5">
                        <i class="fa-solid fa-xmark text-sm"></i>
                    </button>

                    <div class="flex flex-col gap-4">
                        <!-- Icon & Text Group -->
                        <div class="flex items-start gap-4 pr-6">
                            <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm flex-shrink-0 text-brand-blue">
                                <i class="fa-solid fa-sparkles text-lg"></i>
                            </div>
                            <div>
                                <h2 class="text-[16px] font-bold text-navy leading-tight mb-1">Aumente suas chances na região</h2>
                                <p class="text-[13px] text-gray-600 leading-relaxed">Complete seu portfólio com fotos recentes para receber mais orçamentos em Camboriú.</p>
                            </div>
                        </div>

                        <!-- Action Button -->
                        <div class="flex justify-end mt-1">
                            <button class="bg-brand-blue text-white text-[13px] font-semibold px-5 py-2.5 rounded-full shadow-[0_4px_12px_rgba(0,22,220,0.2)] hover:bg-blue-800 transition-all active:scale-95">
                                Atualizar Perfil
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Dashboard Context: Earnings KPI -->
            <section id="monthly_earnings_kpi" class="px-5 pb-5">
                <div class="bg-white rounded-[16px] p-5 shadow-card border border-gray-100 flex items-center justify-between">
                    <div>
                        <p class="text-[13px] font-medium text-gray-500 mb-1">Ganhos do Mês</p>
                        <h3 class="text-[24px] font-bold text-navy">R$ 4.250,00</h3>
                    </div>
                    <div class="w-12 h-12 rounded-full bg-green-50 flex items-center justify-center text-green-600">
                        <i class="fa-solid fa-arrow-trend-up text-lg"></i>
                    </div>
                </div>
            </section>

            <!-- Dashboard Overview Stats Grid -->
            <section id="dashboard_overview_stats" class="px-5 pb-6">
                <div class="grid grid-cols-2 gap-4">
                    <!-- Stat Card 1 -->
                    <div class="bg-white rounded-[16px] p-4 shadow-card border border-gray-100">
                        <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center text-blue-600 mb-3">
                            <i class="fa-solid fa-eye text-sm"></i>
                        </div>
                        <p class="text-[12px] font-medium text-gray-500 mb-0.5">Visitas ao Perfil</p>
                        <p class="text-[18px] font-bold text-navy">342</p>
                    </div>
                    
                    <!-- Stat Card 2 -->
                    <div class="bg-white rounded-[16px] p-4 shadow-card border border-gray-100">
                        <div class="w-8 h-8 rounded-full bg-purple-50 flex items-center justify-center text-purple-600 mb-3">
                            <i class="fa-solid fa-envelope-open-text text-sm"></i>
                        </div>
                        <p class="text-[12px] font-medium text-gray-500 mb-0.5">Orçamentos</p>
                        <p class="text-[18px] font-bold text-navy">18</p>
                    </div>
                </div>
            </section>

            <!-- Quick Actions List -->
            <section id="quick_actions_list" class="px-5 pb-8">
                <h3 class="text-[15px] font-bold text-navy mb-4">Ações Rápidas</h3>
                <div class="bg-white rounded-[16px] shadow-card border border-gray-100 overflow-hidden">
                    
                    <a href="#" class="flex items-center justify-between p-4 border-b border-gray-50 hover:bg-gray-50 transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-gray-600">
                                <i class="fa-solid fa-image text-sm"></i>
                            </div>
                            <span class="text-[14px] font-medium text-navy">Adicionar Fotos</span>
                        </div>
                        <i class="fa-solid fa-chevron-right text-gray-400 text-xs"></i>
                    </a>

                    <a href="#" class="flex items-center justify-between p-4 border-b border-gray-50 hover:bg-gray-50 transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-gray-600">
                                <i class="fa-solid fa-star text-sm"></i>
                            </div>
                            <span class="text-[14px] font-medium text-navy">Solicitar Avaliações</span>
                        </div>
                        <i class="fa-solid fa-chevron-right text-gray-400 text-xs"></i>
                    </a>

                    <a href="#" class="flex items-center justify-between p-4 hover:bg-gray-50 transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-gray-600">
                                <i class="fa-solid fa-wallet text-sm"></i>
                            </div>
                            <span class="text-[14px] font-medium text-navy">Sacar Ganhos</span>
                        </div>
                        <i class="fa-solid fa-chevron-right text-gray-400 text-xs"></i>
                    </a>

                </div>
            </section>

        </main>

        <!-- Bottom Navigation Bar (Mock) -->
        <nav id="bottom_nav" class="bg-white border-t border-gray-200 px-6 py-3 flex justify-between items-center absolute bottom-0 w-full z-20 pb-safe">
            <a href="#" class="flex flex-col items-center gap-1 text-brand-blue">
                <i class="fa-solid fa-house text-lg"></i>
                <span class="text-[10px] font-medium">Início</span>
            </a>
            <a href="#" class="flex flex-col items-center gap-1 text-gray-400 hover:text-navy transition-colors">
                <i class="fa-regular fa-message text-lg"></i>
                <span class="text-[10px] font-medium">Mensagens</span>
            </a>
            <a href="#" class="flex flex-col items-center gap-1 text-gray-400 hover:text-navy transition-colors">
                <i class="fa-regular fa-calendar text-lg"></i>
                <span class="text-[10px] font-medium">Agenda</span>
            </a>
            <a href="#" class="flex flex-col items-center gap-1 text-gray-400 hover:text-navy transition-colors">
                <i class="fa-regular fa-user text-lg"></i>
                <span class="text-[10px] font-medium">Perfil</span>
            </a>
        </nav>

    </div>

</body>
</html>
