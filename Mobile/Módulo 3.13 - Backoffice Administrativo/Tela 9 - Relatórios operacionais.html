<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Relatórios operacionais - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.plot.ly/plotly-3.1.1.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#0016dc',
                            light: '#F8F9FA',
                            navy: '#1A1A24',
                            gray: '#64748b',
                            soft: '#f1f5f9'
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'floating': '0 10px 30px -5px rgba(0, 22, 220, 0.15)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; color: #1A1A24; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-28 bg-brand-light min-h-[100dvh] flex justify-center">

    <!-- Main Mobile Container -->
    <div id="app-container" class="w-full max-w-[430px] bg-brand-light min-h-screen relative pb-32 flex flex-col shadow-2xl overflow-hidden sm:border-x sm:border-gray-100">

        <!-- Top Header (Glassmorphism) -->
        <header id="header" class="glass-header sticky top-0 z-50 px-6 pt-12 pb-4 flex items-center justify-between border-b border-gray-100">
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm border border-gray-50">
                <i class="fa-solid fa-shield-halved text-brand-blue text-lg"></i>
            </div>
            <h1 class="text-lg font-bold text-brand-navy tracking-tight">Relatórios</h1>
            <button class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm border border-gray-50 text-brand-navy hover:text-brand-blue transition-colors">
                <i class="fa-solid fa-arrow-down-to-bracket"></i>
            </button>
        </header>

        <!-- Main Content Scrollable Area -->
        <main class="flex-1 px-5 pt-6 pb-8 space-y-8 overflow-y-auto hide-scroll">

            <!-- Date Range Selector -->
            <section id="date-selector" class="flex justify-center">
                <button class="bg-white px-5 py-3 rounded-full shadow-soft flex items-center space-x-3 border border-gray-50 hover:bg-gray-50 transition-colors w-full max-w-[320px] justify-center">
                    <i class="fa-regular fa-calendar text-brand-blue"></i>
                    <span class="text-sm font-semibold text-brand-navy">Últimos 30 Dias (Abril 2026)</span>
                    <i class="fa-solid fa-chevron-down text-xs text-brand-gray ml-2"></i>
                </button>
            </section>

            <!-- Executive Summary Cards (Grid 2x2) -->
            <section id="executive-summary" class="space-y-4">
                <div class="flex items-center justify-between px-1">
                    <h2 class="text-sm font-bold text-brand-gray uppercase tracking-wider">Visão Geral</h2>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <!-- Card 1 -->
                    <div class="bg-white rounded-[24px] p-5 shadow-soft border border-gray-50 flex flex-col relative overflow-hidden group">
                        <div class="w-10 h-10 rounded-full bg-brand-soft flex items-center justify-center mb-3">
                            <i class="fa-solid fa-wallet text-brand-blue"></i>
                        </div>
                        <p class="text-xs font-medium text-brand-gray mb-1">Receita (R$)</p>
                        <h3 class="text-2xl font-extrabold text-brand-navy">R$ 42k</h3>
                        <div class="absolute -right-4 -bottom-4 w-16 h-16 bg-brand-blue opacity-[0.03] rounded-full group-hover:scale-150 transition-transform duration-500"></div>
                    </div>

                    <!-- Card 2 -->
                    <div class="bg-white rounded-[24px] p-5 shadow-soft border border-gray-50 flex flex-col relative overflow-hidden group">
                        <div class="w-10 h-10 rounded-full bg-brand-soft flex items-center justify-center mb-3">
                            <i class="fa-solid fa-users text-brand-blue"></i>
                        </div>
                        <p class="text-xs font-medium text-brand-gray mb-1">Novos Mestres</p>
                        <h3 class="text-2xl font-extrabold text-brand-navy">124</h3>
                        <div class="absolute -right-4 -bottom-4 w-16 h-16 bg-brand-blue opacity-[0.03] rounded-full group-hover:scale-150 transition-transform duration-500"></div>
                    </div>

                    <!-- Card 3 -->
                    <div class="bg-white rounded-[24px] p-5 shadow-soft border border-gray-50 flex flex-col relative overflow-hidden group">
                        <div class="w-10 h-10 rounded-full bg-brand-soft flex items-center justify-center mb-3">
                            <i class="fa-solid fa-bolt text-brand-blue"></i>
                        </div>
                        <p class="text-xs font-medium text-brand-gray mb-1">Leads Gerados</p>
                        <h3 class="text-2xl font-extrabold text-brand-navy">850</h3>
                        <div class="absolute -right-4 -bottom-4 w-16 h-16 bg-brand-blue opacity-[0.03] rounded-full group-hover:scale-150 transition-transform duration-500"></div>
                    </div>

                    <!-- Card 4 -->
                    <div class="bg-white rounded-[24px] p-5 shadow-soft border border-gray-50 flex flex-col relative overflow-hidden group">
                        <div class="w-10 h-10 rounded-full bg-brand-soft flex items-center justify-center mb-3">
                            <i class="fa-solid fa-ticket text-brand-blue"></i>
                        </div>
                        <p class="text-xs font-medium text-brand-gray mb-1">Ticket Médio</p>
                        <h3 class="text-2xl font-extrabold text-brand-navy">R$ 15,00</h3>
                        <div class="absolute -right-4 -bottom-4 w-16 h-16 bg-brand-blue opacity-[0.03] rounded-full group-hover:scale-150 transition-transform duration-500"></div>
                    </div>
                </div>
            </section>

            <!-- Mini-BI Charts Stack -->
            <section id="bi-charts" class="space-y-5">
                
                <!-- Chart 1: Crescimento de Receita -->
                <div class="bg-white rounded-[24px] p-5 shadow-soft border border-gray-50">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-base font-bold text-brand-navy">Crescimento de Receita</h3>
                        <button class="w-8 h-8 rounded-full bg-brand-soft flex items-center justify-center text-brand-gray hover:text-brand-blue transition-colors">
                            <i class="fa-solid fa-ellipsis"></i>
                        </button>
                    </div>
                    <div id="chart-receita" class="w-full h-[220px]"></div>
                </div>

                <!-- Chart 2: Top Categorias -->
                <div class="bg-white rounded-[24px] p-5 shadow-soft border border-gray-50">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-base font-bold text-brand-navy">Top Categorias</h3>
                        <span class="text-xs font-semibold px-2.5 py-1 bg-brand-soft text-brand-blue rounded-full">Abril</span>
                    </div>
                    <div id="chart-categorias" class="w-full h-[200px]"></div>
                </div>

            </section>

        </main>

        <!-- Pinned Primary Action -->
        <div class="absolute bottom-[90px] left-0 right-0 px-6 z-40">
            <button class="w-full bg-brand-blue text-white py-4 rounded-full font-bold text-sm shadow-floating flex items-center justify-center space-x-2 hover:bg-blue-700 transition-colors active:scale-[0.98]">
                <i class="fa-solid fa-file-pdf"></i>
                <span>Exportar Relatório (PDF)</span>
            </button>
        </div>

    <script src="../../_mobile-nav.js"></script>
</body>
</html>
