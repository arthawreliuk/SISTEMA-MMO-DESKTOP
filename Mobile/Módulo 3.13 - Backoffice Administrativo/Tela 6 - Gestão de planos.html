<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subscription Plans Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        background: '#F8F9FA',
                        primary: '#0016dc',
                        textMain: '#1A1A24',
                        textMuted: '#6B7280',
                        cardBg: '#FFFFFF',
                        success: '#A6DBA9',
                        successText: '#2D7A32',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px rgba(0, 0, 0, 0.03)',
                        'float': '0 10px 40px rgba(0, 22, 220, 0.15)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; color: #1A1A24; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.02); }
        .toggle-checkbox:checked { right: 0; border-color: #0016dc; }
        .toggle-checkbox:checked + .toggle-label { background-color: #0016dc; }
        .toggle-checkbox:checked + .toggle-label:after { transform: translateX(100%); border-color: white; }
    </style>
</head>
<body class="bg-background min-h-[100dvh] flex justify-center pb-32">

    <!-- Mobile Wrapper -->
    <main id="mobile-app-container" class="w-full max-w-[430px] min-h-[100dvh] relative bg-background shadow-2xl overflow-hidden flex flex-col">

        <!-- 1. Top Header -->
        <header id="top-header" class="glass-header sticky top-0 z-50 px-5 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white text-xs font-bold">
                    <i class="fa-solid fa-gamepad"></i>
                </div>
                <span class="font-bold text-sm text-textMain tracking-tight">Admin</span>
            </div>
            <h1 class="text-base font-bold text-textMain absolute left-1/2 -translate-x-1/2">Planos e Ofertas</h1>
            <button class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-primary hover:bg-gray-50 transition-colors">
                <i class="fa-solid fa-plus text-lg"></i>
            </button>
        </header>

        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto px-5 pt-6 pb-40 space-y-8">

            <!-- 2. KPI Strip -->
            <section id="kpi-strip" class="w-full -mx-5 px-5 overflow-x-auto flex gap-4 snap-x">
                <!-- KPI Card 1 -->
                <div class="snap-center shrink-0 w-[200px] bg-cardBg rounded-[20px] p-5 shadow-soft border border-gray-100 flex flex-col gap-2">
                    <div class="flex items-center gap-2 text-textMuted text-xs font-semibold uppercase tracking-wider">
                        <i class="fa-solid fa-chart-line text-primary"></i>
                        <span>MRR Atual</span>
                    </div>
                    <div class="text-2xl font-extrabold text-textMain tracking-tight">
                        R$ 85k
                    </div>
                    <div class="flex items-center gap-1 text-[10px] font-bold text-successText bg-success/20 px-2 py-1 rounded-full w-fit mt-1">
                        <i class="fa-solid fa-arrow-trend-up"></i>
                        <span>+12.5%</span>
                    </div>
                </div>

                <!-- KPI Card 2 -->
                <div class="snap-center shrink-0 w-[200px] bg-cardBg rounded-[20px] p-5 shadow-soft border border-gray-100 flex flex-col gap-2">
                    <div class="flex items-center gap-2 text-textMuted text-xs font-semibold uppercase tracking-wider">
                        <i class="fa-solid fa-users text-primary"></i>
                        <span>Assinantes</span>
                    </div>
                    <div class="text-2xl font-extrabold text-textMain tracking-tight">
                        1.200
                    </div>
                    <div class="flex items-center gap-1 text-[10px] font-bold text-successText bg-success/20 px-2 py-1 rounded-full w-fit mt-1">
                        <i class="fa-solid fa-arrow-trend-up"></i>
                        <span>+42 hj</span>
                    </div>
                </div>
            </section>

            <!-- 3. Plan Cards List -->
            <section id="plan-list" class="space-y-4">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-lg font-bold text-textMain">Planos Ativos</h2>
                    <span class="text-xs font-semibold text-primary bg-primary/10 px-3 py-1 rounded-full">3 Planos</span>
                </div>

                <!-- Card 1: Plano Mestre -->
                <div id="plan-card-1" class="bg-cardBg rounded-[24px] p-6 shadow-soft border border-gray-100 flex flex-col gap-5 relative overflow-hidden">
                    <!-- Accent Line -->
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-blue-400"></div>

                    <!-- Header -->
                    <div class="flex items-center justify-between">
                        <h3 class="text-xl font-extrabold text-textMain tracking-tight">Plano Mestre</h3>
                        <span class="bg-success/20 text-successText text-[10px] font-bold px-3 py-1.5 rounded-full uppercase tracking-wider flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-successText"></span>
                            Ativo
                        </span>
                    </div>

                    <!-- Middle: Price & Stats -->
                    <div class="space-y-1">
                        <div class="relative">
                            <input type="text" value="R$ 49,90" class="w-full text-3xl font-black text-textMain bg-transparent border-none p-0 focus:ring-0 outline-none" readonly>
                            <span class="text-sm font-semibold text-textMuted absolute right-0 bottom-2">/ mês</span>
                        </div>
                        <p class="text-sm font-medium text-textMuted flex items-center gap-2 mt-2">
                            <i class="fa-solid fa-user-check text-primary/70"></i>
                            850 assinantes ativos
                        </p>
                    </div>

                    <hr class="border-gray-100">

                    <!-- Actions -->
                    <div class="flex items-center justify-between pt-1">
                        <!-- Toggle -->
                        <div class="flex items-center gap-3">
                            <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                                <input type="checkbox" name="toggle" id="toggle1" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 transition-transform duration-300 ease-in-out border-gray-300" checked/>
                                <label for="toggle1" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer transition-colors duration-300 ease-in-out"></label>
                            </div>
                            <span class="text-xs font-bold text-textMuted">Pausar</span>
                        </div>

                        <!-- Edit Button -->
                        <button class="px-5 py-2.5 rounded-full border-2 border-gray-100 text-textMain text-sm font-bold hover:bg-gray-50 hover:border-gray-200 transition-all flex items-center gap-2">
                            <i class="fa-solid fa-pen-to-square text-primary"></i>
                            Editar Recursos
                        </button>
                    </div>
                </div>

                <!-- Card 2: Plano Básico -->
                <div id="plan-card-2" class="bg-cardBg rounded-[24px] p-6 shadow-soft border border-gray-100 flex flex-col gap-5 relative overflow-hidden opacity-90">
                    <div class="flex items-center justify-between">
                        <h3 class="text-xl font-extrabold text-textMain tracking-tight">Plano Básico</h3>
                        <span class="bg-success/20 text-successText text-[10px] font-bold px-3 py-1.5 rounded-full uppercase tracking-wider flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-successText"></span>
                            Ativo
                        </span>
                    </div>

                    <div class="space-y-1">
                        <div class="relative">
                            <input type="text" value="R$ 19,90" class="w-full text-3xl font-black text-textMain bg-transparent border-none p-0 focus:ring-0 outline-none" readonly>
                            <span class="text-sm font-semibold text-textMuted absolute right-0 bottom-2">/ mês</span>
                        </div>
                        <p class="text-sm font-medium text-textMuted flex items-center gap-2 mt-2">
                            <i class="fa-solid fa-user-check text-primary/70"></i>
                            350 assinantes ativos
                        </p>
                    </div>

                    <hr class="border-gray-100">

                    <div class="flex items-center justify-between pt-1">
                        <div class="flex items-center gap-3">
                            <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                                <input type="checkbox" name="toggle" id="toggle2" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 transition-transform duration-300 ease-in-out border-gray-300" checked/>
                                <label for="toggle2" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer transition-colors duration-300 ease-in-out"></label>
                            </div>
                            <span class="text-xs font-bold text-textMuted">Pausar</span>
                        </div>
                        <button class="px-5 py-2.5 rounded-full border-2 border-gray-100 text-textMain text-sm font-bold hover:bg-gray-50 hover:border-gray-200 transition-all flex items-center gap-2">
                            <i class="fa-solid fa-pen-to-square text-primary"></i>
                            Editar
                        </button>
                    </div>
                </div>
            </section>

        </div>

        <!-- 4. Primary Action (Pinned Bottom) -->
        <div id="primary-action-container" class="absolute bottom-[100px] left-0 w-full px-5 z-40">
            <button class="w-full bg-primary text-white font-bold text-base py-4 rounded-full shadow-float flex items-center justify-center gap-3 active:scale-[0.98] transition-transform">
                <i class="fa-solid fa-plus-circle text-xl"></i>
                Criar Nova Oferta
            </button>
        </div>

        <!-- 5. Floating Pill Navigation -->
        <nav id="bottom-nav" class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-[380px] bg-white rounded-full shadow-[0_8px_30px_rgba(0,0,0,0.08)] border border-gray-50 px-6 py-4 flex items-center justify-between z-50">
            
            <a href="#" class="flex flex-col items-center gap-1 text-textMuted hover:text-primary transition-colors">
                <i class="fa-solid fa-chart-pie text-xl"></i>
            </a>

            <a href="#" class="flex flex-col items-center gap-1 text-primary relative">
                <i class="fa-solid fa-layer-group text-xl"></i>
                <div class="absolute -bottom-2.5 w-1.5 h-1.5 rounded-full bg-primary"></div>
            </a>

            <a href="#" class="flex flex-col items-center gap-1 text-textMuted hover:text-primary transition-colors">
                <i class="fa-solid fa-wallet text-xl"></i>
            </a>

            <a href="#" class="flex flex-col items-center gap-1 text-textMuted hover:text-primary transition-colors">
                <i class="fa-solid fa-gear text-xl"></i>
            </a>

        </nav>

    </main>

    <script>
        // Simple toggle logic for visual feedback
        document.querySelectorAll('.toggle-checkbox').forEach(toggle => {
            toggle.addEventListener('change', function() {
                const label = this.closest('div').nextElementSibling;
                if(this.checked) {
                    label.textContent = 'Pausar';
                    this.parentElement.parentElement.parentElement.parentElement.querySelector('.bg-success\\/20').classList.replace('bg-gray-100', 'bg-success/20');
                    this.parentElement.parentElement.parentElement.parentElement.querySelector('.text-successText').classList.replace('text-gray-500', 'text-successText');
                    this.parentElement.parentElement.parentElement.parentElement.querySelector('.bg-successText').classList.replace('bg-gray-500', 'bg-successText');
                    this.parentElement.parentElement.parentElement.parentElement.querySelector('.text-successText').innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-successText"></span> Ativo';
                } else {
                    label.textContent = 'Ativar';
                    this.parentElement.parentElement.parentElement.parentElement.querySelector('.bg-success\\/20').classList.replace('bg-success/20', 'bg-gray-100');
                    this.parentElement.parentElement.parentElement.parentElement.querySelector('.text-successText').classList.replace('text-successText', 'text-gray-500');
                    this.parentElement.parentElement.parentElement.parentElement.querySelector('.bg-successText').classList.replace('bg-successText', 'bg-gray-500');
                    this.parentElement.parentElement.parentElement.parentElement.querySelector('.text-gray-500').innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-gray-500"></span> Pausado';
                }
            });
        });
    </script>
</body>
</html>
