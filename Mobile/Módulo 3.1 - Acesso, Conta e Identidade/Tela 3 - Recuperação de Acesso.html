<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Recuperação de Acesso - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body { -webkit-tap-highlight-color: transparent; }
        input:focus { outline: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen bg-[#F8F9FA] flex flex-col" style="max-width:390px;margin:0 auto;">

    <div class="flex-1 overflow-y-auto no-scrollbar px-5 py-8 flex flex-col">

        <!-- Back button -->
        <div class="mb-6">
            <button
                onclick="window.location.href='Tela 2 - Login.html'"
                class="w-10 h-10 rounded-xl border border-gray-200 bg-white shadow-sm flex items-center justify-center text-[#1A1A24] active:scale-95 transition-all"
            >
                <i class="fa-solid fa-arrow-left text-sm"></i>
            </button>
        </div>

        <!-- Icon hero -->
        <div class="flex flex-col items-center text-center mb-8 mt-4">
            <div class="w-20 h-20 bg-[#0016dc]/10 rounded-2xl flex items-center justify-center mb-5">
                <i class="fa-solid fa-envelope-open-text text-3xl text-[#0016dc]"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-[#1A1A24] mb-2">Recuperar acesso</h1>
            <p class="text-sm text-[#6B7280] leading-relaxed max-w-[260px]">
                Informe seu e-mail para receber as instruções de recuperação
            </p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-5">

            <!-- E-mail -->
            <div class="relative mb-5">
                <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-[#6B7280] text-sm pointer-events-none"></i>
                <input
                    type="email"
                    placeholder="Seu e-mail cadastrado"
                    class="h-12 pl-10 pr-4 bg-gray-50 rounded-xl border border-gray-100 text-sm w-full outline-none focus:ring-2 focus:ring-blue-100 focus:border-[#0016dc]/30 text-[#1A1A24] placeholder-[#6B7280]"
                >
            </div>

            <!-- Info tip -->
            <div class="flex items-start gap-3 bg-blue-50 rounded-xl p-3 mb-5">
                <i class="fa-solid fa-circle-info text-[#0016dc] text-sm mt-0.5 shrink-0"></i>
                <p class="text-xs text-[#1A1A24]/70 leading-relaxed">
                    Você receberá um e-mail com um link para redefinir sua senha. Verifique também sua caixa de spam.
                </p>
            </div>

            <!-- Botão -->
            <button
                onclick="window.location.href='Tela 4 - Validação de E-mail_Telefone.html'"
                class="w-full h-12 bg-[#0016dc] text-white font-bold rounded-full text-sm shadow-md shadow-[#0016dc]/20 active:scale-95 transition-all"
            >
                <i class="fa-solid fa-paper-plane mr-2"></i>
                Enviar instruções
            </button>

        </div>

        <!-- Rodapé -->
        <p class="text-center text-sm text-[#6B7280]">
            Lembrou a senha?
            <a href="Tela 2 - Login.html" class="text-[#0016dc] font-bold ml-1">Voltar ao login</a>
        </p>

    </div>

    <script src="../../_mobile-nav.js"></script>
</body>
</html>
