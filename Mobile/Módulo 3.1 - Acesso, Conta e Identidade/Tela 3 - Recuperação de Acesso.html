<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Recovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        background: '#F8F9FA',
                        primary: '#0016dc',
                        textDark: '#1A1A24',
                        textMuted: '#6B7280',
                    },
                    boxShadow: {
                        'soft-ambient': '0 10px 40px -10px rgba(0, 22, 220, 0.08)',
                        'input-inset': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.02)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; font-family: 'Plus Jakarta Sans', sans-serif; color: #1A1A24; }
        ::-webkit-scrollbar { display: none; }
        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="antialiased min-h-[100dvh] flex justify-center bg-background">

    <!-- Mobile Wrapper -->
    <div id="app-wrapper" class="w-full max-w-[375px] h-[100dvh] relative flex flex-col overflow-hidden bg-background shadow-2xl md:shadow-none md:border-x border-gray-100">
        
        <!-- Top Header -->
        <header id="top-header" class="glass-header w-full h-[60px] px-6 flex items-center justify-between z-50 fixed top-0 max-w-[375px]">
            <button class="w-10 h-10 flex items-center justify-start text-primary transition-transform active:scale-95" aria-label="Voltar">
                <i class="fa-solid fa-arrow-left text-xl"></i>
            </button>
            <div class="flex-1"></div> <!-- Spacer for absolute center if needed, but per brief just left arrow -->
        </header>

        <!-- Main Content Scroll Area -->
        <main id="main-content" class="flex-1 flex flex-col px-6 pt-[100px] pb-8 overflow-y-auto">
            
            <!-- Hero Section -->
            <section id="hero-section" class="mb-10 animate-fade-in-up">
                <div class="w-14 h-14 rounded-2xl bg-primary/10 flex items-center justify-center mb-6 text-primary shadow-soft-ambient">
                    <i class="fa-solid fa-shield-halved text-2xl"></i>
                </div>
                <h1 class="text-[28px] font-extrabold text-textDark leading-tight mb-3 tracking-tight">
                    Recuperar Acesso
                </h1>
                <p class="text-[16px] text-textMuted font-medium leading-relaxed max-w-[280px]">
                    Enviaremos um link seguro para você redefinir sua senha rapidamente.
                </p>
            </section>

            <!-- The Form -->
            <section id="form-section" class="flex-1">
                <form class="space-y-6">
                    <div class="relative group">
                        <label for="email" class="absolute left-5 -top-2.5 bg-white px-2 text-xs font-bold text-primary tracking-wide z-10 rounded-full shadow-sm">
                            E-mail cadastrado
                        </label>
                        <div class="relative flex items-center">
                            <div class="absolute left-5 text-gray-400 group-focus-within:text-primary transition-colors">
                                <i class="fa-regular fa-envelope"></i>
                            </div>
                            <input 
                                type="email" 
                                id="email" 
                                placeholder="exemplo@email.com" 
                                class="w-full h-[64px] bg-white rounded-[16px] pl-12 pr-5 text-[16px] text-textDark font-medium placeholder-gray-300 outline-none focus:ring-2 focus:ring-primary/20 shadow-input-inset transition-all"
                                required
                            >
                        </div>
                    </div>
                </form>
            </section>

        </main>

        <!-- Bottom Actions (Fixed above keyboard area) -->
        <footer id="footer-actions" class="px-6 pb-8 pt-4 bg-gradient-to-t from-background via-background to-transparent z-40">
            <button class="w-full h-[60px] bg-primary text-white rounded-full text-[16px] font-bold tracking-wide shadow-soft-ambient hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mb-6">
                <span>Enviar Link de Recuperação</span>
                <i class="fa-solid fa-arrow-right text-sm"></i>
            </button>
            
            <div class="text-center">
                <a href="#" class="text-[14px] font-semibold text-textDark hover:text-primary transition-colors inline-flex items-center gap-1.5">
                    Lembrou a senha? Voltar para o Login
                </a>
            </div>
        </footer>

    </div>

    <!-- Simple fade in animation -->
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
    </style>
</body>
</html>
