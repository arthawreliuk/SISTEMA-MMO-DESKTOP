<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Login - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body { -webkit-tap-highlight-color: transparent; }
        input:focus { outline: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen bg-[#F8F9FA] flex flex-col" style="max-width:390px;margin:0 auto;">

    <div class="flex-1 overflow-y-auto no-scrollbar px-5 py-10 flex flex-col">

        <!-- Logo -->
        <div class="flex items-center gap-2 justify-center mb-8">
            <div class="w-10 h-10 bg-[#0016dc] rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-[#0016dc]/30">M</div>
            <span class="font-extrabold text-xl text-[#1A1A24] tracking-tight">MMO Platform</span>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-5">

            <!-- Heading -->
            <div class="mb-6">
                <h1 class="text-2xl font-extrabold text-[#1A1A24] mb-1">Bem-vindo de volta</h1>
                <p class="text-sm text-[#6B7280]">Entre na sua conta</p>
            </div>

            <!-- Fields -->
            <div class="flex flex-col gap-4">

                <!-- E-mail -->
                <div class="relative">
                    <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-[#6B7280] text-sm pointer-events-none"></i>
                    <input
                        type="email"
                        placeholder="E-mail"
                        class="h-12 pl-10 pr-4 bg-gray-50 rounded-xl border border-gray-100 text-sm w-full outline-none focus:ring-2 focus:ring-blue-100 focus:border-[#0016dc]/30 text-[#1A1A24] placeholder-[#6B7280]"
                    >
                </div>

                <!-- Senha -->
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-[#6B7280] text-sm pointer-events-none"></i>
                    <input
                        type="password"
                        id="senhaLogin"
                        placeholder="Senha"
                        class="h-12 pl-10 pr-11 bg-gray-50 rounded-xl border border-gray-100 text-sm w-full outline-none focus:ring-2 focus:ring-blue-100 focus:border-[#0016dc]/30 text-[#1A1A24] placeholder-[#6B7280]"
                    >
                    <button type="button" onclick="togglePwd('senhaLogin','eyeLogin')" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#6B7280] text-sm">
                        <i id="eyeLogin" class="fa-regular fa-eye"></i>
                    </button>
                </div>

                <!-- Esqueci -->
                <div class="flex justify-end -mt-1">
                    <a href="Tela 3 - Recuperação de Acesso.html" class="text-xs font-semibold text-[#0016dc]">Esqueci minha senha</a>
                </div>

            </div>

            <!-- Botão entrar -->
            <button
                onclick="window.location.href='Tela 6 - Painel Inicial Pós-Login.html'"
                class="w-full h-12 bg-[#0016dc] text-white font-bold rounded-full text-sm shadow-md shadow-[#0016dc]/20 active:scale-95 transition-all mt-6"
            >
                Entrar
            </button>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-5">
                <div class="flex-1 h-px bg-gray-100"></div>
                <span class="text-xs text-[#6B7280] font-medium">ou</span>
                <div class="flex-1 h-px bg-gray-100"></div>
            </div>

            <!-- Social buttons -->
            <div class="flex flex-col gap-3">
                <button class="w-full h-12 border border-gray-200 bg-white rounded-xl flex items-center justify-center gap-3 text-sm font-semibold text-[#1A1A24] active:scale-95 transition-all shadow-sm">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" class="w-5 h-5">
                    Continuar com Google
                </button>
                <button class="w-full h-12 border border-gray-200 bg-white rounded-xl flex items-center justify-center gap-3 text-sm font-semibold text-[#1A1A24] active:scale-95 transition-all shadow-sm">
                    <i class="fa-brands fa-apple text-xl text-[#1A1A24]"></i>
                    Continuar com Apple
                </button>
            </div>

        </div>

        <!-- Trust badges -->
        <div class="flex items-center justify-center gap-3 mb-5">
            <span class="text-xs text-[#6B7280] flex items-center gap-1">
                <i class="fa-solid fa-shield-halved text-green-500 text-xs"></i>
                100% Seguro
            </span>
            <span class="text-[#6B7280] text-xs">·</span>
            <span class="text-xs text-[#6B7280] flex items-center gap-1">
                <i class="fa-solid fa-users text-[#0016dc] text-xs"></i>
                +50k Profissionais
            </span>
            <span class="text-[#6B7280] text-xs">·</span>
            <span class="text-xs text-[#6B7280] flex items-center gap-1">
                <i class="fa-solid fa-circle-check text-[#0016dc] text-xs"></i>
                Verificados
            </span>
        </div>

        <!-- Rodapé -->
        <p class="text-center text-sm text-[#6B7280]">
            Não tem conta?
            <a href="Tela 1 - Cadastro de conta.html" class="text-[#0016dc] font-bold ml-1">Criar conta</a>
        </p>

    </div>

    <script>
        function togglePwd(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>

    <script src="../../_mobile-nav.js"></script>
</body>
</html>
