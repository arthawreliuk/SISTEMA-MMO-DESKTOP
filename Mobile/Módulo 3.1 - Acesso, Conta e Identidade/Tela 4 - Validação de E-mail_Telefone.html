<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Validação de E-mail_Telefone - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body { -webkit-tap-highlight-color: transparent; }
        .otp-input { text-align: center; caret-color: #0016dc; }
        .otp-input:focus { outline: none; border-color: #0016dc; box-shadow: 0 0 0 3px rgba(0,22,220,0.12); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen bg-[#F8F9FA] flex flex-col" style="max-width:390px;margin:0 auto;">

    <div class="flex-1 overflow-y-auto no-scrollbar px-5 py-8 flex flex-col">

        <!-- Back button -->
        <div class="mb-6">
            <button
                onclick="window.location.href='Tela 3 - Recuperação de Acesso.html'"
                class="w-10 h-10 rounded-xl border border-gray-200 bg-white shadow-sm flex items-center justify-center text-[#1A1A24] active:scale-95 transition-all"
            >
                <i class="fa-solid fa-arrow-left text-sm"></i>
            </button>
        </div>

        <!-- Icon hero -->
        <div class="flex flex-col items-center text-center mb-8 mt-4">
            <div class="w-20 h-20 bg-[#0016dc] rounded-2xl flex items-center justify-center mb-5 shadow-lg shadow-[#0016dc]/25">
                <i class="fa-solid fa-shield-halved text-3xl text-white"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-[#1A1A24] mb-2">Verifique seu e-mail</h1>
            <p class="text-sm text-[#6B7280] leading-relaxed max-w-[270px]">
                Enviamos um código de 6 dígitos para
                <span class="font-semibold text-[#1A1A24]">seu@email.com</span>
            </p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-5">

            <!-- OTP inputs -->
            <div class="flex justify-between gap-2 mb-6" id="otpGroup">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"
                    class="otp-input w-12 h-14 bg-gray-50 border-2 border-gray-100 rounded-xl text-xl font-bold text-[#1A1A24] transition-all">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"
                    class="otp-input w-12 h-14 bg-gray-50 border-2 border-gray-100 rounded-xl text-xl font-bold text-[#1A1A24] transition-all">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"
                    class="otp-input w-12 h-14 bg-gray-50 border-2 border-gray-100 rounded-xl text-xl font-bold text-[#1A1A24] transition-all">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"
                    class="otp-input w-12 h-14 bg-gray-50 border-2 border-gray-100 rounded-xl text-xl font-bold text-[#1A1A24] transition-all">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"
                    class="otp-input w-12 h-14 bg-gray-50 border-2 border-gray-100 rounded-xl text-xl font-bold text-[#1A1A24] transition-all">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"
                    class="otp-input w-12 h-14 bg-gray-50 border-2 border-gray-100 rounded-xl text-xl font-bold text-[#1A1A24] transition-all">
            </div>

            <!-- Confirmar -->
            <button
                onclick="window.location.href='Tela 5 - Seleção_Alternância de Contexto.html'"
                class="w-full h-12 bg-[#0016dc] text-white font-bold rounded-full text-sm shadow-md shadow-[#0016dc]/20 active:scale-95 transition-all mb-4"
            >
                <i class="fa-solid fa-check mr-2"></i>
                Confirmar código
            </button>

            <!-- Reenviar -->
            <div class="text-center">
                <p class="text-sm text-[#6B7280]">
                    Não recebeu?
                    <button id="resendBtn" class="text-[#6B7280] font-semibold ml-1 cursor-default" disabled>
                        Reenviar em <span id="countdown">30</span>s
                    </button>
                </p>
            </div>

        </div>

        <!-- Nota spam -->
        <div class="flex items-center justify-center gap-2">
            <i class="fa-regular fa-circle-question text-[#6B7280] text-xs"></i>
            <p class="text-xs text-[#6B7280]">Verifique sua caixa de spam</p>
        </div>

    </div>

    <script>
        // OTP auto-advance
        const inputs = document.querySelectorAll('#otpGroup input');
        inputs.forEach((input, i) => {
            input.addEventListener('input', () => {
                if (input.value.length === 1 && i < inputs.length - 1) {
                    inputs[i + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && i > 0) {
                    inputs[i - 1].focus();
                }
            });
        });

        // Countdown resend
        let seconds = 30;
        const countdownEl = document.getElementById('countdown');
        const resendBtn = document.getElementById('resendBtn');
        const timer = setInterval(() => {
            seconds--;
            countdownEl.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(timer);
                resendBtn.disabled = false;
                resendBtn.innerHTML = 'Reenviar código';
                resendBtn.classList.remove('cursor-default');
                resendBtn.classList.add('text-[#0016dc]', 'cursor-pointer');
            }
        }, 1000);
    </script>

    <script src="../../_mobile-nav.js"></script>
</body>
</html>
