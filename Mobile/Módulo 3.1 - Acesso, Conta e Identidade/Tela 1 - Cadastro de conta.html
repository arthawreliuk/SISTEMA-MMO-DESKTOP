<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Cadastro de conta - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body { -webkit-tap-highlight-color: transparent; }
        input:focus { outline: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen bg-[#F8F9FA] flex flex-col" style="max-width:390px;margin:0 auto;">

    <div class="flex-1 overflow-y-auto no-scrollbar px-5 py-10 flex flex-col">

        <!-- Logo -->
        <div class="flex items-center gap-2 justify-center mb-8">
            <div class="w-10 h-10 bg-[#0016dc] rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-[#0016dc]/30">M</div>
            <span class="font-extrabold text-xl text-[#1A1A24] tracking-tight">MMO Platform</span>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-5">

            <!-- Heading -->
            <div class="mb-6">
                <h1 class="text-2xl font-extrabold text-[#1A1A24] mb-1">Criar conta</h1>
                <p class="text-sm text-[#6B7280]">Junte-se à plataforma</p>
            </div>

            <!-- Fields -->
            <div class="flex flex-col gap-4">

                <!-- Nome completo -->
                <div class="relative">
                    <i class="fa-regular fa-user absolute left-4 top-1/2 -translate-y-1/2 text-[#6B7280] text-sm pointer-events-none"></i>
                    <input
                        type="text"
                        placeholder="Nome completo"
                        class="h-12 pl-10 pr-4 bg-gray-50 rounded-xl border border-gray-100 text-sm w-full outline-none focus:ring-2 focus:ring-blue-100 focus:border-[#0016dc]/30 text-[#1A1A24] placeholder-[#6B7280]"
                    >
                </div>

                <!-- E-mail -->
                <div class="relative">
                    <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-[#6B7280] text-sm pointer-events-none"></i>
                    <input
                        type="email"
                        placeholder="E-mail"
                        class="h-12 pl-10 pr-4 bg-gray-50 rounded-xl border border-gray-100 text-sm w-full outline-none focus:ring-2 focus:ring-blue-100 focus:border-[#0016dc]/30 text-[#1A1A24] placeholder-[#6B7280]"
                    >
                </div>

                <!-- Senha -->
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-[#6B7280] text-sm pointer-events-none"></i>
                    <input
                        type="password"
                        id="senha1"
                        placeholder="Senha"
                        class="h-12 pl-10 pr-11 bg-gray-50 rounded-xl border border-gray-100 text-sm w-full outline-none focus:ring-2 focus:ring-blue-100 focus:border-[#0016dc]/30 text-[#1A1A24] placeholder-[#6B7280]"
                    >
                    <button type="button" onclick="togglePwd('senha1','eye1')" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#6B7280] text-sm">
                        <i id="eye1" class="fa-regular fa-eye"></i>
                    </button>
                </div>

                <!-- Confirmar senha -->
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-[#6B7280] text-sm pointer-events-none"></i>
                    <input
                        type="password"
                        id="senha2"
                        placeholder="Confirmar senha"
                        class="h-12 pl-10 pr-11 bg-gray-50 rounded-xl border border-gray-100 text-sm w-full outline-none focus:ring-2 focus:ring-blue-100 focus:border-[#0016dc]/30 text-[#1A1A24] placeholder-[#6B7280]"
                    >
                    <button type="button" onclick="togglePwd('senha2','eye2')" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#6B7280] text-sm">
                        <i id="eye2" class="fa-regular fa-eye"></i>
                    </button>
                </div>

                <!-- Checkbox termos -->
                <label class="flex items-start gap-3 cursor-pointer mt-1">
                    <div class="relative mt-0.5">
                        <input type="checkbox" class="sr-only peer" id="termos">
                        <div class="w-5 h-5 rounded-md border-2 border-gray-200 bg-gray-50 peer-checked:bg-[#0016dc] peer-checked:border-[#0016dc] transition-all flex items-center justify-center">
                            <i class="fa-solid fa-check text-white text-[10px] hidden peer-checked:block"></i>
                        </div>
                    </div>
                    <span class="text-xs text-[#6B7280] leading-relaxed">
                        Aceito os <a href="#" class="text-[#0016dc] font-semibold">Termos de Uso</a> e a <a href="#" class="text-[#0016dc] font-semibold">Política de Privacidade</a>
                    </span>
                </label>

            </div>

            <!-- Botão principal -->
            <button
                onclick="window.location.href='Tela 5 - Seleção_Alternância de Contexto.html'"
                class="w-full h-12 bg-[#0016dc] text-white font-bold rounded-full text-sm shadow-md shadow-[#0016dc]/20 active:scale-95 transition-all mt-6"
            >
                Criar conta gratuita
            </button>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-5">
                <div class="flex-1 h-px bg-gray-100"></div>
                <span class="text-xs text-[#6B7280] font-medium">ou continue com</span>
                <div class="flex-1 h-px bg-gray-100"></div>
            </div>

            <!-- Social buttons -->
            <div class="flex flex-col gap-3">
                <button class="w-full h-12 border border-gray-200 bg-white rounded-xl flex items-center justify-center gap-3 text-sm font-semibold text-[#1A1A24] active:scale-95 transition-all shadow-sm">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" class="w-5 h-5">
                    Continuar com Google
                </button>
                <button class="w-full h-12 border border-gray-200 bg-white rounded-xl flex items-center justify-center gap-3 text-sm font-semibold text-[#1A1A24] active:scale-95 transition-all shadow-sm">
                    <i class="fa-brands fa-apple text-xl text-[#1A1A24]"></i>
                    Continuar com Apple
                </button>
            </div>

        </div>

        <!-- Rodapé -->
        <p class="text-center text-sm text-[#6B7280]">
            Já tem conta?
            <a href="Tela 2 - Login.html" class="text-[#0016dc] font-bold ml-1">Entrar</a>
        </p>

    </div>

    <script>
        function togglePwd(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
        // Checkbox visual
        document.getElementById('termos').addEventListener('change', function() {
            const checkmark = this.nextElementSibling.querySelector('i');
            if (this.checked) checkmark.classList.remove('hidden');
            else checkmark.classList.add('hidden');
        });
    </script>

    <script src="../../_mobile-nav.js"></script>
</body>
</html>
