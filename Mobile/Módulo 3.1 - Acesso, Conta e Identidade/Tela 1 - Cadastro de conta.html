<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign Up / Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0016dc',
                        textDark: '#1A1A24',
                        textGray: '#6B7280',
                        borderLight: '#E5E7EB',
                        inputBg: '#F9FAFB',
                    },
                    boxShadow: {
                        'ambient': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'inner-soft': 'inset 0 2px 4px 0 rgba(0,0,0,0.02)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FFFFFF;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1A1A24;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Focus state overrides */
        input:focus {
            outline: none;
            border-color: #0016dc;
            box-shadow: 0 0 0 4px rgba(0, 22, 220, 0.1);
        }
    </style>
</head>
<body class="min-h-[100dvh] flex flex-col items-center justify-center bg-[#F8F9FA] sm:py-8">

    <!-- Mobile Container (375x840 constraint logic applied visually) -->
    <main id="auth-container" class="w-full max-w-[375px] h-full min-h-[100dvh] sm:min-h-[840px] bg-white sm:rounded-[24px] sm:shadow-ambient flex flex-col relative overflow-hidden">
        
        <!-- Top Branding -->
        <header id="top-branding" class="pt-12 pb-6 px-6 flex justify-center items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center text-white font-bold text-xl">
                    M
                </div>
                <span class="font-bold text-xl tracking-tight text-textDark">MMO</span>
            </div>
        </header>

        <!-- Scrollable Content Area -->
        <div class="flex-1 overflow-y-auto px-6 pb-8 flex flex-col no-scrollbar">
            
            <!-- Hero Section -->
            <section id="hero-section" class="text-center mb-8">
                <h1 class="text-[28px] font-extrabold leading-tight mb-2 text-textDark tracking-tight">Crie sua conta</h1>
                <p class="text-[16px] text-textGray font-medium">O ecossistema definitivo para serviços.</p>
            </section>

            <!-- Social Login -->
            <section id="social-login" class="flex flex-col gap-3 mb-8">
                <button class="w-full h-[52px] bg-white border border-borderLight rounded-full flex items-center justify-center gap-3 hover:bg-gray-50 transition-colors shadow-sm">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" class="w-5 h-5">
                    <span class="font-semibold text-[15px] text-textDark">Continuar com Google</span>
                </button>
                <button class="w-full h-[52px] bg-white border border-borderLight rounded-full flex items-center justify-center gap-3 hover:bg-gray-50 transition-colors shadow-sm">
                    <i class="fa-brands fa-apple text-[22px] text-textDark mb-[2px]"></i>
                    <span class="font-semibold text-[15px] text-textDark">Continuar com Apple</span>
                </button>
            </section>

            <!-- Divider -->
            <div class="flex items-center mb-8">
                <div class="flex-1 h-[1px] bg-borderLight"></div>
                <span class="px-4 text-[13px] font-medium text-textGray bg-white">ou use seu e-mail</span>
                <div class="flex-1 h-[1px] bg-borderLight"></div>
            </div>

            <!-- The Form -->
            <section id="auth-form" class="flex flex-col gap-4 mb-8">
                
                <!-- Input: Nome Completo -->
                <div class="relative group">
                    <input type="text" id="name" placeholder=" " class="w-full h-[56px] bg-inputBg border border-borderLight rounded-2xl px-4 pt-5 pb-1 text-[15px] font-medium text-textDark shadow-inner-soft transition-all peer">
                    <label for="name" class="absolute left-4 top-4 text-[15px] text-textGray transition-all peer-focus:text-[11px] peer-focus:top-2 peer-focus:text-primary peer-[:not(:placeholder-shown)]:text-[11px] peer-[:not(:placeholder-shown)]:top-2 font-medium pointer-events-none">Nome Completo</label>
                </div>

                <!-- Input: E-mail -->
                <div class="relative group">
                    <input type="email" id="email" placeholder=" " class="w-full h-[56px] bg-inputBg border border-borderLight rounded-2xl px-4 pt-5 pb-1 text-[15px] font-medium text-textDark shadow-inner-soft transition-all peer">
                    <label for="email" class="absolute left-4 top-4 text-[15px] text-textGray transition-all peer-focus:text-[11px] peer-focus:top-2 peer-focus:text-primary peer-[:not(:placeholder-shown)]:text-[11px] peer-[:not(:placeholder-shown)]:top-2 font-medium pointer-events-none">E-mail</label>
                </div>

                <!-- Input: Senha -->
                <div class="relative group">
                    <input type="password" id="password" placeholder=" " class="w-full h-[56px] bg-inputBg border border-borderLight rounded-2xl px-4 pt-5 pb-1 pr-12 text-[15px] font-medium text-textDark shadow-inner-soft transition-all peer">
                    <label for="password" class="absolute left-4 top-4 text-[15px] text-textGray transition-all peer-focus:text-[11px] peer-focus:top-2 peer-focus:text-primary peer-[:not(:placeholder-shown)]:text-[11px] peer-[:not(:placeholder-shown)]:top-2 font-medium pointer-events-none">Senha</label>
                    <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-textGray hover:text-textDark transition-colors">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>

                <!-- Forgot Password Link -->
                <div class="flex justify-end mt-1">
                    <a href="#" class="text-[14px] font-semibold text-primary hover:underline">Esqueci minha senha</a>
                </div>
            </section>

            <!-- Primary Action -->
            <section id="primary-action" class="mt-auto mb-6">
                <button class="w-full h-[56px] bg-primary text-white rounded-full font-bold text-[16px] shadow-[0_8px_20px_-6px_rgba(0,22,220,0.4)] hover:bg-blue-700 transition-all active:scale-[0.98]">
                    Criar Conta
                </button>
            </section>

            <!-- Footer Switch -->
            <footer id="footer-switch" class="text-center pb-4">
                <p class="text-[15px] font-medium text-textDark">
                    Já possui conta? <a href="#" class="font-bold text-primary hover:underline ml-1">Entrar</a>
                </p>
            </footer>

        </div>
    </main>

</body>
</html>
