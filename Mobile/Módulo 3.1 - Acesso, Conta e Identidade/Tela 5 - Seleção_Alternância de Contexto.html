<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Seleção_Alternância de Contexto - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body { -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .ctx-card { border: 2px solid transparent; transition: all 0.18s ease; }
        .ctx-card.selected { border-color: #0016dc; background-color: #F0F3FF; }
        .ctx-card.selected .ctx-icon { background-color: #0016dc; color: white; }
    </style>
</head>
<body class="min-h-screen bg-[#F8F9FA] flex flex-col" style="max-width:390px;margin:0 auto;">

    <div class="flex-1 overflow-y-auto no-scrollbar px-5 py-10 flex flex-col">

        <!-- Logo pequena -->
        <div class="flex items-center gap-2 justify-center mb-8">
            <div class="w-8 h-8 bg-[#0016dc] rounded-lg flex items-center justify-center text-white font-bold text-sm shadow-md shadow-[#0016dc]/30">M</div>
            <span class="font-extrabold text-base text-[#1A1A24] tracking-tight">MMO Platform</span>
        </div>

        <!-- Heading -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-extrabold text-[#1A1A24] mb-2">Como você quer usar o MMO?</h1>
            <p class="text-sm text-[#6B7280]">Você pode alternar depois</p>
        </div>

        <!-- Cards de contexto -->
        <div class="flex flex-col gap-4 mb-8" id="contextCards">

            <!-- Cliente -->
            <div
                class="ctx-card bg-white rounded-2xl p-4 flex items-center gap-4 cursor-pointer active:scale-[0.98] shadow-sm border border-gray-100"
                data-target="../Módulo 3.4 - Vitrine, Busca e Descoberta/Tela 1 - Tela inicial de busca.html"
                onclick="selectCard(this)"
            >
                <div class="ctx-icon w-14 h-14 rounded-xl bg-[#0016dc]/10 flex items-center justify-center text-[#0016dc] shrink-0 transition-all">
                    <i class="fa-solid fa-magnifying-glass text-xl"></i>
                </div>
                <div class="flex-1">
                    <p class="font-bold text-[#1A1A24] text-base mb-0.5">Cliente</p>
                    <p class="text-xs text-[#6B7280] leading-relaxed">Contrate profissionais verificados para qualquer serviço</p>
                </div>
                <i class="fa-solid fa-chevron-right text-xs text-[#6B7280]"></i>
            </div>

            <!-- Profissional -->
            <div
                class="ctx-card bg-white rounded-2xl p-4 flex items-center gap-4 cursor-pointer active:scale-[0.98] shadow-sm border border-gray-100"
                data-target="../Módulo 3.9 - Pipeline Simples do Profissional/Tela 1 - Tela do pipeline simples.html"
                onclick="selectCard(this)"
            >
                <div class="ctx-icon w-14 h-14 rounded-xl bg-[#0016dc]/10 flex items-center justify-center text-[#0016dc] shrink-0 transition-all">
                    <i class="fa-solid fa-briefcase text-xl"></i>
                </div>
                <div class="flex-1">
                    <p class="font-bold text-[#1A1A24] text-base mb-0.5">Profissional</p>
                    <p class="text-xs text-[#6B7280] leading-relaxed">Receba oportunidades de serviço e expanda sua carteira</p>
                </div>
                <i class="fa-solid fa-chevron-right text-xs text-[#6B7280]"></i>
            </div>

            <!-- Empresa -->
            <div
                class="ctx-card bg-white rounded-2xl p-4 flex items-center gap-4 cursor-pointer active:scale-[0.98] shadow-sm border border-gray-100"
                data-target="../Módulo 3.19 - Conta Empresa e Subcontas/Tela 1 - Cadastro da empresa.html"
                onclick="selectCard(this)"
            >
                <div class="ctx-icon w-14 h-14 rounded-xl bg-[#0016dc]/10 flex items-center justify-center text-[#0016dc] shrink-0 transition-all">
                    <i class="fa-solid fa-building text-xl"></i>
                </div>
                <div class="flex-1">
                    <p class="font-bold text-[#1A1A24] text-base mb-0.5">Empresa</p>
                    <p class="text-xs text-[#6B7280] leading-relaxed">Gerencie equipes e subcontas em um só lugar</p>
                </div>
                <i class="fa-solid fa-chevron-right text-xs text-[#6B7280]"></i>
            </div>

        </div>

        <!-- Continuar button -->
        <button
            id="continueBtn"
            onclick="continuar()"
            class="w-full h-12 bg-[#0016dc] text-white font-bold rounded-full text-sm shadow-md shadow-[#0016dc]/20 active:scale-95 transition-all mb-6 disabled:opacity-50"
        >
            Continuar
        </button>

        <!-- Segurança -->
        <div class="flex items-center justify-center gap-2">
            <i class="fa-solid fa-lock text-[#6B7280] text-xs"></i>
            <p class="text-xs text-[#6B7280]">Acesso protegido com criptografia</p>
        </div>

    </div>

    <script>
        let selectedCard = null;

        function selectCard(card) {
            // Deselect all
            document.querySelectorAll('.ctx-card').forEach(c => c.classList.remove('selected'));
            // Select this
            card.classList.add('selected');
            selectedCard = card;
        }

        function continuar() {
            if (selectedCard) {
                const target = selectedCard.getAttribute('data-target');
                window.location.href = target;
            } else {
                // Default: cliente
                window.location.href = '../Módulo 3.4 - Vitrine, Busca e Descoberta/Tela 1 - Tela inicial de busca.html';
            }
        }

        // Pre-select Cliente by default
        const cards = document.querySelectorAll('.ctx-card');
        if (cards.length > 0) selectCard(cards[0]);
    </script>

    <script src="../../_mobile-nav.js"></script>
</body>
</html>
