<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizar Mensagens</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        background: '#F8F9FA',
                        primary: '#0016dc',
                        textMain: '#1A1A24',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px rgba(0, 0, 0, 0.05)',
                        'floating': '0 8px 30px rgba(0, 0, 0, 0.08)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; color: #1A1A24; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
        
        /* Custom Toggle Switch Styles */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #0016dc;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #0016dc;
        }
        .toggle-checkbox {
            right: 4px;
            z-index: 1;
            border-color: #e2e8f0;
            transition: all 0.3s;
        }
        .toggle-label {
            width: 44px;
            height: 24px;
            background-color: #e2e8f0;
            border-radius: 9999px;
            transition: all 0.3s;
        }
    </style>
</head>
<body class="min-h-[100dvh] flex justify-center items-start bg-gray-100">

    <!-- Mobile Container (375x840 constraint) -->
    <div id="app-container" class="w-full max-w-[375px] h-[840px] bg-background relative overflow-hidden flex flex-col shadow-2xl sm:rounded-[40px] sm:my-8 sm:h-[840px] sm:max-h-[90vh]">
        
        <!-- Header -->
        <header id="header" class="w-full px-6 py-5 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-20 border-b border-gray-100/50">
            <button class="w-10 h-10 flex items-center justify-center rounded-full active:bg-gray-100 transition-colors">
                <i class="fa-solid fa-arrow-left text-primary text-xl"></i>
            </button>
            <h1 class="text-lg font-bold text-textMain tracking-tight">Organizar Mensagens</h1>
            <button class="text-sm font-semibold text-gray-500 hover:text-textMain transition-colors">
                Limpar
            </button>
        </header>

        <!-- Main Scrollable Content -->
        <main class="flex-1 overflow-y-auto px-6 pt-6 pb-40 space-y-8">
            
            <!-- Quick System Filters -->
            <section id="quick-filters" class="space-y-4">
                <h2 class="text-base font-bold text-textMain px-1">Exibição Rápida</h2>
                
                <div class="bg-white rounded-[24px] p-2 shadow-soft border border-gray-50/50">
                    <!-- Toggle Item 1 -->
                    <div class="flex items-center justify-between p-4 border-b border-gray-50 last:border-0">
                        <span class="text-[15px] font-medium text-textMain">Apenas Não Lidas</span>
                        <div class="relative inline-block w-11 mr-2 align-middle select-none transition duration-200 ease-in">
                            <input type="checkbox" name="toggle1" id="toggle1" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer top-[2px] right-[22px] checked:right-[2px]" checked/>
                            <label for="toggle1" class="toggle-label block overflow-hidden h-6 rounded-full bg-primary cursor-pointer"></label>
                        </div>
                    </div>
                    
                    <!-- Toggle Item 2 -->
                    <div class="flex items-center justify-between p-4 border-b border-gray-50 last:border-0">
                        <span class="text-[15px] font-medium text-textMain">Aguardando Minha Resposta</span>
                        <div class="relative inline-block w-11 mr-2 align-middle select-none transition duration-200 ease-in">
                            <input type="checkbox" name="toggle2" id="toggle2" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer top-[2px] right-[22px]" />
                            <label for="toggle2" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-200 cursor-pointer"></label>
                        </div>
                    </div>
                    
                    <!-- Toggle Item 3 -->
                    <div class="flex items-center justify-between p-4 border-b border-gray-50 last:border-0">
                        <span class="text-[15px] font-medium text-textMain">Orçamentos Pendentes</span>
                        <div class="relative inline-block w-11 mr-2 align-middle select-none transition duration-200 ease-in">
                            <input type="checkbox" name="toggle3" id="toggle3" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer top-[2px] right-[22px]" />
                            <label for="toggle3" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-200 cursor-pointer"></label>
                        </div>
                    </div>
                    
                    <!-- Toggle Item 4 -->
                    <div class="flex items-center justify-between p-4 border-b border-gray-50 last:border-0">
                        <span class="text-[15px] font-medium text-textMain">Oportunidades do Balcão</span>
                        <div class="relative inline-block w-11 mr-2 align-middle select-none transition duration-200 ease-in">
                            <input type="checkbox" name="toggle4" id="toggle4" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer top-[2px] right-[22px] checked:right-[2px]" checked/>
                            <label for="toggle4" class="toggle-label block overflow-hidden h-6 rounded-full bg-primary cursor-pointer"></label>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Custom Folders -->
            <section id="custom-folders" class="space-y-4">
                <h2 class="text-base font-bold text-textMain px-1">Minhas Pastas</h2>
                
                <!-- Horizontal Scrollable Tags -->
                <div class="flex overflow-x-auto gap-3 pb-2 -mx-6 px-6 snap-x">
                    <button class="shrink-0 bg-white border border-gray-100 shadow-sm px-5 py-3 rounded-full text-[14px] font-semibold text-textMain flex items-center gap-2 snap-start hover:border-primary/30 transition-colors">
                        <span>Favoritos</span>
                        <span class="text-lg">⭐️</span>
                    </button>
                    <button class="shrink-0 bg-white border border-gray-100 shadow-sm px-5 py-3 rounded-full text-[14px] font-semibold text-textMain flex items-center gap-2 snap-start hover:border-primary/30 transition-colors">
                        <span>Prioridade Alta</span>
                        <span class="text-lg">🔥</span>
                    </button>
                    <button class="shrink-0 bg-white border border-gray-100 shadow-sm px-5 py-3 rounded-full text-[14px] font-semibold text-textMain flex items-center gap-2 snap-start hover:border-primary/30 transition-colors">
                        <span>Em Execução</span>
                        <span class="text-lg">🛠️</span>
                    </button>
                </div>
                
                <!-- Create New Folder Btn -->
                <button class="w-full mt-2 border-2 border-dashed border-gray-300 bg-white/50 hover:bg-gray-50/80 px-6 py-4 rounded-full flex items-center justify-center gap-3 transition-colors">
                    <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500">
                        <i class="fa-solid fa-plus text-sm"></i>
                    </div>
                    <span class="text-[15px] font-semibold text-gray-600">Criar Nova Pasta</span>
                </button>
            </section>

        </main>

        <!-- Bottom Action Area -->
        <div class="absolute bottom-0 left-0 w-full px-6 pb-[100px] pt-6 bg-gradient-to-t from-background via-background to-transparent pointer-events-none z-10">
            <button class="w-full bg-primary text-white font-bold text-[16px] py-4 rounded-full shadow-floating pointer-events-auto active:scale-[0.98] transition-transform">
                Aplicar Filtros
            </button>
        </div>

        <!-- Floating Pill Navigation -->
        <nav id="bottom-nav" class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[85%] bg-white rounded-full shadow-floating border border-gray-50 px-6 py-4 flex justify-between items-center z-30">
            <button class="flex flex-col items-center gap-1 w-12 text-gray-400 hover:text-textMain transition-colors">
                <i class="fa-solid fa-house text-lg"></i>
            </button>
            <button class="flex flex-col items-center gap-1 w-12 text-gray-400 hover:text-textMain transition-colors">
                <i class="fa-solid fa-box-open text-lg"></i>
            </button>
            <button class="flex flex-col items-center gap-1.5 w-12 text-primary transition-colors relative">
                <i class="fa-solid fa-message text-xl"></i>
                <span class="w-1.5 h-1.5 rounded-full bg-primary absolute -bottom-2"></span>
            </button>
            <button class="flex flex-col items-center gap-1 w-12 text-gray-400 hover:text-textMain transition-colors">
                <i class="fa-regular fa-user text-lg"></i>
            </button>
        </nav>

    </div>

</body>
</html>
