<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meus Pedidos - MMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#0016dc',
                            blueLight: 'rgba(0, 22, 220, 0.1)',
                            blueGlow: 'rgba(0, 22, 220, 0.15)',
                        },
                        text: {
                            main: '#1A1A24',
                            muted: '#6B7280',
                        },
                        surface: {
                            bg: '#F8F9FA',
                            card: '#FFFFFF',
                        }
                    },
                    boxShadow: {
                        'glass': '0 4px 30px rgba(0, 0, 0, 0.05)',
                        'floating': '0 10px 40px rgba(0, 0, 0, 0.08)',
                        'card': '0 4px 20px rgba(0, 0, 0, 0.03)',
                        'active-card': '0 8px 30px rgba(0, 22, 220, 0.12)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F8F9FA;
            margin: 0;
            padding: 0;
            color: #1A1A24;
            -webkit-font-smoothing: antialiased;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        /* Mobile layout constraint */
        .mobile-container {
            width: 100%;
            max-width: 430px; /* Slightly wider to accommodate standard mobile widths but centered on desktop */
            margin: 0 auto;
            min-height: 100dvh;
            position: relative;
            background-color: #F8F9FA;
            box-shadow: 0 0 50px rgba(0,0,0,0.05); /* Only visible on desktop */
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>

<div class="mobile-container pb-[100px]"> <!-- Padding bottom for floating nav -->

    <!-- 1. Top Header & Action -->
    <header id="glass-header" class="glass-header sticky top-0 z-40 px-5 py-4 flex justify-between items-center w-full border-b border-gray-100/50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg bg-brand-blue flex items-center justify-center text-white font-bold text-lg">
                M
            </div>
            <span class="font-extrabold text-xl tracking-tight text-text-main">MMO</span>
        </div>
        <button class="bg-brand-blue hover:bg-blue-800 transition-colors text-white text-sm font-semibold py-2.5 px-5 rounded-full shadow-[0_4px_14px_rgba(0,22,220,0.3)] flex items-center gap-2">
            <i class="fa-solid fa-plus text-xs"></i>
            Novo Pedido
        </button>
    </header>

    <!-- Main Content Wrapper -->
    <main class="flex-1 px-5 pt-6 pb-6 flex flex-col gap-6">

        <!-- 2. Main Title -->
        <section id="page-title" class="flex flex-col gap-1.5">
            <h1 class="text-[28px] font-bold text-text-main tracking-tight leading-tight">Meus Pedidos</h1>
            <p class="text-[16px] text-text-muted font-medium">Acompanhe o status dos seus serviços solicitados.</p>
        </section>

        <!-- 3. Quick Filters -->
        <section id="horizontal-filters" class="-mx-5 px-5">
            <div class="flex gap-3 overflow-x-auto hide-scrollbar pb-4 pt-1 snap-x">
                <!-- Active Filter -->
                <button class="snap-start shrink-0 bg-brand-blue text-white px-5 py-2.5 rounded-full text-[15px] font-semibold shadow-[0_4px_12px_rgba(0,22,220,0.25)] transition-all">
                    Todos
                </button>
                <!-- Inactive Filters -->
                <button class="snap-start shrink-0 bg-white text-text-main px-5 py-2.5 rounded-full text-[15px] font-semibold shadow-card border border-gray-100 hover:bg-gray-50 transition-all flex items-center gap-2">
                    Aguardando <span class="text-sm">⏳</span>
                </button>
                <button class="snap-start shrink-0 bg-white text-text-main px-5 py-2.5 rounded-full text-[15px] font-semibold shadow-card border border-gray-100 hover:bg-gray-50 transition-all flex items-center gap-2">
                    Em Andamento <span class="text-sm">🛠️</span>
                </button>
                <button class="snap-start shrink-0 bg-white text-text-main px-5 py-2.5 rounded-full text-[15px] font-semibold shadow-card border border-gray-100 hover:bg-gray-50 transition-all flex items-center gap-2">
                    Finalizados <span class="text-sm">✓</span>
                </button>
            </div>
        </section>

        <!-- 4. Detailed Order Cards -->
        <section id="order-list" class="flex flex-col gap-4">
            
            <!-- Card 1: Em Andamento (Active Glow) -->
            <article class="bg-white rounded-[24px] p-5 shadow-active-card border border-brand-blueLight relative overflow-hidden group cursor-pointer transition-transform active:scale-[0.98]">
                <!-- Subtle background gradient hint -->
                <div class="absolute top-0 right-0 w-32 h-32 bg-brand-blueLight rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none"></div>
                
                <div class="flex flex-col gap-4 relative z-10">
                    <!-- Top Row -->
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-3.5">
                            <div class="w-12 h-12 rounded-full bg-orange-50 flex items-center justify-center text-orange-500 text-xl shadow-sm border border-orange-100">
                                <i class="fa-solid fa-wrench"></i>
                            </div>
                            <div class="flex flex-col">
                                <h3 class="font-bold text-[18px] text-text-main">Reparo de Pia</h3>
                                <span class="text-[13px] text-text-muted font-medium mt-0.5">ID: #ORD-4921</span>
                            </div>
                        </div>
                        <div class="bg-orange-100 text-orange-700 px-3 py-1.5 rounded-full text-[12px] font-bold tracking-wide uppercase flex items-center gap-1.5">
                            <div class="w-1.5 h-1.5 rounded-full bg-orange-500 animate-pulse"></div>
                            Em Andamento
                        </div>
                    </div>
                    
                    <!-- Divider -->
                    <div class="h-px w-full bg-gray-100"></div>

                    <!-- Middle & Bottom Row Combined for better mobile flow -->
                    <div class="flex justify-between items-end">
                        <div class="flex flex-col gap-2">
                            <div class="flex items-center gap-2 text-[14px] text-text-muted">
                                <i class="fa-solid fa-location-dot w-4 text-center text-gray-400"></i>
                                <span class="font-medium">Camboriú - SC</span>
                            </div>
                            <div class="flex items-center gap-2 text-[14px] text-text-muted">
                                <i class="fa-regular fa-calendar w-4 text-center text-gray-400"></i>
                                <span class="font-medium">18/04/2026</span>
                            </div>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-brand-blue group-hover:bg-brand-blueLight transition-colors">
                            <i class="fa-solid fa-chevron-right text-sm"></i>
                        </div>
                    </div>
                </div>
            </article>

            <!-- Card 2: Aguardando -->
            <article class="bg-white rounded-[24px] p-5 shadow-card border border-gray-100 relative group cursor-pointer transition-transform active:scale-[0.98]">
                <div class="flex flex-col gap-4">
                    <!-- Top Row -->
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-3.5">
                            <div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center text-blue-500 text-xl shadow-sm border border-blue-100">
                                <i class="fa-solid fa-bolt"></i>
                            </div>
                            <div class="flex flex-col">
                                <h3 class="font-bold text-[18px] text-text-main">Instalação Elétrica</h3>
                                <span class="text-[13px] text-text-muted font-medium mt-0.5">ID: #ORD-4930</span>
                            </div>
                        </div>
                        <div class="bg-blue-50 text-blue-600 px-3 py-1.5 rounded-full text-[12px] font-bold tracking-wide uppercase">
                            Aguardando
                        </div>
                    </div>
                    
                    <div class="h-px w-full bg-gray-100"></div>

                    <div class="flex justify-between items-end">
                        <div class="flex flex-col gap-2">
                            <div class="flex items-center gap-2 text-[14px] text-text-muted">
                                <i class="fa-solid fa-location-dot w-4 text-center text-gray-400"></i>
                                <span class="font-medium">Balneário Camboriú - SC</span>
                            </div>
                            <div class="flex items-center gap-2 text-[14px] text-text-muted">
                                <i class="fa-regular fa-calendar w-4 text-center text-gray-400"></i>
                                <span class="font-medium">20/04/2026</span>
                            </div>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:text-brand-blue transition-colors">
                            <i class="fa-solid fa-chevron-right text-sm"></i>
                        </div>
                    </div>
                </div>
            </article>

            <!-- Card 3: Finalizado -->
            <article class="bg-white rounded-[24px] p-5 shadow-card border border-gray-100 relative opacity-80 group cursor-pointer transition-transform active:scale-[0.98]">
                <div class="flex flex-col gap-4">
                    <!-- Top Row -->
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-3.5">
                            <div class="w-12 h-12 rounded-full bg-green-50 flex items-center justify-center text-green-500 text-xl shadow-sm border border-green-100">
                                <i class="fa-solid fa-paint-roller"></i>
                            </div>
                            <div class="flex flex-col">
                                <h3 class="font-bold text-[18px] text-text-main">Pintura Externa</h3>
                                <span class="text-[13px] text-text-muted font-medium mt-0.5">ID: #ORD-4812</span>
                            </div>
                        </div>
                        <div class="bg-green-50 text-green-700 px-3 py-1.5 rounded-full text-[12px] font-bold tracking-wide uppercase flex items-center gap-1.5">
                            <i class="fa-solid fa-check text-[10px]"></i>
                            Finalizado
                        </div>
                    </div>
                    
                    <div class="h-px w-full bg-gray-100"></div>

                    <div class="flex justify-between items-end">
                        <div class="flex flex-col gap-2">
                            <div class="flex items-center gap-2 text-[14px] text-text-muted">
                                <i class="fa-solid fa-location-dot w-4 text-center text-gray-400"></i>
                                <span class="font-medium">Itajaí - SC</span>
                            </div>
                            <div class="flex items-center gap-2 text-[14px] text-text-muted">
                                <i class="fa-regular fa-calendar w-4 text-center text-gray-400"></i>
                                <span class="font-medium">10/04/2026</span>
                            </div>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:text-brand-blue transition-colors">
                            <i class="fa-solid fa-chevron-right text-sm"></i>
                        </div>
                    </div>
                </div>
            </article>

        </section>
    </main>

    <!-- 5. Floating Pill Navigation -->
    <div class="fixed bottom-6 left-0 right-0 z-50 flex justify-center pointer-events-none px-5">
        <!-- The pill itself is pointer-events-auto -->
        <nav class="bg-white/95 backdrop-blur-xl border border-white/20 shadow-floating rounded-full px-6 py-3.5 flex items-center gap-8 pointer-events-auto w-full max-w-[340px] justify-between">
            
            <!-- Inactive Home -->
            <a href="#" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 transition-colors relative w-12">
                <i class="fa-solid fa-house text-[22px]"></i>
            </a>

            <!-- Active Orders -->
            <a href="#" class="flex flex-col items-center gap-1 text-brand-blue transition-colors relative w-12">
                <i class="fa-solid fa-file-lines text-[22px]"></i>
                <div class="w-1.5 h-1.5 bg-brand-blue rounded-full absolute -bottom-2.5 shadow-[0_2px_6px_rgba(0,22,220,0.4)]"></div>
            </a>

            <!-- Inactive Messages -->
            <a href="#" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 transition-colors relative w-12">
                <i class="fa-regular fa-message text-[22px]"></i>
                <!-- Notification badge -->
                <div class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></div>
            </a>

            <!-- Inactive Profile -->
            <a href="#" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 transition-colors relative w-12">
                <i class="fa-regular fa-user text-[22px]"></i>
            </a>
            
        </nav>
    </div>

</div>

</body>
</html>
