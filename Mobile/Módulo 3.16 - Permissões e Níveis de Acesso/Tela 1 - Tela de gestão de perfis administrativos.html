<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Administrative Profile Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        background: '#F8F9FA',
                        primary: '#0016dc',
                        textMain: '#1A1A24',
                        textMuted: '#6B7280',
                        surface: '#FFFFFF',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'float': '0 8px 30px rgba(0, 22, 220, 0.15)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F8F9FA;
            color: #1A1A24;
            -webkit-font-smoothing: antialiased;
        }
        /* Custom Toggle Switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #0016dc;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #0016dc;
        }
        .toggle-checkbox {
            right: 0;
            z-index: 1;
            border-color: #e5e7eb;
            transition: all 0.3s;
        }
        .toggle-label {
            background-color: #e5e7eb;
            border-radius: 9999px;
            transition: all 0.3s;
        }
        /* Hide scrollbar */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-background text-textMain min-h-[100dvh] flex flex-col items-center">

    <!-- Mobile Wrapper for Desktop viewing -->
    <div class="w-full max-w-[375px] bg-background min-h-[100dvh] relative flex flex-col shadow-2xl overflow-hidden mx-auto">
        
        <!-- Top Header -->
        <header id="header" class="bg-surface px-5 py-4 flex items-center justify-between sticky top-0 z-50 shadow-[0_2px_10px_rgba(0,0,0,0.03)] rounded-b-[24px]">
            <button class="text-textMain font-semibold text-[15px] flex items-center gap-2 hover:text-primary transition-colors">
                <i class="fa-solid fa-chevron-left text-[14px]"></i>
                Voltar
            </button>
            <h1 class="text-[17px] font-bold text-textMain tracking-tight">Equipe Interna</h1>
            <button class="w-10 h-10 rounded-full bg-background flex items-center justify-center text-primary hover:bg-primary hover:text-white transition-colors">
                <i class="fa-solid fa-plus text-[16px]"></i>
            </button>
        </header>

        <!-- Search & Filter Bar -->
        <section id="search_filter_bar" class="px-5 pt-6 pb-2">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-textMuted"></i>
                <input type="text" placeholder="Buscar administrador..." class="w-full bg-surface border border-gray-100 rounded-full py-3.5 pl-11 pr-4 text-[14px] font-medium text-textMain placeholder-textMuted shadow-soft focus:outline-none focus:border-primary/30 transition-all">
            </div>
            
            <div class="flex gap-3 mt-4 overflow-x-auto pb-2 scrollbar-hide">
                <button class="whitespace-nowrap px-4 py-2 bg-primary text-white rounded-full text-[13px] font-bold shadow-sm">Todos</button>
                <button class="whitespace-nowrap px-4 py-2 bg-surface text-textMuted rounded-full text-[13px] font-semibold border border-gray-100 shadow-sm">Ativos</button>
                <button class="whitespace-nowrap px-4 py-2 bg-surface text-textMuted rounded-full text-[13px] font-semibold border border-gray-100 shadow-sm">Inativos</button>
            </div>
        </section>

        <!-- Staff List -->
        <main id="staff_list" class="flex-1 px-5 pt-2 pb-32 flex flex-col gap-3 overflow-y-auto">
            
            <!-- Card 1 -->
            <div class="bg-surface rounded-[16px] p-4 flex items-center justify-between shadow-soft border border-gray-50/50">
                <div class="flex items-center gap-3.5">
                    <div class="relative">
                        <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-4.jpg" alt="Lucas Silva" class="w-12 h-12 rounded-full object-cover border-2 border-white shadow-sm">
                        <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></div>
                    </div>
                    <div class="flex flex-col gap-1">
                        <h3 class="text-[15px] font-bold text-textMain leading-none">Lucas Silva</h3>
                        <span class="inline-flex items-center px-2.5 py-1 rounded-full bg-primary/10 text-primary text-[11px] font-bold uppercase tracking-wider w-fit">
                            Moderador Master
                        </span>
                    </div>
                </div>
                <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" name="toggle1" id="toggle1" checked class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer translate-x-6"/>
                    <label for="toggle1" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="bg-surface rounded-[16px] p-4 flex items-center justify-between shadow-soft border border-gray-50/50">
                <div class="flex items-center gap-3.5">
                    <div class="relative">
                        <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-1.jpg" alt="Marina Costa" class="w-12 h-12 rounded-full object-cover border-2 border-white shadow-sm">
                        <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></div>
                    </div>
                    <div class="flex flex-col gap-1">
                        <h3 class="text-[15px] font-bold text-textMain leading-none">Marina Costa</h3>
                        <span class="inline-flex items-center px-2.5 py-1 rounded-full bg-primary/10 text-primary text-[11px] font-bold uppercase tracking-wider w-fit">
                            Admin Financeiro
                        </span>
                    </div>
                </div>
                <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" name="toggle2" id="toggle2" checked class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer translate-x-6"/>
                    <label for="toggle2" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="bg-surface rounded-[16px] p-4 flex items-center justify-between shadow-soft border border-gray-50/50 opacity-60">
                <div class="flex items-center gap-3.5">
                    <div class="relative">
                        <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-8.jpg" alt="Roberto Alves" class="w-12 h-12 rounded-full object-cover border-2 border-white shadow-sm grayscale">
                        <div class="absolute bottom-0 right-0 w-3 h-3 bg-gray-400 rounded-full border-2 border-white"></div>
                    </div>
                    <div class="flex flex-col gap-1">
                        <h3 class="text-[15px] font-bold text-textMain leading-none">Roberto Alves</h3>
                        <span class="inline-flex items-center px-2.5 py-1 rounded-full bg-gray-100 text-textMuted text-[11px] font-bold uppercase tracking-wider w-fit">
                            Suporte N1
                        </span>
                    </div>
                </div>
                <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" name="toggle3" id="toggle3" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer"/>
                    <label for="toggle3" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
            </div>

        </main>

        <!-- Primary Action Container -->
        <div id="primary_action_container" class="absolute bottom-[90px] left-0 right-0 px-5 z-40">
            <button class="w-full bg-primary text-white rounded-full py-4 text-[15px] font-bold shadow-float flex items-center justify-center gap-2 hover:bg-primary/90 transition-all active:scale-[0.98]">
                <i class="fa-solid fa-user-plus"></i>
                Convidar Novo Administrador
            </button>
        </div>

        <!-- Floating Navigation -->
        <nav id="floating_nav" class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-surface px-6 py-3.5 rounded-full shadow-[0_8px_30px_rgba(0,0,0,0.12)] flex items-center gap-8 z-50 border border-gray-100">
            <button class="flex flex-col items-center gap-1 text-textMuted hover:text-primary transition-colors">
                <i class="fa-solid fa-house text-[18px]"></i>
            </button>
            <button class="flex flex-col items-center gap-1 text-textMuted hover:text-primary transition-colors">
                <i class="fa-solid fa-chart-pie text-[18px]"></i>
            </button>
            <button class="flex flex-col items-center gap-1 text-primary relative">
                <i class="fa-solid fa-users-gear text-[18px]"></i>
                <span class="absolute -bottom-2 w-1 h-1 bg-primary rounded-full"></span>
            </button>
            <button class="flex flex-col items-center gap-1 text-textMuted hover:text-primary transition-colors">
                <i class="fa-solid fa-gear text-[18px]"></i>
            </button>
        </nav>

    </div>

    <script>
        // Simple toggle switch logic for visual feedback
        document.querySelectorAll('.toggle-checkbox').forEach(toggle => {
            toggle.addEventListener('change', function() {
                const card = this.closest('.bg-surface');
                const avatar = card.querySelector('img');
                const statusDot = card.querySelector('.absolute.bottom-0');
                const badge = card.querySelector('span');
                
                if(this.checked) {
                    card.classList.remove('opacity-60');
                    avatar.classList.remove('grayscale');
                    statusDot.classList.remove('bg-gray-400');
                    statusDot.classList.add('bg-green-500');
                    badge.classList.remove('bg-gray-100', 'text-textMuted');
                    badge.classList.add('bg-primary/10', 'text-primary');
                } else {
                    card.classList.add('opacity-60');
                    avatar.classList.add('grayscale');
                    statusDot.classList.remove('bg-green-500');
                    statusDot.classList.add('bg-gray-400');
                    badge.classList.remove('bg-primary/10', 'text-primary');
                    badge.classList.add('bg-gray-100', 'text-textMuted');
                }
            });
        });
    </script>
</body>
</html>
