<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Service Board Request</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#0016dc',
                            navy: '#1A1A24',
                            offwhite: '#F8F9FA',
                            border: '#E5E7EB',
                            textMuted: '#6B7280'
                        }
                    },
                    boxShadow: {
                        'ambient': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #F8F9FA; color: #1A1A24; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen bg-brand-offwhite font-sans text-brand-navy antialiased">

    <!-- Top Navigation -->
    <nav id="header" class="w-full bg-white border-b border-brand-border px-8 h-20 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-brand-blue rounded-full flex items-center justify-center text-white font-bold text-xl">M</div>
            <span class="font-bold text-xl tracking-tight">MMO</span>
        </div>
        
        <div class="flex items-center gap-8 font-medium">
            <div class="relative flex flex-col items-center">
                <a href="#" class="text-brand-blue hover:text-brand-blue transition-colors py-2">Home</a>
                <div class="absolute bottom-0 w-1.5 h-1.5 bg-brand-blue rounded-full"></div>
            </div>
            <a href="#" class="text-brand-textMuted hover:text-brand-navy transition-colors py-2">Orders</a>
            <a href="#" class="text-brand-textMuted hover:text-brand-navy transition-colors py-2 relative">
                Messages
                <span class="absolute top-1 -right-3 w-2 h-2 bg-red-500 rounded-full"></span>
            </a>
            
            <div class="ml-4 flex items-center gap-3 pl-6 border-l border-brand-border cursor-pointer hover:opacity-80 transition-opacity">
                <div class="w-10 h-10 rounded-full overflow-hidden border border-brand-border">
                    <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-4.jpg" alt="Profile" class="w-full h-full object-cover">
                </div>
                <div class="flex flex-col">
                    <span class="text-sm font-semibold">João Silva</span>
                    <span class="text-xs text-brand-textMuted">Cliente</span>
                </div>
                <i class="fa-solid fa-chevron-down text-xs text-brand-textMuted ml-1"></i>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="w-full max-w-[1000px] mx-auto pt-12 pb-24 px-6 flex flex-col items-center">
        
        <!-- Header & Stepper -->
        <div id="progress_stepper" class="w-full flex flex-col items-center mb-10">
            <h1 class="text-3xl font-bold mb-8">Publique sua Necessidade</h1>
            
            <div class="flex items-center justify-center w-full max-w-2xl relative">
                <!-- Connecting Line Base -->
                <div class="absolute top-1/2 left-0 w-full h-[2px] bg-brand-border -z-10 -translate-y-1/2"></div>
                <!-- Connecting Line Active -->
                <div class="absolute top-1/2 left-0 w-1/4 h-[2px] bg-brand-blue -z-10 -translate-y-1/2"></div>

                <div class="flex justify-between w-full px-4">
                    <!-- Step 1 -->
                    <div class="flex flex-col items-center gap-3 bg-brand-offwhite px-4">
                        <div class="w-8 h-8 rounded-full bg-brand-blue text-white flex items-center justify-center font-semibold text-sm shadow-[0_0_0_4px_#F8F9FA,0_0_0_6px_#0016dc]">1</div>
                        <span class="text-sm font-bold text-brand-blue">Detalhes</span>
                    </div>
                    
                    <!-- Step 2 -->
                    <div class="flex flex-col items-center gap-3 bg-brand-offwhite px-4">
                        <div class="w-8 h-8 rounded-full bg-white border-2 border-brand-border text-brand-textMuted flex items-center justify-center font-semibold text-sm shadow-[0_0_0_4px_#F8F9FA]">2</div>
                        <span class="text-sm font-medium text-brand-textMuted">Mídia</span>
                    </div>
                    
                    <!-- Step 3 -->
                    <div class="flex flex-col items-center gap-3 bg-brand-offwhite px-4">
                        <div class="w-8 h-8 rounded-full bg-white border-2 border-brand-border text-brand-textMuted flex items-center justify-center font-semibold text-sm shadow-[0_0_0_4px_#F8F9FA]">3</div>
                        <span class="text-sm font-medium text-brand-textMuted">Exposição</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Form Workspace Card -->
        <div id="form_workspace_card" class="w-full max-w-[800px] bg-white rounded-[24px] shadow-ambient p-10 flex flex-col gap-10">
            
            <!-- Top Section -->
            <div class="flex flex-col gap-3">
                <label class="text-lg font-semibold">O que precisa ser feito?</label>
                <input type="text" placeholder="Ex: Reforma completa de banheiro de 5m²" class="w-full h-16 px-6 rounded-full border border-brand-border bg-brand-offwhite focus:bg-white focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/20 outline-none transition-all text-lg placeholder:text-brand-textMuted/70">
            </div>

            <!-- Middle Section (2 Columns) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Left Column -->
                <div class="flex flex-col gap-6">
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-brand-navy">Categoria</label>
                        <div class="relative">
                            <select class="w-full h-12 px-5 rounded-full border border-brand-border bg-white appearance-none focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/20 outline-none cursor-pointer text-sm font-medium">
                                <option value="" disabled selected>Selecione a categoria principal</option>
                                <option value="reforma">Reforma & Construção</option>
                                <option value="manutencao">Manutenção Residencial</option>
                                <option value="marcenaria">Marcenaria</option>
                                <option value="eletrica">Elétrica</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-brand-textMuted text-xs pointer-events-none"></i>
                        </div>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-brand-navy flex justify-between">
                            Descreva os detalhes do serviço
                            <span class="text-xs font-normal text-brand-textMuted">Opcional</span>
                        </label>
                        <textarea placeholder="Forneça medidas, materiais desejados, ou qualquer detalhe que ajude os profissionais a entenderem melhor sua necessidade..." class="w-full h-40 p-5 rounded-[20px] border border-brand-border bg-brand-offwhite focus:bg-white focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/20 outline-none resize-none text-sm placeholder:text-brand-textMuted/70 leading-relaxed"></textarea>
                    </div>
                </div>

                <!-- Right Column -->
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-brand-navy">Anexos de Mídia</label>
                    <div class="w-full h-[244px] rounded-[20px] border-2 border-dashed border-brand-border bg-brand-offwhite hover:bg-brand-blue/5 hover:border-brand-blue/30 transition-colors flex flex-col items-center justify-center gap-4 cursor-pointer group">
                        <div class="w-14 h-14 rounded-full bg-white shadow-sm flex items-center justify-center text-brand-blue group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-cloud-arrow-up text-xl"></i>
                        </div>
                        <div class="text-center px-6">
                            <p class="text-sm font-semibold text-brand-navy mb-1">Arraste fotos ou clique aqui</p>
                            <p class="text-xs text-brand-textMuted leading-relaxed">Fotos ajudam a atrair orçamentos mais precisos e rápidos.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Section (Location) -->
            <div id="location_map_toggle" class="flex flex-col gap-4 pt-6 border-t border-brand-border/50">
                <div class="flex items-center justify-between">
                    <label class="text-sm font-semibold text-brand-navy">Local do Serviço</label>
                    <button class="text-sm text-brand-blue font-medium hover:underline">Alterar endereço</button>
                </div>
                
                <div class="relative w-full h-32 rounded-[20px] overflow-hidden border border-brand-border">
                    <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/e514a3307e-3b23a1c085bff1f0d053.png" alt="Clean, minimalist map snippet showing a pin in a coastal city region, soft pastel map colors, ui element style" />
                    <div class="absolute bottom-3 left-3 bg-white/90 backdrop-blur-sm px-4 py-2 rounded-full shadow-sm text-xs font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-location-dot text-brand-blue"></i>
                        Balneário Camboriú, SC
                    </div>
                </div>

                <div class="flex items-center gap-3 mt-2 bg-brand-offwhite p-4 rounded-[16px]">
                    <!-- Custom Toggle -->
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" value="" class="sr-only peer" checked>
                        <div class="w-11 h-6 bg-brand-border peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-brand-blue"></div>
                    </label>
                    <span class="text-sm font-medium text-brand-navy">Ocultar endereço exato até a contratação</span>
                </div>
            </div>

        </div>

    </main>

    <!-- Footer Action -->
    <div id="footer_actions" class="fixed bottom-0 w-full bg-white border-t border-brand-border px-8 py-5 flex items-center justify-between z-40 shadow-[0_-4px_20px_rgba(0,0,0,0.02)]">
        <button onclick="window.location.href='Tela 4 - Tela de listagem de Balcões elegíveis para o profissional.html'" class="text-brand-textMuted font-medium hover:text-brand-navy transition-colors px-6 py-3 rounded-full hover:bg-brand-offwhite">
            Cancelar
        </button>
        <button onclick="window.location.href='Tela 2 - Tela de checkout da exposição do Balcão.html'" class="bg-brand-blue text-white font-bold text-lg px-12 py-4 rounded-full shadow-lg shadow-brand-blue/30 hover:bg-brand-blue/90 hover:shadow-brand-blue/40 hover:-translate-y-0.5 transition-all flex items-center gap-3">
            Salvar e Continuar
            <i class="fa-solid fa-arrow-right text-sm"></i>
        </button>
    </div>

    <script src="../_nav-helper.js"></script>
</body>
</html>
